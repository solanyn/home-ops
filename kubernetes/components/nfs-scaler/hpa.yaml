---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${APP}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: ${CONTROLLER:=Deployment}
    name: ${APP}
  minReplicas: 0
  maxReplicas: 1
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 0
  metrics:
    - type: Object
      object:
        describedObject:
          apiVersion: v1
          kind: Namespace
          name: default
        metric:
          name: nfs_available
        target:
          type: Value
          value: "1"
