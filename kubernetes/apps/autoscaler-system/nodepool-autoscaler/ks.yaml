---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nodepool-autoscaler-crds
spec:
  targetNamespace: autoscaler-system
  interval: 1h
  path: ./kubernetes/apps/autoscaler-system/nodepool-autoscaler/crds
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nodepool-autoscaler
spec:
  targetNamespace: autoscaler-system
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: nodepool-autoscaler-crds
      namespace: autoscaler-system
  interval: 1h
  path: ./kubernetes/apps/autoscaler-system/nodepool-autoscaler/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nodepool-autoscaler-nodepool
spec:
  targetNamespace: autoscaler-system
  interval: 1h
  dependsOn:
    - name: nodepool-autoscaler
      namespace: autoscaler-system
  path: ./kubernetes/apps/autoscaler-system/nodepool-autoscaler/nodepool
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
