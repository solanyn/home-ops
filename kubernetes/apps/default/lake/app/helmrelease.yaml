apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lake
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: lake
  values:
    controllers:
      ingest:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-ingest
              tag: sha-d912b3a5adbb5b0bbedc73acb2831e4e21c06855
              pullPolicy: Always
            env: &env
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              S3_BUCKET: datalake
              KAFKA_BROKERS: redpanda.streaming.svc.cluster.local:9093
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8081
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8081
                  periodSeconds: 10
                  failureThreshold: 3
            resources: &resources
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
      promote:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-promote
              tag: sha-d912b3a5adbb5b0bbedc73acb2831e4e21c06855
              pullPolicy: Always
            env:
              <<: *env
              PORT: "8082"
            envFrom: *envFrom
            securityContext: *securityContext
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8082
                  periodSeconds: 30
                  failureThreshold: 3
            resources: *resources
      aggregate:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-aggregate
              tag: sha-d912b3a5adbb5b0bbedc73acb2831e4e21c06855
              pullPolicy: Always
            env:
              <<: *env
              PORT: "8083"
            envFrom: *envFrom
            securityContext: *securityContext
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8083
                  periodSeconds: 30
                  failureThreshold: 3
            resources: *resources
      mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-mcp
              tag: sha-4fe4f0386cfcfb7056e8e37dbbd8845769482ddd
              pullPolicy: Always
            command: ["/lake-mcp/mcp_server"]
            args: ["--transport", "sse"]
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              LAKE_STATE_PATH: /data/lake-state.json
              OPENAI_BASE_URL: http://envoy-ai-gateway.gateway.svc.cluster.local:8080/v1
              OPENAI_API_KEY: dummy
              PYTHONUNBUFFERED: "1"
            envFrom: *envFrom
            securityContext: *securityContext
            resources: *resources
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          mcp:
            app:
              - path: /data
      tmp:
        type: emptyDir
        sizeLimit: 512Mi
        globalMounts:
          - path: /tmp
    service:
      ingest:
        controller: ingest
        ports:
          http:
            port: 8081
      promote:
        controller: promote
        ports:
          http:
            port: 8082
      aggregate:
        controller: aggregate
        ports:
          http:
            port: 8083
      mcp:
        controller: mcp
        ports:
          http:
            port: 8080
