apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lake
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: lake
  values:
    controllers:
      ingest:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-ingest
              tag: latest
              pullPolicy: Always
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              S3_BUCKET: datalake
              PORT: "8081"
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8081
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8081
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
      mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-mcp
              tag: latest
              pullPolicy: Always
            command: ["python", "-c"]
            args:
              - |
                from lake_mcp.mcp_server import mcp
                mcp.run(transport="sse", host="0.0.0.0", port=8080)
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              LAKE_STATE_PATH: /data/lake-state.json
              OPENAI_BASE_URL: http://envoy-ai-gateway.gateway.svc.cluster.local:8080/v1
              OPENAI_API_KEY: dummy
              PYTHONUNBUFFERED: "1"
            envFrom: *envFrom
            securityContext: *securityContext
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          mcp:
            app:
              - path: /data
      tmp:
        type: emptyDir
        sizeLimit: 512Mi
        globalMounts:
          - path: /tmp
    service:
      ingest:
        controller: ingest
        ports:
          http:
            port: 8081
      mcp:
        controller: mcp
        ports:
          http:
            port: 8080
