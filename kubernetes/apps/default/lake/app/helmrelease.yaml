apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lake
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: lake
  values:
    controllers:
      ingest:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          create-topics:
            image:
              repository: docker.redpanda.com/redpandadata/redpanda
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                rpk topic create lake.bronze.written --brokers=redpanda.streaming.svc.cluster.local:9093 -p 3 -r 1 || true
                rpk topic create lake.silver.written --brokers=redpanda.streaming.svc.cluster.local:9093 -p 3 -r 1 || true
                rpk topic create lake.articles.new --brokers=redpanda.streaming.svc.cluster.local:9093 -p 3 -r 1 || true
          register-tables:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.13-bookworm-slim
            command: ["uvx"]
            args:
              - "--with"
              - "pyiceberg[s3]"
              - "python"
              - "/scripts/register_tables.py"
            env:
              ICEBERG_CATALOG_URI: http://lakekeeper.storage.svc.cluster.local:8181/catalog
              AWS_ENDPOINT_URL: http://garage.storage.svc.cluster.local:3900
              AWS_REGION: us-east-1
              HOME: /tmp
              UV_CACHE_DIR: /tmp/uv-cache
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-ingest
              tag: "2026.04.203"
              pullPolicy: Always
            env: &env
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              KAFKA_BROKERS: redpanda.streaming.svc.cluster.local:9093
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8081
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8081
                  periodSeconds: 10
                  failureThreshold: 3
            resources: &resources
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
      promote:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-promote
              tag: "2026.04.203"
              pullPolicy: Always
            env:
              <<: *env
              HEALTH_PORT: "8082"
            envFrom: *envFrom
            securityContext: *securityContext
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8082
                  periodSeconds: 30
                  failureThreshold: 3
            resources: *resources
      aggregate:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/lake-aggregate
              tag: "2026.04.203"
              pullPolicy: Always
            env:
              <<: *env
              HEALTH_PORT: "8083"
            envFrom: *envFrom
            securityContext: *securityContext
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8083
                  periodSeconds: 30
                  failureThreshold: 3
            resources: *resources
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      tmp:
        type: emptyDir
        sizeLimit: 512Mi
        globalMounts:
          - path: /tmp
      register-script:
        type: configMap
        name: lake-register-tables
        advancedMounts:
          ingest:
            register-tables:
              - path: /scripts
      lake:
        type: nfs
        server: nas.internal
        path: /mnt/world/lake
        advancedMounts:
          ingest:
            app:
              - path: /lake
    service:
      ingest:
        controller: ingest
        ports:
          http:
            port: 8081
      promote:
        controller: promote
        ports:
          http:
            port: 8082
      aggregate:
        controller: aggregate
        ports:
          http:
            port: 8083
