apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lake
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: lake-secret
    template:
      data:
        S3_ACCESS_KEY: "{{ .GARAGE_ROOT_USER }}"
        S3_SECRET_KEY: "{{ .GARAGE_ROOT_PASSWORD }}"
        DOMAIN_CLIENT_ID: "{{ .DOMAIN_CLIENT_ID }}"
        DOMAIN_CLIENT_SECRET: "{{ .DOMAIN_CLIENT_SECRET }}"
        API_NSW_FUEL_API_KEY: "{{ .API_NSW_FUEL_API_KEY }}"
        API_NSW_FUEL_API_SECRET: "{{ .API_NSW_FUEL_API_SECRET }}"
        API_NSW_PROPERTY_API_KEY: "{{ .API_NSW_PROPERTY_API_KEY }}"
        API_NSW_PROPERTY_API_SECRET: "{{ .API_NSW_PROPERTY_API_SECRET }}"
        API_NSW_TRADES_API_KEY: "{{ .API_NSW_TRADES_API_KEY }}"
        API_NSW_TRADES_API_SECRET: "{{ .API_NSW_TRADES_API_SECRET }}"
  dataFrom:
    - extract:
        key: garage
    - extract:
        key: domain
    - extract:
        key: api-nsw
