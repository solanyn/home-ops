---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
spec:
  chartRef:
    kind: OCIRepository
    name: grimmory
  interval: 1h
  values:
    controllers:
      grimmory:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v2.3.0@sha256:9014247f591074529894f81115ca40f899db697e89f72c2fe91ec530e3f19597
            env:
              TZ: Australia/Sydney
              USER_ID: "1000"
              GROUP_ID: "1000"
            envFrom:
              - secretRef:
                  name: grimmory-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "true"
        hostnames:
          - "{{ .Release.Name }}.goyangi.io"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/data
      books:
        type: nfs
        server: nas.internal
        path: /mnt/world/media/books
        globalMounts:
          - path: /books
      bookdrop:
        type: nfs
        server: nas.internal
        path: /mnt/world/media/bookdrop
        globalMounts:
          - path: /bookdrop
      mlm-ebooks:
        type: nfs
        server: nas.internal
        path: /mnt/world/media/downloads/torrents/complete/mlm-ebooks
        globalMounts:
          - path: /mlm-ebooks
