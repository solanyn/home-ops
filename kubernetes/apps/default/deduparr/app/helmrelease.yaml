---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deduparr
spec:
  chartRef:
    kind: OCIRepository
    name: deduparr
  interval: 1h
  values:
    controllers:
      deduparr:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/kernald/deduparr
              tag: 1.1.0@sha256:2b2a695212bab92347f3adc07b334d96b00ea717bebe54134273cbdb5dd970ad
            env:
              TZ: Australia/Sydney
              DEDUPARR_LOG_LEVEL: info
              DEDUPARR_SCHEDULE: service
              DEDUPARR_ACTION: dry-run
              DEDUPARR_REMOVE_FROM_CLIENT: "false"
              DEDUPARR_SERVICE_INTERVAL: 2m
              RADARR_MOVIES_URL: http://radarr.default.svc.cluster.local
              RADARR_MOVIES_ENABLED: "true"
              SONARR_SERIES_URL: http://sonarr.default.svc.cluster.local
              SONARR_SERIES_ENABLED: "true"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: &port 80
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
