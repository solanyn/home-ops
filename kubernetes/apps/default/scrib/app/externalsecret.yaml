---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scrib
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: scrib-secret
    template:
      data:
        INIT_POSTGRES_HOST: postgres-rw.storage.svc.cluster.local
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        INIT_POSTGRES_USER: "{{ .SCRIB_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .SCRIB_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_DBNAME: scrib
        SCRIB_DATABASE_URL: "postgres://{{ .SCRIB_POSTGRES_USER }}:{{ .SCRIB_POSTGRES_PASSWORD }}@postgres-rw.storage.svc.cluster.local/scrib?sslmode=disable"
        SCRIB_S3_ENDPOINT: garage.storage.svc.cluster.local:3900
        SCRIB_S3_ACCESS_KEY: "{{ .GARAGE_ROOT_USER }}"
        SCRIB_S3_SECRET_KEY: "{{ .GARAGE_ROOT_PASSWORD }}"
        SCRIB_S3_BUCKET: scrib
        SCRIB_S3_USE_SSL: "false"
        SCRIB_AUDIO_URL: http://mlx-audio.network.svc.cluster.local:8000
        SCRIB_AUDIO_PROCESS_URL: http://scrib-audio.network.svc.cluster.local:8002
        SCRIB_STT_MODEL: mlx-community/parakeet-tdt-0.6b-v3
  dataFrom:
    - extract:
        key: scrib
    - extract:
        key: garage
    - extract:
        key: cloudnative-pg
