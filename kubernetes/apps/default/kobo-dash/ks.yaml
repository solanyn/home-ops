---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kobo-dash
spec:
  targetNamespace: default
  interval: 1h
  path: ./kubernetes/apps/default/kobo-dash/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
