---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vgc
spec:
  chartRef:
    kind: OCIRepository
    name: vgc
  interval: 10m
  values:
    controllers:
      pipeline:
        type: cronjob
        cronjob:
          schedule: "0 6 * * 1"
          timeZone: Australia/Sydney
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
          backoffLimit: 2
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/vgc-pipeline
              tag: latest
              pullPolicy: Always
            args: ["--output", "/data", "--narrative"]
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              ICEBERG_CATALOG_URI: http://lakekeeper.storage.svc.cluster.local:8181/catalog
              R2_ENDPOINT: https://$(CLOUDFLARE_ACCOUNT_ID).r2.cloudflarestorage.com
              VGC_CALC_URL: http://vgc-calc.default.svc.cluster.local:8080
              LITELLM_URL: https://litellm.goyangi.io/v1
            envFrom:
              - secretRef:
                  name: vgc-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
      calc:
        type: deployment
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/vgc-calc
              tag: latest
              pullPolicy: Always
            command: ["node", "/vgc/calc/bundle.js"]
            env:
              PORT: "8080"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 3
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      calc:
        controller: calc
        ports:
          http:
            port: 8080
    persistence:
      data:
        type: emptyDir
        sizeLimit: 1Gi
        advancedMounts:
          pipeline:
            app:
              - path: /data
      tmp:
        type: emptyDir
        sizeLimit: 512Mi
        advancedMounts:
          pipeline:
            app:
              - path: /tmp
