---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness
spec:
  chartRef:
    kind: OCIRepository
    name: sparkyfitness
  interval: 1h
  values:
    controllers:
      server:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: sparkyfitness-secret
        containers:
          app:
            image:
              repository: codewithcj/sparkyfitness_server
              tag: v0.16.5.8
            env:
              TZ: Australia/Sydney
              NODE_ENV: production
              SPARKY_FITNESS_LOG_LEVEL: info
              SPARKY_FITNESS_FRONTEND_URL: https://sparkyfitness.goyangi.io
              SPARKY_FITNESS_DISABLE_SIGNUP: "true"
              SPARKY_FITNESS_ADMIN_EMAIL: andrew@goyangi.io
              ALLOW_PRIVATE_NETWORK_CORS: "true"
              # OIDC
              OIDC_ENABLED: "true"
              OIDC_PROVIDER_SLUG: pocketid
              OIDC_PROVIDER_NAME: Pocket ID
              OIDC_ISSUER_URL: https://id.goyangi.io
              OIDC_SCOPE: "openid email profile"
              OIDC_AUTO_REGISTER: "true"
              OIDC_AUTO_REDIRECT: "true"
              OIDC_CLIENT_ID: sparkyfitness
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: sparkyfitness-oidc
                    key: client_secret
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &serverPort 3010
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *serverPort
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
      frontend:
        pod:
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            fsGroup: 0
        containers:
          app:
            image:
              repository: codewithcj/sparkyfitness
              tag: v0.16.5.8
            env:
              SPARKY_FITNESS_FRONTEND_URL: https://sparkyfitness.goyangi.io
              SPARKY_FITNESS_SERVER_HOST: sparkyfitness-server
              SPARKY_FITNESS_SERVER_PORT: "3010"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &frontendPort 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *frontendPort
                  initialDelaySeconds: 5
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "NET_BIND_SERVICE", "SETGID", "SETUID"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      server:
        controller: server
        ports:
          http:
            port: *serverPort
      frontend:
        controller: frontend
        ports:
          http:
            port: *frontendPort
    route:
      app:
        hostnames:
          - sparkyfitness.goyangi.io
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: sparkyfitness-frontend
                port: 80
    persistence:
      uploads:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          server:
            app:
              - path: /app/SparkyFitnessServer/uploads
                subPath: uploads
              - path: /app/SparkyFitnessServer/backup
                subPath: backup
      tmp:
        type: emptyDir
        advancedMounts:
          server:
            app:
              - path: /tmp
              - path: /app/SparkyFitnessServer/temp_uploads
                subPath: temp_uploads
          frontend:
            app:
              - path: /tmp
              - path: /var/cache/nginx
                subPath: nginx-cache
              - path: /var/run
                subPath: nginx-run
              - path: /etc/nginx/conf.d
                subPath: nginx-conf
