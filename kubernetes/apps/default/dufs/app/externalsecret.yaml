---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dufs
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: dufs-secret
    template:
      data:
        DUFS_AUTH: "admin:{{ .ADMIN_PASSWORD }}@/:rw|@/flate"
  dataFrom:
    - extract:
        key: dufs
