---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustical
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: rustical
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      rustical:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          enableServiceLinks: false
        containers:
          app:
            image:
              repository: ghcr.io/lennart-k/rustical
              tag: edge
            env:
              TZ: Australia/Sydney
              RUSTICAL_CONFIG: /config/config.toml
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 5232
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 5232
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: rustical
        ports:
          http:
            port: 5232
    route:
      app:
        hostnames:
          - caldav.goyangi.io
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/caldav
            filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /
                  statusCode: 301
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/carddav
            filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /
                  statusCode: 301
          - backendRefs:
              - name: rustical
                port: 5232
    persistence:
      config:
        type: secret
        name: rustical-secret
        globalMounts:
          - path: /config
            readOnly: true
      data:
        existingClaim: rustical
        globalMounts:
          - path: /data
