---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: romm-tools
spec:
  chartRef:
    kind: OCIRepository
    name: romm-tools
  interval: 1h
  values:
    controllers:
      switch-importer:
        type: cronjob
        cronjob:
          schedule: 0 * * * *
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 3600
        containers:
          app:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.12-alpine
            env:
              UV_CACHE_DIR: /tmp/uv-cache
            command:
              - uv
            args:
              - run
              - --with
              - nsz
              - python
              - /scripts/convert.py
            resources: {}
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        pod:
          restartPolicy: Never
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    configMaps:
      script:
        data:
          convert.py: |
            #!/usr/bin/env python3
            import shutil
            import subprocess
            import re
            import urllib.request
            import urllib.parse
            import json
            from pathlib import Path

            QBT = "http://qbittorrent.default.svc.cluster.local"
            DEST = Path("/media/games/roms/switch")
            SOURCES = [
                (Path("/media/downloads/torrents/complete/switch"), "switch", True),
                (Path("/media/downloads/torrents/complete/games"), "games", False),
            ]

            def normalize(name):
                return re.sub(r'\s*\(\d+\.\d+\s+GB\)', '', name)

            def game_info(filename):
                name = normalize(filename.rsplit('.', 1)[0])
                dlc = re.search(r'^(.+?)\s*\[DLC[^\]]*\]\s*\[[\dA-F]{16}\]', name)
                base = re.match(r'^(.+?)\s*\[[\dA-F]{16}\]', name)
                game = (dlc or base).group(1).strip() if (dlc or base) else name.split('[')[0].strip()
                if dlc:
                    return game, "dlc"
                ver = re.search(r'\[v(\d+)\]', filename)
                return game, "update" if ver and int(ver.group(1)) > 0 else "base"

            def exists(dest):
                if dest.exists():
                    return True
                norm = normalize(dest.name)
                return any(normalize(f.name) == norm for f in dest.parent.glob("*.nsp"))

            def make_dest(game, kind, filename):
                d = DEST / game if kind == "base" else DEST / game / kind
                d.mkdir(parents=True, exist_ok=True)
                return d / filename

            def qbt_torrents(category):
                url = f"{QBT}/api/v2/torrents/info?" + urllib.parse.urlencode({"category": category})
                with urllib.request.urlopen(url) as r:
                    return json.loads(r.read())

            def qbt_remove(hashes):
                body = urllib.parse.urlencode({
                    "hashes": "|".join(hashes),
                    "deleteFiles": "false",
                }).encode()
                urllib.request.urlopen(urllib.request.Request(f"{QBT}/api/v2/torrents/delete", data=body))
                print(f"Removed {len(hashes)} torrents from qBittorrent")

            def match_torrents(torrents, src_dir, cleaned):
                cleaned_parents = {f.parent for f in cleaned}
                hashes = set()
                for t in torrents:
                    content = Path(t["content_path"])
                    if content in cleaned or content.parent in cleaned_parents or content in cleaned_parents:
                        hashes.add(t["hash"])
                return hashes

            def import_files(src_dir, cleanup):
                cleaned = []
                for nsz in src_dir.rglob("*.nsz"):
                    game, kind = game_info(nsz.name)
                    dest = make_dest(game, kind, nsz.with_suffix(".nsp").name)
                    if exists(dest):
                        cleaned.append(nsz)
                        continue
                    print(f"Converting {nsz.name}")
                    subprocess.run(["nsz", "-D", str(nsz), "-o", str(dest.parent)], check=True)
                    cleaned.append(nsz)
                for nsp in src_dir.rglob("*.nsp"):
                    game, kind = game_info(nsp.name)
                    dest = make_dest(game, kind, nsp.name)
                    if exists(dest):
                        cleaned.append(nsp)
                        continue
                    if cleanup:
                        tmp = dest.with_suffix(".nsp.tmp")
                        try:
                            print(f"Copying {nsp.name}")
                            shutil.copy2(nsp, tmp)
                            tmp.rename(dest)
                        except BaseException:
                            tmp.unlink(missing_ok=True)
                            raise
                        cleaned.append(nsp)
                    else:
                        print(f"Hardlinking {nsp.name}")
                        dest.hardlink_to(nsp)
                return cleaned

            def cleanup_sources(category, src_dir, cleaned):
                torrents = qbt_torrents(category)
                hashes = match_torrents(torrents, src_dir, cleaned)
                if hashes:
                    qbt_remove(hashes)
                for f in cleaned:
                    f.unlink()
                    print(f"Deleted {f.name}")
                for d in sorted(src_dir.rglob("*"), reverse=True):
                    if d.is_dir() and not any(d.iterdir()):
                        d.rmdir()

            def process():
                for src_dir, category, cleanup in SOURCES:
                    if not src_dir.exists():
                        continue
                    try:
                        cleaned = import_files(src_dir, cleanup)
                    except Exception as e:
                        print(f"Import failed for {src_dir}: {e}")
                        continue
                    if cleanup and cleaned:
                        try:
                            cleanup_sources(category, src_dir, cleaned)
                        except Exception as e:
                            print(f"Cleanup failed for {category}: {e}")

            if __name__ == "__main__":
                process()
    persistence:
      script:
        type: configMap
        identifier: script
        globalMounts:
          - path: /scripts
      media:
        type: nfs
        server: nas.internal
        path: /mnt/world/media
        globalMounts:
          - path: /media
      prod-keys:
        type: nfs
        server: nas.internal
        path: /mnt/world/media/games/bios/switch/20.5.0
        globalMounts:
          - path: /.switch/prod.keys
            subPath: prod.keys
            readOnly: true
      tmp:
        type: emptyDir
