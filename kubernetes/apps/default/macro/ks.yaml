apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: macro
spec:
  targetNamespace: default
  dependsOn:
    - name: garage
      namespace: storage
  interval: 1h
  path: ./kubernetes/apps/default/macro/app
  prune: true
  postBuild:
    substitute:
      APP: macro
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
