apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: macro
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: macro
  values:
    controllers:
      ingest:
        type: cronjob
        cronjob:
          schedule: "0 20 * * *"
          timeZone: Australia/Sydney
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/macro
              tag: latest
            args: ["macro.ingest.cli", "all"]
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              MACRO_STATE_PATH: /data/macro-state.json
              PYTHONUNBUFFERED: "1"
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources: &resources
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
        pod:
          restartPolicy: OnFailure
      promote:
        type: cronjob
        cronjob:
          schedule: "30 20 * * *"
          timeZone: Australia/Sydney
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/macro
              tag: latest
            command: ["/bin/sh"]
            args:
              - -c
              - |
                python -m macro.ingest.cli promote-rba;
                python -m macro.ingest.cli promote-abs;
                python -m macro.ingest.cli promote-aemo;
                python -m macro.ingest.cli promote-rss
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              MACRO_STATE_PATH: /data/macro-state.json
              PYTHONUNBUFFERED: "1"
            envFrom: *envFrom
            securityContext: *securityContext
            resources: *resources
        pod:
          restartPolicy: OnFailure
      agent:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/macro
              tag: latest
              pullPolicy: Always
            command: ["python", "-c"]
            args:
              - |
                from macro.mcp_server import mcp
                mcp.run(transport="sse", host="0.0.0.0", port=8080)
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              MACRO_STATE_PATH: /data/macro-state.json
              OPENAI_BASE_URL: http://envoy-ai-gateway.gateway.svc.cluster.local:8080/v1
              OPENAI_API_KEY: dummy
              PYTHONUNBUFFERED: "1"
            envFrom: *envFrom
            securityContext: *securityContext
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        sizeLimit: 512Mi
        globalMounts:
          - path: /tmp
