---
apiVersion: modal.internal.io/v1alpha1
kind: ModalApp
metadata:
  name: immich-ml
spec:
  appName: immich-ml
  servicePort: 80
  source: |
    import modal

    MINUTES = 60

    immich_ml_image = (
        modal.Image.from_registry(
            "ghcr.io/immich-app/immich-machine-learning:v2.5.6-cuda",
            add_python=None,
        )
    )

    model_cache_vol = modal.Volume.from_name("immich-ml-cache", create_if_missing=True)

    app = modal.App("immich-ml")

    @app.function(
        image=immich_ml_image,
        gpu="T4",
        scaledown_window=2 * MINUTES,
        timeout=30 * MINUTES,
        volumes={
            "/cache": model_cache_vol,
        },
        memory=4096,
    )
    @modal.concurrent(max_inputs=4)
    @modal.asgi_app()
    def serve():
        import os
        import sys
        sys.path.insert(0, "/usr/src")
        os.environ["MACHINE_LEARNING_CACHE_FOLDER"] = "/cache"
        os.environ["TRANSFORMERS_CACHE"] = "/cache"
        os.environ["VIRTUAL_ENV"] = "/opt/venv"
        os.environ["PATH"] = "/opt/venv/bin:" + os.environ.get("PATH", "")
        from immich_ml.main import app as fastapi_app
        return fastapi_app
