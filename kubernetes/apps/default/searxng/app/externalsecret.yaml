---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: searxng
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: searxng-secret
    template:
      data:
        SEARXNG_SECRET: "{{ .SEARXNG_SECRET }}"
        SEARXNG_OPEN_METRICS_SECRET: "{{ .SEARXNG_OPEN_METRICS_SECRET }}"
        SEARXNG_OPEN_METRICS_USER: "{{ .SEARXNG_OPEN_METRICS_USER }}"
        SEARXNG_REDIS_URL: "redis://redis.storage.svc.cluster.local:6379"
        settings.yml: |
          use_default_settings: true
          server:
            limiter: true
            image_proxy: true
            method: GET
            public_instance: false
          search:
            autocomplete: google
            favicon_resolver: duckduckgo
            default_lang: en-AU
            languages: [en-AU, en-CA, en-GB, en-NZ, en-US]
            formats: [html, json]
          general:
            instance_name: goyangi search
            enable_metrics: true
            open_metrics: "{{ .SEARXNG_OPEN_METRICS_SECRET }}"
          ui:
            default_theme: simple
            infinite_scroll: true
            query_in_title: true
            results_on_new_tab: true
            static_use_hash: true
            theme_args:
              simple_style: auto
            default_locale: en
          categories_as_tabs:
            general:
            images:
            videos:
            news:
            it:
            science:
            games:
            map:
          enabled_plugins:
            - Basic Calculator
            - Hash plugin
            - Hostnames plugin
            - Open Access DOI rewrite
            - Self Informations
            - Tracker URL remover
            - Unit converter plugin
          hostnames:
            high_priority:
              - (.*)\/blog\/(.*)
              - (.*\.)?wikipedia.org$
              - (.*\.)?github.com$
              - (.*\.)?reddit.com$
              - (.*\.)?docker.com$
              - (.*\.)?archlinux.org$
              - (.*\.)?stackoverflow.com$
              - (.*\.)?askubuntu.com$
              - (.*\.)?superuser.com$
              - (.*\.)?docs\.rs$
              - (.*\.)?pkg\.go\.dev$
              - (.*\.)?pypi\.org$
              - (.*\.)?npmjs\.com$
              - (.*\.)?crates\.io$
              - (.*\.)?kubernetes\.io$
              - (.*\.)?nixos\.org$
              - (.*\.)?developer\.mozilla\.org$
              - (.*\.)?man7\.org$
              - (.*\.)?arxiv\.org$
              - (.*\.)?huggingface\.co$
              - (.*\.)?fandom\.com$
              - (.*\.)?ign\.com$
              - (.*\.)?gamespot\.com$
              - (.*\.)?pcgamingwiki\.com$
              - (.*\.)?strategywiki\.org$
              - (.*\.)?neoseeker\.com$
              - (.*\.)?gamefaqs\.gamespot\.com$
              - (.*\.)?youtube\.com$
              - (.*\.)?youtu-chan\.com$
              - (.*\.)?game8\.co$
              - (.*\.)?fextralife\.com$
          engines:
            - name: wikipedia
              engine: wikipedia
              shortcut: wp
              display_type: ["infobox"]
              categories: [general]
            - name: docker hub
              engine: docker_hub
              shortcut: dh
              categories: [it, packages]
            - name: encyclosearch
              engine: json_engine
              shortcut: es
              categories: general
              paging: true
              search_url: https://encyclosearch.org/encyclosphere/search?q={query}&page={pageno}&resultsPerPage=15
              results_query: Results
              url_query: SourceURL
              title_query: Title
              content_query: Description
              disabled: false
              about:
                website: https://encyclosearch.org
                official_api_documentation: https://encyclosearch.org/docs/#/rest-api
                use_official_api: true
                require_api_key: false
                results: JSON
            - name: github
              engine: github
              shortcut: gh
            - name: goodreads
              engine: goodreads
              shortcut: good
              timeout: 4.0
              disabled: false
            - name: google
              engine: google
              shortcut: g
              parameters:
                - hl: en
                - gl: au
                - cr: countryAU
                - tbs: ctr:countryAU
            - name: google images
              engine: google_images
              shortcut: gi
            - name: google news
              engine: google_news
              shortcut: gn
              categories: [news]
            - name: google scholar
              engine: google_scholar
              shortcut: gs
              categories: [science]
            - name: reddit
              engine: reddit
              shortcut: re
              page_size: 25
              disabled: false
            - name: arxiv
              engine: arxiv
              shortcut: ar
              categories: [science]
            - name: npm
              engine: npm
              shortcut: npm
              categories: [it, packages]
            - name: pypi
              engine: pypi
              shortcut: pypi
              categories: [it, packages]
            - name: crates.io
              engine: crates
              shortcut: crt
              categories: [it, packages]
            - name: pkg.go.dev
              engine: pkg_go_dev
              shortcut: go
              categories: [it, packages]
            - name: mdn
              engine: xpath
              shortcut: mdn
              categories: [it]
              url: https://developer.mozilla.org/en-US/search?q={query}
              results_xpath: //div[contains(@class,"search-results")]//article
              url_xpath: .//a/@href
              title_xpath: .//a/h3
              content_xpath: .//a/p
              disabled: true
            - name: stackoverflow
              engine: stackexchange
              shortcut: so
              categories: [it]
              api_site: stackoverflow
            - name: hacker news
              engine: hackernews
              shortcut: hn
              categories: [it, news]
            - name: nix packages
              engine: json_engine
              shortcut: nix
              categories: [it, packages]
              paging: false
              search_url: https://search.nixos.org/backend/latest-42-nixos-unstable/_search?q={query}&from=0&size=20
              results_query: hits/hits
              url_query: _source/package_attr_name
              url_prefix: https://search.nixos.org/packages?query=
              title_query: _source/package_pname
              content_query: _source/package_description
            - name: arch wiki
              engine: archlinux
              shortcut: aw
              categories: [it]
            - name: duckduckgo
              engine: duckduckgo
              shortcut: ddg
            - name: bing
              engine: bing
              shortcut: bi
            - name: brave
              engine: brave
              shortcut: br
              brave_category: search
              api_key: "{{ .BRAVE_API_KEY }}"
            - name: fandom
              engine: mediawiki
              shortcut: fan
              categories: [general, games]
              base_url: https://www.fandom.com/
              search_type: nearmatch
              disabled: true
            - name: youtube
              engine: youtube_noapi
              shortcut: yt
              categories: [videos]
        limiter.toml: |
          [real_ip]
          x_for = 1
          ipv4_prefix = 32
          ipv6_prefix = 48
          [botdetection.ip_limit]
          filter_link_local = true
          link_token = false
          [botdetection.ip_lists]
          block_ip = []
          pass_ip = ['10.42.0.0/16', '10.43.0.0/16', '192.168.0.0/16']
          pass_searxng_org = false
  dataFrom:
    - extract:
        key: searxng
    - extract:
        key: brave
