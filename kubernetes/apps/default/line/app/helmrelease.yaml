---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: line
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: line
  values:
    controllers:
      capture:
        initContainers:
          init-topics:
            image:
              repository: docker.redpanda.com/redpandadata/redpanda
              tag: v26.1.9
            command: ["/bin/sh", "-c"]
            args:
              - |
                rpk topic create line.telemetry.raw line.lap.written line.session.complete \
                  --brokers=redpanda.streaming.svc.cluster.local:9093 \
                  --partitions=1 \
                  --replicas=1 || true
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/line-capture
              tag: latest
            ports:
              - containerPort: 33740
                hostPort: 33740
                protocol: UDP
            env:
              KAFKA_BROKERS: redpanda.streaming.svc.cluster.local:9093
              KAFKA_TOPIC: line.telemetry.raw
            envFrom:
              - configMapRef:
                  name: line-config
      assembler:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom:
              - secretRef:
                  name: line-secret
          migrate:
            dependsOn: init-db
            image:
              repository: ghcr.io/solanyn/line-migrate
              tag: latest
            envFrom:
              - secretRef:
                  name: line-secret
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/line-assembler
              tag: latest
            env:
              KAFKA_BROKERS: redpanda.streaming.svc.cluster.local:9093
              KAFKA_TOPIC: line.telemetry.raw
              KAFKA_GROUP: line.assembler
              KAFKA_LAP_TOPIC: line.lap.written
              KAFKA_SESSION_TOPIC: line.session.complete
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              S3_BUCKET: line-bronze
            envFrom:
              - secretRef:
                  name: line-secret
      api:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom:
              - secretRef:
                  name: line-secret
          migrate:
            dependsOn: init-db
            image:
              repository: ghcr.io/solanyn/line-migrate
              tag: latest
            envFrom:
              - secretRef:
                  name: line-secret
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/line-api
              tag: latest
            env:
              ADDR: :8080
              KAFKA_BROKERS: redpanda.streaming.svc.cluster.local:9093
              KAFKA_TOPIC: line.telemetry.raw
              KAFKA_GROUP: line.api
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              S3_BUCKET: line-bronze
              S3_SILVER_BUCKET: line-silver
              S3_GOLD_BUCKET: line-gold
              TTS_ENDPOINT: http://192.168.10.30:8001
              LLM_ENDPOINT: http://qwen3.5-9b.ai.svc.cluster.local:8000
              LLM_MODEL: Qwen3.5-9B-4bit
              COACH_VOICE: af_heart
              COACH_USE_LLM: "true"
              WEB_DIR: /web/dist
            envFrom:
              - secretRef:
                  name: line-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
      analytics:
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/line-analytics
              tag: latest
            env:
              KAFKA_BROKERS: redpanda.streaming.svc.cluster.local:9093
              KAFKA_GROUP: line.analytics
              KAFKA_TOPICS: line.lap.written,line.session.complete
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              S3_BRONZE_BUCKET: line-bronze
              S3_SILVER_BUCKET: line-silver
              S3_GOLD_BUCKET: line-gold
            envFrom:
              - secretRef:
                  name: line-secret
      refdata:
        type: cronjob
        cronjob:
          schedule: "0 4 * * 1"
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/line-refdata
              tag: latest
            env:
              S3_ENDPOINT: http://garage.storage.svc.cluster.local:3900
              S3_REGION: us-east-1
              S3_BUCKET: line-bronze
            envFrom:
              - secretRef:
                  name: line-secret
    service:
      api:
        controller: api
        ports:
          http:
            port: 8080
