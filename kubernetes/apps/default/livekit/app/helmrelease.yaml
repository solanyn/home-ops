---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: livekit
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      livekit:
        containers:
          app:
            image:
              repository: livekit/livekit-server
              tag: v1.8.4
            args:
              - --config
              - /etc/livekit/config.yaml
            env:
              LIVEKIT_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: livekit-secret
                    key: LIVEKIT_API_KEY
              LIVEKIT_API_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: livekit-secret
                    key: LIVEKIT_API_SECRET
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 7880
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 7880
    service:
      app:
        controller: livekit
        ports:
          http:
            port: 7880
          rtc-tcp:
            port: 7881
            protocol: TCP
    persistence:
      config:
        type: configMap
        name: livekit-config
        globalMounts:
          - path: /etc/livekit/config.yaml
            subPath: config.yaml
    configMaps:
      config:
        data:
          config.yaml: |
            port: 7880
            rtc:
              tcp_port: 7881
              port_range_start: 0
              port_range_end: 0
              use_external_ip: false
            turn:
              enabled: true
              domain: livekit.goyangi.io
              tls_port: 0
              udp_port: 0
              external_tls: true
            keys: {}
            logging:
              level: info
