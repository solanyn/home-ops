---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bookorbit
spec:
  chartRef:
    kind: OCIRepository
    name: bookorbit
  interval: 10m
  values:
    controllers:
      bookorbit:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: bookorbit-secret
          init-extensions:
            dependsOn: init-db
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            env:
              PGHOST: postgres-rw.storage.svc.cluster.local
              PGUSER: postgres
              PGPASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: bookorbit-secret
                    key: INIT_POSTGRES_SUPER_PASS
              PGDATABASE: bookorbit
            command: ["/bin/bash", "-c"]
            args:
              - |
                psql -c "CREATE EXTENSION IF NOT EXISTS vector CASCADE;"
        containers:
          app:
            image:
              repository: ghcr.io/bookorbit/bookorbit
              tag: 2.3.0@sha256:62048532c82ad4cfe9b728707136f140516f0f35766c2dc97969f22ed67794ae
            env:
              TZ: Australia/Sydney
              NODE_ENV: production
              PORT: &port 3000
              APP_URL: https://bookorbit.goyangi.io
              PUID: "1000"
              PGID: "1000"
              OIDC_ALLOW_LOCAL_ISSUERS: "true"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/enabled: "true"
        hostnames:
          - "{{ .Release.Name }}.goyangi.io"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
      books:
        type: nfs
        server: nas.internal
        path: /mnt/world/media/books
        globalMounts:
          - path: /books
      bookdrop:
        type: nfs
        server: nas.internal
        path: /mnt/world/media/bookdrop
        globalMounts:
          - path: /bookdrop
