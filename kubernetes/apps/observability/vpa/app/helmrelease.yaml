---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpa
spec:
  interval: 30m
  chart:
    spec:
      chart: vpa
      version: 4.11.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    recommender:
      enabled: true
      resources:
        requests:
          cpu: 15m
          memory: 64Mi
        limits:
          memory: 256Mi
    updater:
      enabled: false
    admissionController:
      enabled: false
