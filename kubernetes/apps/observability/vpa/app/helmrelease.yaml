---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpa
spec:
  interval: 10m
  chart:
    spec:
      chart: vpa
      version: 4.11.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds
  values:
    recommender:
      enabled: true
      resources:
        requests:
          cpu: 15m
          memory: 64Mi
        limits:
          memory: 256Mi
    updater:
      enabled: false
    admissionController:
      enabled: false
