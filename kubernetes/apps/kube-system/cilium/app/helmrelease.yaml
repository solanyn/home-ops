---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
  interval: 1h
  values:
    # NOTE: Divergence from onedr0p/home-ops - disabled because we use tunnel mode
    # for cross-network nodepool workers (GCP VMs via Tailscale)
    autoDirectNodeRoutes: false
    ipv6:
      enabled: true
    enableIPv6BIGTCP: false
    ipv6NativeRoutingCIDR: fc69::/108
    bandwidthManager:
      enabled: true
      bbr: true
    bpf:
      datapathMode: netkit
      masquerade: true
      preallocateMaps: true
    bpfClockProbe: true
    bgpControlPlane:
      enabled: true
    cgroup:
      automount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    cluster:
      id: 1
      name: main
    cni:
      exclusive: false
    dashboards:
      enabled: true
    # NOTE: Divergence from onedr0p/home-ops - tailscale+ added for nodepool workers
    devices: "en+ eth+ tailscale+"
    enableIPv4BIGTCP: false
    # NOTE: Tunnel BIG TCP requires pending kernel support, disabled for now
    enableTunnelBigTCP: false
    endpointRoutes:
      enabled: true
    envoy:
      enabled: false
    hubble:
      enabled: false
    ipam:
      mode: kubernetes
    ipv4NativeRoutingCIDR: 10.42.0.0/16
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    l2announcements:
      enabled: false
    loadBalancer:
      algorithm: maglev
      # NOTE: DSR mode incompatible with VXLAN tunneling, using snat instead
      mode: snat
      serviceTopology: true
    localRedirectPolicies:
      enabled: true
    operator:
      dashboards:
        enabled: true
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
      replicas: 2
      rollOutPods: true
    pmtuDiscovery:
      enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
    rollOutCiliumPods: true
    # NOTE: Divergence from onedr0p/home-ops - tunnel mode instead of native
    # Required for nodepool workers on different L2 segments (GCP VMs connected
    # via Tailscale). VXLAN encapsulates pod traffic so it traverses tailscale0.
    routingMode: tunnel
    tunnelProtocol: vxlan
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    socketLB:
      enabled: true
      hostNamespaceOnly: true
