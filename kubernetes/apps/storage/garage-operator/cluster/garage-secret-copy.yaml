---
# Garage operator needs GARAGE_ADMIN_TOKEN from 1Password to talk to existing
# garage. The token lives in storage namespace (where the Helm chart put the
# 1Password-derived secret). Copy it across namespaces via ExternalSecret so
# the operator's GarageCluster CR can reference it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: garage-admin-token
spec:
    secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword-connect
    target:
        name: garage-admin-token
        creationPolicy: Owner
        template:
            data:
                admin-token: "{{ .GARAGE_ADMIN_TOKEN }}"
    dataFrom:
        - extract:
            key: garage
