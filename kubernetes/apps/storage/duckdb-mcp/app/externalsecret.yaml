apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: duckdb-mcp
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: duckdb-mcp-secret
    template:
      data:
        AWS_ACCESS_KEY_ID: "{{ .GARAGE_ROOT_USER }}"
        AWS_SECRET_ACCESS_KEY: "{{ .GARAGE_ROOT_PASSWORD }}"
        AWS_ENDPOINT_URL: http://garage.storage.svc.cluster.local:3900
        AWS_REGION: us-east-1
        AWS_DEFAULT_REGION: us-east-1
  dataFrom:
    - extract:
        key: garage
