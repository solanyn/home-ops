---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: duckdb-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: duckdb-mcp
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      duckdb-mcp:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: latest
            command: ["/usr/local/bin/uv"]
            args:
              - tool
              - run
              - mcp-server-motherduck
              - --db-path
              - ":memory:"
              - --read-write
              - --allow-switch-databases
              - --transport
              - sse
            env:
              ICEBERG_REST_CATALOG_URL: http://lakekeeper.storage.svc.cluster.local:8181/catalog
              UV_CACHE_DIR: /tmp/uv-cache
            envFrom:
              - secretRef:
                  name: duckdb-mcp-secret
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    persistence:
      tmp:
        type: emptyDir
        sizeLimit: 512Mi
        globalMounts:
          - path: /tmp
    service:
      app:
        ports:
          http:
            port: 8080
