---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: duckdb-mcp
spec:
  targetNamespace: storage
  dependsOn:
    - name: garage
      namespace: storage
    - name: lakekeeper
      namespace: storage
  interval: 1h
  path: ./kubernetes/apps/storage/duckdb-mcp/app
  postBuild:
    substitute:
      APP: duckdb-mcp
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
