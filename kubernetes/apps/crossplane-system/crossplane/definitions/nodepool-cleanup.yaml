---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nodepool-cleanup
  namespace: crossplane-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nodepool-cleanup
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nodepool-cleanup
subjects:
  - kind: ServiceAccount
    name: nodepool-cleanup
    namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: nodepool-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nodepool-cleanup
  namespace: crossplane-system
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: nodepool-cleanup
          restartPolicy: Never
          containers:
            - name: cleanup
              image: quay.io/curl/curl:8.19.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  APISERVER=https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}
                  TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

                  # Get nodepool nodes
                  NODES=$(curl -s --cacert $CACERT -H "Authorization: Bearer $TOKEN" \
                    "$APISERVER/api/v1/nodes?labelSelector=node.kubernetes.io/nodepool=true")

                  # Find NotReady nodes
                  STALE=$(echo "$NODES" | sed -n 's/.*"name":"\([^"]*\)".*/\1/p' | while read node; do
                    STATUS=$(echo "$NODES" | grep -A5 "$node" | grep -o '"Ready"' | head -1)
                    READY=$(echo "$NODES" | grep -A20 "\"type\":\"Ready\"" | grep -o '"status":"True"' | head -1)
                    if [ -z "$READY" ]; then
                      echo "$node"
                    fi
                  done)

                  if [ -z "$STALE" ]; then
                    echo "No stale nodepool nodes"
                    exit 0
                  fi

                  for node in $STALE; do
                    echo "Deleting stale node: $node"
                    curl -s --cacert $CACERT -H "Authorization: Bearer $TOKEN" \
                      -X DELETE "$APISERVER/api/v1/nodes/$node"
                  done
              resources:
                requests:
                  cpu: 5m
                  memory: 16Mi
                limits:
                  memory: 32Mi
