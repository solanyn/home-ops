---
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xcomputenodepools.home-ops.io
spec:
  group: home-ops.io
  names:
    kind: XComputeNodePool
    plural: xcomputenodepools
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                region:
                  type: string
                  default: australia-southeast1
                machineType:
                  type: string
                  default: e2-standard-8
                spot:
                  type: boolean
                  default: true
                diskSizeGb:
                  type: integer
                  default: 50
                diskType:
                  type: string
                  default: pd-standard
                image:
                  type: string
                  description: GCE boot image self-link
                userData:
                  type: string
                  description: Machine config (base64)
                targetSize:
                  type: integer
                  default: 0
                  description: Desired number of instances (0-8)
                maxSize:
                  type: integer
                  default: 8
            status:
              type: object
              properties:
                currentSize:
                  type: integer
                templateName:
                  type: string
                groupName:
                  type: string
