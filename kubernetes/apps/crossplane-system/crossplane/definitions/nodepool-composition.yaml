---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: compute-node-pool
  labels:
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: home-ops.io/v1alpha1
    kind: XComputeNodePool
  mode: Pipeline
  pipeline:
    - step: render-templates
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $secretItems := (index .extraResources "user-data").items }}
            {{- $secret := index $secretItems 0 }}
            {{- $secretKey := $spec.userDataSecretRef.key | default "NODEPOOL_USER_DATA" }}
            {{- $userData := index $secret.resource.data $secretKey | b64dec }}
            {{- $templateSelfLink := "" }}
            {{- if (index .observed.composed "instance-template") }}
            {{- $templateSelfLink = (index .observed.composed "instance-template").resource.status.atProvider.selfLinkUnique | default "" }}
            {{- end }}
            ---
            apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
            kind: ExtraResources
            requirements:
              user-data:
                apiVersion: v1
                kind: Secret
                matchName: {{ $spec.userDataSecretRef.name }}
            ---
            apiVersion: compute.gcp.upbound.io/v1beta2
            kind: InstanceTemplate
            metadata:
              name: {{ $name }}-template
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: instance-template
            spec:
              providerConfigRef:
                name: home-ops
              deletionPolicy: Delete
              forProvider:
                machineType: {{ $spec.machineType }}
                disk:
                  - sourceImage: {{ $spec.image }}
                    diskSizeGb: {{ $spec.diskSizeGb }}
                    diskType: {{ $spec.diskType }}
                    autoDelete: true
                    boot: true
                networkInterface:
                  - network: default
                    accessConfig:
                      - networkTier: STANDARD
                scheduling:
                  - preemptible: {{ $spec.spot }}
                    automaticRestart: false
                metadata:
                  user-data: |
                    {{ $userData | nindent 12 }}
                tags:
                  - compute-worker
                labels:
                  managed-by: crossplane
            ---
            apiVersion: compute.gcp.upbound.io/v1beta2
            kind: InstanceGroupManager
            metadata:
              name: {{ $name }}-mig
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: instance-group-manager
            spec:
              providerConfigRef:
                name: home-ops
              deletionPolicy: Delete
              forProvider:
                baseInstanceName: worker
                zone: {{ $spec.region }}-b
                targetSize: {{ $spec.targetSize }}
                version:
                  {{- if $templateSelfLink }}
                  - instanceTemplate: {{ $templateSelfLink }}
                  {{- else }}
                  - instanceTemplate: ""
                  {{- end }}
    - step: status-patches
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: instance-template
            base:
              apiVersion: compute.gcp.upbound.io/v1beta2
              kind: InstanceTemplate
            patches:
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.selfLinkUnique
                toFieldPath: status.templateName
          - name: instance-group-manager
            base:
              apiVersion: compute.gcp.upbound.io/v1beta2
              kind: InstanceGroupManager
            patches:
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: status.groupName
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.targetSize
                toFieldPath: status.currentSize
    - step: auto-ready
      functionRef:
        name: function-auto-ready
