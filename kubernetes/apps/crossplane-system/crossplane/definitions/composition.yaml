---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: compute-node-pool
  labels:
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: home-ops.io/v1alpha1
    kind: XComputeNodePool
  mode: Pipeline
  pipeline:
    - step: render-templates
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $name := .observed.composite.resource.metadata.name }}
            {{- $templateSelfLink := "" }}
            {{- if and .observed.composed (index .observed.composed "instance-template") }}
            {{- $templateSelfLink = (index .observed.composed "instance-template").resource.status.atProvider.selfLinkUnique | default "" }}
            {{- end }}
            ---
            apiVersion: compute.gcp.upbound.io/v1beta2
            kind: InstanceTemplate
            metadata:
              name: {{ $name }}-template
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: instance-template
            spec:
              providerConfigRef:
                name: home-ops
              deletionPolicy: Delete
              forProvider:
                machineType: {{ $spec.machineType }}
                region: australia-southeast1
                disk:
                  - sourceImage: {{ $spec.image }}
                    diskSizeGb: {{ $spec.diskSizeGb }}
                    diskType: {{ $spec.diskType }}
                    autoDelete: true
                    boot: true
                networkInterface:
                  - network: default
                    accessConfig:
                      - networkTier: STANDARD
                scheduling:
                  preemptible: {{ $spec.spot }}
                  automaticRestart: false
                metadata:
                  user-data: |
                    version: v1alpha1
                    machine:
                      type: worker
                      token: {{ $spec.machineToken }}
                      ca:
                        crt: {{ $spec.machineCaCrt }}
                      kubelet:
                        defaultRuntimeSeccompProfileEnabled: true
                        disableManifestsDirectory: true
                        extraArgs:
                          rotate-server-certificates: "true"
                        nodeIP:
                          validSubnets:
                            - 100.69.0.0/16
                      nodeLabels:
                        node-role.kubernetes.io/nodepool: "true"
                      network:
                        nameservers:
                          - 169.254.169.254
                          - 8.8.8.8
                      nodeTaints:
                        nodepool: "true:NoSchedule"
                      install:
                        image: factory.talos.dev/installer/4a0d65c669d46663f377e7161e50cfd570c401f26fd9e7bda34a0216b6f1922b:v1.12.6
                        wipe: false
                      features:
                        rbac: true
                        hostDNS:
                          enabled: true
                          forwardKubeDNSToHost: true
                          resolveMemberNames: true
                        kubePrism:
                          enabled: true
                          port: 7445
                      sysctls:
                        net.ipv6.conf.all.disable_ipv6: "1"
                        net.ipv6.conf.default.disable_ipv6: "1"
                      kernel:
                        modules:
                          - name: nbd
                      files:
                        - op: create
                          path: /etc/cri/conf.d/20-customization.part
                          content: |
                            [plugins."io.containerd.cri.v1.images"]
                              discard_unpacked_layers = false
                    cluster:
                      id: {{ $spec.clusterId }}
                      secret: {{ $spec.clusterSecret }}
                      controlPlane:
                        endpoint: https://192.168.42.120:6443
                      clusterName: home
                      network:
                        cni:
                          name: none
                        dnsDomain: cluster.local
                        podSubnets:
                          - 10.42.0.0/16
                        serviceSubnets:
                          - 10.43.0.0/16
                      token: {{ $spec.clusterToken }}
                      ca:
                        crt: {{ $spec.clusterCaCrt }}
                      discovery:
                        enabled: false
                      proxy:
                        disabled: true
                    ---
                    apiVersion: v1alpha1
                    kind: ExtensionServiceConfig
                    name: tailscale
                    environment:
                      - TS_AUTHKEY={{ $spec.headscaleAuthKey }}
                      - TS_EXTRA_ARGS=--login-server=http://hs.goyangi.io:18443 --accept-routes
                tags:
                  - compute-worker
                labels:
                  managed-by: crossplane
            ---
            apiVersion: compute.gcp.upbound.io/v1beta2
            kind: InstanceGroupManager
            metadata:
              name: {{ $name }}-mig
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: instance-group-manager
            spec:
              providerConfigRef:
                name: home-ops
              deletionPolicy: Delete
              forProvider:
                baseInstanceName: worker
                zone: {{ $spec.region }}-b
                targetSize: {{ $spec.targetSize }}
                version:
                  - name: primary
                    {{- if $templateSelfLink }}
                    instanceTemplate: {{ $templateSelfLink }}
                    {{- end }}
                    instanceTemplateRef:
                      name: {{ $name }}-template
            ---
            apiVersion: home-ops.io/v1alpha1
            kind: XComputeNodePool
            status:
              {{- if and .observed.composed (index .observed.composed "instance-template") }}
              templateName: {{ (index .observed.composed "instance-template").resource.status.atProvider.selfLinkUnique | default "" }}
              {{- end }}
              {{- if and .observed.composed (index .observed.composed "instance-group-manager") }}
              groupName: {{ (index .observed.composed "instance-group-manager").resource.metadata.name | default "" }}
              currentSize: {{ (index .observed.composed "instance-group-manager").resource.status.atProvider.targetSize | default 0 }}
              {{- end }}
    - step: auto-ready
      functionRef:
        name: function-auto-ready
