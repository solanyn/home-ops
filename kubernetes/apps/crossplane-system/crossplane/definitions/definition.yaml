---
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xcomputenodepools.home-ops.io
spec:
  group: home-ops.io
  names:
    kind: XComputeNodePool
    plural: xcomputenodepools
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                region:
                  type: string
                  default: australia-southeast1
                machineType:
                  type: string
                  default: e2-standard-8
                spot:
                  type: boolean
                  default: true
                diskSizeGb:
                  type: integer
                  default: 200
                diskType:
                  type: string
                  default: pd-standard
                image:
                  type: string
                  description: GCE boot image self-link
                machineToken:
                  type: string
                  description: Talos machine token
                machineCaCrt:
                  type: string
                  description: Talos machine CA cert (base64 PEM)
                clusterToken:
                  type: string
                  description: Talos cluster token
                clusterCaCrt:
                  type: string
                  description: Talos cluster CA cert (base64 PEM)
                clusterId:
                  type: string
                  description: Talos cluster ID
                clusterSecret:
                  type: string
                  description: Talos cluster secret
                headscaleAuthKey:
                  type: string
                  description: Headscale pre-auth key for tailscale
                targetSize:
                  type: integer
                  default: 0
                  description: Desired number of instances (0-8)
                maxSize:
                  type: integer
                  default: 8
            status:
              type: object
              properties:
                currentSize:
                  type: integer
                templateName:
                  type: string
                groupName:
                  type: string
