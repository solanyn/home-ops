---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crossplane
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: crossplane
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        GCP_PROJECT_ID: "{{ .GOOGLE_PROJECT_NAME }}"
        GCP_SERVICE_ACCOUNT: "{{ .GOOGLE_SERVICE_ACCOUNT_JSON }}"
        GCP_SERVICE_ACCOUNT_EMAIL: '{{ ( .GOOGLE_SERVICE_ACCOUNT_JSON | fromJson ).client_email }}'
  dataFrom:
    - extract:
        key: google
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: garage-credentials
    creationPolicy: Owner
    template:
      data:
        credentials: |
          {
            "endpoint": "http://garage.storage.svc.cluster.local:3903",
            "adminToken": "{{ .GARAGE_ADMIN_TOKEN }}"
          }
  dataFrom:
    - extract:
        key: garage
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nodepool-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nodepool-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        MACHINE_TOKEN: "{{ .MACHINE_TOKEN }}"
        MACHINE_CA_CRT: "{{ .MACHINE_CA_CRT }}"
        CLUSTER_ID: "{{ .CLUSTER_ID }}"
        CLUSTER_SECRET: "{{ .CLUSTER_SECRET }}"
        CLUSTER_TOKEN: "{{ .CLUSTER_TOKEN }}"
        CLUSTER_CA_CRT: "{{ .CLUSTER_CA_CRT }}"
        TAILSCALE_CLIENT_SECRET: "{{ .TAILSCALE_CLIENT_SECRET }}"
        NODEPOOL_USER_DATA: |
          version: v1alpha1
          machine:
            type: worker
            token: {{ .MACHINE_TOKEN }}
            ca:
              crt: {{ .MACHINE_CA_CRT }}
            kubelet:
              defaultRuntimeSeccompProfileEnabled: true
              disableManifestsDirectory: true
              extraArgs:
                rotate-server-certificates: "true"
              nodeIP:
                validSubnets:
                  - 100.69.0.0/16
            nodeLabels:
              node.kubernetes.io/nodepool: "true"
            nodeTaints:
              nodepool: "true:NoSchedule"
            install:
              image: factory.talos.dev/installer/4a0d65c669d46663f377e7161e50cfd570c401f26fd9e7bda34a0216b6f1922b:v1.13.0
              wipe: false
            features:
              rbac: true
              hostDNS:
                enabled: true
                forwardKubeDNSToHost: true
                resolveMemberNames: true
              kubePrism:
                enabled: true
                port: 7445
            kernel:
              modules:
                - name: nbd
            files:
              - op: create
                path: /etc/cri/conf.d/20-customization.part
                content: |
                  [plugins."io.containerd.cri.v1.images"]
                    discard_unpacked_layers = false
              - op: create
                path: /var/etc/tailscale/auth.env
                permissions: 0o600
                content: |
                  TS_AUTHKEY={{ .TAILSCALE_CLIENT_SECRET }}
                  TS_EXTRA_ARGS=--advertise-tags=tag:talos-nodes --accept-routes
          cluster:
            id: {{ .CLUSTER_ID }}
            secret: {{ .CLUSTER_SECRET }}
            controlPlane:
              endpoint: https://192.168.42.120:6443
            clusterName: home
            network:
              cni:
                name: none
              dnsDomain: cluster.local
              podSubnets:
                - 10.42.0.0/16
              serviceSubnets:
                - 10.43.0.0/16
            token: {{ .CLUSTER_TOKEN }}
            ca:
              crt: {{ .CLUSTER_CA_CRT }}
            discovery:
              enabled: false
            proxy:
              disabled: true
  dataFrom:
    - extract:
        key: talos
    - extract:
        key: tailscale
