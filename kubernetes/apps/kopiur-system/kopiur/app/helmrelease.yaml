---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  chartRef:
    kind: OCIRepository
    name: kopiur
  interval: 10m
  values:
    installScope: cluster
    metrics:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    secretProjection:
      enabled: true
    webhook:
      tls:
        mode: self
      serviceMonitor:
        enabled: true
