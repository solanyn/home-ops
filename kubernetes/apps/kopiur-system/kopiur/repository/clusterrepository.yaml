---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
    name: garage
spec:
    backend:
        s3:
            auth:
                secretRef:
                    name: kopiur-repository-secret
                    namespace: kopiur-system
            bucket: kopiur
            endpoint: garage.storage.svc.cluster.local:3900
            region: us-east-1
            tls:
                disableTls: true
    encryption:
        passwordSecretRef:
            name: kopiur-repository-secret
            namespace: kopiur-system
            key: KOPIA_PASSWORD
    create:
        enabled: true
    allowedNamespaces:
        all: true
    identityDefaults:
        hostnameExpr: namespace
        usernameExpr: namespace + '-' + policyName
    moverDefaults:
        securityContext:
            runAsUser: 1000
            runAsGroup: 1000
        podSecurityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        ttlSecondsAfterFinished: 86400
    maintenance:
        enabled: true
    scheduleDefaults:
        timezone: Australia/Sydney
