---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headplane
spec:
  chartRef:
    kind: OCIRepository
    name: headplane
  interval: 10m
  values:
    controllers:
      headplane:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/tale/headplane
              tag: latest
            env:
              HEADPLANE_CONFIG_PATH: /etc/headplane/config.yaml
              HEADPLANE_LOAD_ENV_OVERRIDES: "true"
              HEADPLANE_OIDC__HEADSCALE_API_KEY: "hskey-api-6STvDaXw1BE4-OxQc0uyR9T8XEa8nd1CMbwm3VATAraH2_9_6SRecxmREC8rBmKtz8Rb1-cgzt60q"
              HEADPLANE_OIDC__CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: headplane-oidc
                    key: HEADPLANE_OIDC_CLIENT_SECRET
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /admin
                    port: &port 3000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["headplane.goyangi.io"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 3000
    persistence:
      config:
        type: configMap
        name: headplane-config
        globalMounts:
          - path: /etc/headplane/config.yaml
            subPath: config.yaml
            readOnly: true
      headscale-config:
        type: configMap
        name: headscale-config-file
        globalMounts:
          - path: /etc/headscale/config.yaml
            subPath: config.yaml
            readOnly: true
      data:
        type: emptyDir
        globalMounts:
          - path: /var/lib/headplane
