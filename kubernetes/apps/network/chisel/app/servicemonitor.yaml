---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chisel-work-laptop
  namespace: network
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: chisel
  endpoints:
    - port: "9100"
      interval: 60s
      scrapeTimeout: 10s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "node_(cpu_seconds_total|memory_MemTotal_bytes|memory_MemAvailable_bytes|load1|load5|load15|filesystem_avail_bytes|filesystem_size_bytes|network_receive_bytes_total|network_transmit_bytes_total|uname_info)"
          action: keep
