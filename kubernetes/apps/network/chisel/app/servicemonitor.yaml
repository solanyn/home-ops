---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chisel-work-laptop
  namespace: network
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: chisel
  endpoints:
    - port: node-exporter
      interval: 60s
      scrapeTimeout: 10s
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "(up|node_cpu_seconds_total|node_memory_MemTotal_bytes|node_memory_MemAvailable_bytes|node_load1|node_load5|node_load15|node_filesystem_avail_bytes|node_filesystem_size_bytes|node_network_receive_bytes_total|node_network_transmit_bytes_total|node_uname_info)"
          action: keep
