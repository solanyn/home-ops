---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headscale-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: headscale-gateway
  interval: 10m
  values:
    controllers:
      headscale-gateway:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/tailscale/tailscale
              tag: v1.96.5
            env:
              # Connect to Headscale via noise LB (TLS-terminated by nginx sidecar)
              TS_LOGIN_SERVER: https://hs.goyangi.io
              # Advertise routes to cluster API server and pod/service CIDRs
              TS_EXTRA_ARGS: "--login-server=https://hs.goyangi.io --advertise-routes=192.168.42.0/24,10.43.0.0/16,10.42.0.0/16 --accept-routes --snat-subnet-routes=false"
              TS_USERSPACE: "false"
              TS_DEBUG_FIREWALL_MODE: nftables
              TS_KUBE_SECRET: headscale-gateway-state
              TS_HOSTNAME: k8s-gateway
            envFrom:
              - secretRef:
                  name: headscale-gateway-auth
            securityContext:
              capabilities:
                add: ["NET_ADMIN", "NET_RAW"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      hostAliases:
        - ip: 192.168.69.139
          hostnames:
            - hs.goyangi.io
      securityContext:
        runAsUser: 0
        runAsGroup: 0
    serviceAccount:
      headscale-gateway: {}
    persistence:
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        globalMounts:
          - path: /dev/net/tun
