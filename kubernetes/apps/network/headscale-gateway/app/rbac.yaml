---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-gateway
  namespace: network
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["headscale-gateway-state"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-gateway
  namespace: network
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: headscale-gateway
subjects:
  - kind: ServiceAccount
    name: headscale-gateway
    namespace: network
