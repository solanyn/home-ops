---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headscale
spec:
  chartRef:
    kind: OCIRepository
    name: headscale
  interval: 10m
  values:
    controllers:
      headscale:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/juanfont/headscale
              tag: v0.28.0
            args: ["serve"]
            env:
              HEADSCALE_DNS_BASE_DOMAIN: mesh.goyangi.io
              HEADSCALE_DNS_MAGIC_DNS: "true"
              HEADSCALE_DNS_NAMESERVERS_GLOBAL: 1.1.1.1 9.9.9.9
              HEADSCALE_PREFIXES_V4: 100.69.0.0/16
              HEADSCALE_PREFIXES_V6: fd7a:115c:a1e0::/48
              HEADSCALE_SERVER_URL: https://hs.goyangi.io:18443
              HEADSCALE_LISTEN_ADDR: 0.0.0.0:8080
              HEADSCALE_METRICS_LISTEN_ADDR: 0.0.0.0:9090
              HEADSCALE_NOISE_PRIVATE_KEY_PATH: /var/lib/headscale/noise_private.key
              HEADSCALE_DATABASE_TYPE: sqlite
              HEADSCALE_DATABASE_SQLITE_PATH: /var/lib/headscale/db.sqlite
              HEADSCALE_DERP_SERVER_ENABLED: "true"
              HEADSCALE_DERP_SERVER_REGION_ID: "900"
              HEADSCALE_DERP_SERVER_REGION_CODE: home
              HEADSCALE_DERP_SERVER_REGION_NAME: home
              HEADSCALE_DERP_SERVER_STUN_LISTEN_ADDR: 0.0.0.0:3478
              HEADSCALE_DERP_URLS: ""
              HEADSCALE_DERP_AUTO_UPDATE_ENABLED: "false"
              HEADSCALE_DERP_SERVER_PRIVATE_KEY_PATH: /var/lib/headscale/derp_server_private.key
            envFrom:
              - secretRef:
                  name: headscale-oidc
              - configMapRef:
                  name: headscale-config
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
          tls-proxy:
            image:
              repository: nginx
              tag: 1-alpine
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 32Mi
          ui:
            image:
              repository: ghcr.io/tale/headplane
              tag: latest
            env:
              HEADPLANE_CONFIG_PATH: /etc/headplane/config.yaml
              HEADPLANE_LOAD_ENV_OVERRIDES: "true"
              HEADPLANE_OIDC__HEADSCALE_API_KEY: "hskey-api-6STvDaXw1BE4-OxQc0uyR9T8XEa8nd1CMbwm3VATAraH2_9_6SRecxmREC8rBmKtz8Rb1-cgzt60q"
              HEADPLANE_OIDC__CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: headscale-oidc
                    key: HEADSCALE_OIDC_CLIENT_SECRET
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: *port
          noise:
            port: 443
            targetPort: 8080
          ui:
            port: 3000
          metrics:
            port: 9090
      noise:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.69.139
        externalTrafficPolicy: Cluster
        ports:
          noise-tcp:
            port: 443
            targetPort: 8443
            protocol: TCP
          derp-tcp:
            port: 18443
            targetPort: 8443
            protocol: TCP
      stun:
        type: LoadBalancer
        ipFamilies: [IPv4, IPv6]
        ipFamilyPolicy: PreferDualStack
        annotations:
          lbipam.cilium.io/ips: 192.168.69.138,fd5d:a293:f321:69::138
        externalTrafficPolicy: Local
        ports:
          stun-udp:
            port: 3478
            protocol: UDP
    serviceMonitor:
      app:
        serviceName: app
        endpoints:
          - port: metrics
    route:
      app:
        hostnames: ["headscale.goyangi.io"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 8080
      ui:
        hostnames: ["headscale.goyangi.io"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /admin
            backendRefs:
              - identifier: app
                port: 3000
    configMaps:
      config-file:
        data:
          config.yaml: |
            # NOTE: Divergence from default - file-based policy for GitOps ACL management
            policy:
              mode: file
              path: /etc/headscale/policy.json
      # NOTE: Divergence - ACL policy for nodepool subnet route distribution
      policy-file:
        data:
          policy.json: |
            {
              "acls": [
                {
                  "action": "accept",
                  "src": ["*"],
                  "dst": ["*:*"]
                }
              ],
              "autoApprovers": {
                "routes": {
                  "10.42.0.0/16": ["nodepool@goyangi.io"],
                  "10.43.0.0/16": ["nodepool@goyangi.io"],
                  "192.168.42.0/24": ["nodepool@goyangi.io"]
                }
              }
            }
    persistence:
      data:
        existingClaim: headscale
        globalMounts:
          - path: /var/lib/headscale
      headplane-config:
        type: configMap
        name: headplane-config
        advancedMounts:
          headscale:
            ui:
              - path: /etc/headplane/config.yaml
                subPath: config.yaml
                readOnly: true
      headplane-data:
        type: emptyDir
        advancedMounts:
          headscale:
            ui:
              - path: /var/lib/headplane
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      run:
        type: emptyDir
        globalMounts:
          - path: /var/run/headscale
      config:
        type: configMap
        name: headscale-config-file
        globalMounts:
          - path: /etc/headscale/config.yaml
            subPath: config.yaml
            readOnly: true
      policy:
        type: configMap
        name: headscale-policy-file
        advancedMounts:
          headscale:
            app:
              - path: /etc/headscale/policy.json
                subPath: policy.json
                readOnly: true
      tls:
        type: secret
        name: goyangi-io-tls
        advancedMounts:
          headscale:
            tls-proxy:
              - path: /etc/nginx/tls
                readOnly: true
      nginx-config:
        type: configMap
        name: headscale-nginx-config
        advancedMounts:
          headscale:
            tls-proxy:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
                readOnly: true
      nginx-cache:
        type: emptyDir
        advancedMounts:
          headscale:
            tls-proxy:
              - path: /var/cache/nginx
      nginx-run:
        type: emptyDir
        advancedMounts:
          headscale:
            tls-proxy:
              - path: /var/run
