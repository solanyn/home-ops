---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
data:
  HEADSCALE_OIDC_ISSUER: https://id.goyangi.io
  HEADSCALE_OIDC_CLIENT_ID: headscale
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config-file
data:
  config.yaml: |
    # Minimal config - most settings via env vars
    ---
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headplane-config
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 3000
      base_url: "https://headscale.goyangi.io"
      cookie_secret: "a6a31b710631fb02a4e831fb09ed115a"
      cookie_secure: true
      cookie_max_age: 86400
      data_path: "/var/lib/headplane"
    headscale:
      url: "http://localhost:8080"
      public_url: "https://headscale.goyangi.io"
      config_path: "/etc/headscale/config.yaml"
    oidc:
      issuer: "https://id.goyangi.io"
      client_id: "headscale"
    auth:
      provider: "oidc"
