---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headscale
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: headscale-secret
    creationPolicy: Owner
    template:
      data:
        HEADSCALE_OIDC_ISSUER: https://id.goyangi.io/
        HEADSCALE_OIDC_CLIENT_ID: headscale
        HEADSCALE_OIDC_CLIENT_SECRET: "{{ .OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: headscale
