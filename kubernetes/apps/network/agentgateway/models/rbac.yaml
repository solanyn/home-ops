---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentgateway-models
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentgateway-models
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentgateway-models
subjects:
  - kind: ServiceAccount
    name: agentgateway-models
roleRef:
  kind: Role
  name: agentgateway-models
  apiGroup: rbac.authorization.k8s.io
