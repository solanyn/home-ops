---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway-models
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentgateway-models
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentgateway-models
    spec:
      containers:
        - name: server
          image: busybox:1.37
          command: ["httpd", "-f", "-p", "8080", "-h", "/data"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: models
              mountPath: /data/v1
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 16Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8080
            initialDelaySeconds: 2
      volumes:
        - name: models
          configMap:
            name: agentgateway-models
            items:
              - key: models.json
                path: models
