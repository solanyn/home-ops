---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentgateway-models-sync
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: agentgateway-models
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: docker.io/alpine/k8s:1.35.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  MODELS='{"object":"list","data":[
                    {"id":"mlx-community/Qwen3.5-9B-4bit","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M3","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M2.7","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M2.7-highspeed","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M2.5","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M2.5-highspeed","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M2.1","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M2.1-highspeed","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"MiniMax-M2","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"deepseek-v4-flash","object":"model","owned_by":"agentgateway","created":0},
                    {"id":"deepseek-v4-pro","object":"model","owned_by":"agentgateway","created":0}
                  ]}'
                  echo "$MODELS" | jq -e . > /dev/null
                  kubectl create configmap agentgateway-models \
                    --from-literal=models.json="$MODELS" \
                    --dry-run=client -o yaml | kubectl apply -f -
