---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentgateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: agentgateway-secret
    template:
      engineVersion: v2
      data:
        credentials.json: "{{ .GOOGLE_SERVICE_ACCOUNT_JSON }}"
        GOOGLE_CLOUD_PROJECT: "{{ .GOOGLE_PROJECT_NAME }}"
  dataFrom:
    - extract:
        key: google
    - extract:
        key: agentgateway
