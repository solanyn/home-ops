---
# PII protection for external LLM providers
# Masks sensitive data before it leaves the cluster
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: pii-guard
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: llm
  backend:
    ai:
      promptGuard:
        request:
          - regex:
              action: Mask
              builtins:
                - PhoneNumber
                - Email
                - CreditCard
              matches:
                # Australian TFN (9 digits with optional spaces)
                - "\\b\\d{3}\\s?\\d{3}\\s?\\d{3}\\b"
                # Australian Medicare number
                - "\\b\\d{4}\\s?\\d{5}\\s?\\d{1}\\b"
          - webhook:
              failureMode: FailClosed
              backendRef:
                name: pii-adapter
                port: 8000
        response:
          - regex:
              action: Mask
              builtins:
                - PhoneNumber
                - Email
                - CreditCard
          - webhook:
              failureMode: FailClosed
              backendRef:
                name: pii-adapter
                port: 8000
