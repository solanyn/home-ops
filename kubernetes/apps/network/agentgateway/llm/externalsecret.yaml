---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentgateway-apikey
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: agentgateway-apikey
    creationPolicy: Owner
    template:
      data:
        personal: "{{ .AGENTGATEWAY_PERSONAL_API_KEY }}"
        work: "{{ .AGENTGATEWAY_WORK_API_KEY }}"
        gha: "{{ .AGENTGATEWAY_GHA_API_KEY }}"
        hermes: "{{ .AGENTGATEWAY_HERMES_API_KEY }}"
  dataFrom:
    - extract:
        key: agentgateway

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minimax-auth
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: minimax-auth
    creationPolicy: Owner
    template:
      data:
        Authorization: "Bearer {{ .MINIMAX_API_KEY }}"
        MINIMAX_API_KEY: "{{ .MINIMAX_API_KEY }}"
  dataFrom:
    - extract:
        key: minimax

