---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentgateway-apikey
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: agentgateway-apikey
    creationPolicy: Owner
    template:
      data:
        openclaw: "{{ .AGENTGATEWAY_OPENCLAW_API_KEY }}"
        personal: "{{ .AGENTGATEWAY_PERSONAL_API_KEY }}"
        work: "{{ .AGENTGATEWAY_WORK_API_KEY }}"
        gha: "{{ .AGENTGATEWAY_GHA_API_KEY }}"
  dataFrom:
    - extract:
        key: agentgateway

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kiro-auth
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kiro-auth
    creationPolicy: Owner
    template:
      data:
        Authorization: "Bearer {{ .KIRO_API_KEY }}"
  dataFrom:
    - extract:
        key: kiro
