---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: router
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ai
  traffic:
    phase: PreRouting
    transformation:
      request:
        set:
          - name: "x-model"
            value: 'coalesce(json(request.body).model, "")'
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
spec:
  parentRefs:
    - name: ai
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: RegularExpression
              name: x-model
              value: "^qwen.*"
      backendRefs:
        - name: mlx-qwen
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: RegularExpression
              name: x-model
              value: "^minimax.*"
      backendRefs:
        - name: minimax
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: RegularExpression
              name: x-model
              value: "^deepseek.*"
      backendRefs:
        - name: deepseek
          group: agentgateway.dev
          kind: AgentgatewayBackend
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
          headers:
            - type: RegularExpression
              name: x-model
              value: "^opencode-go/"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /zen/go/v1/chat/completions
      backendRefs:
        - name: opencode
          group: agentgateway.dev
          kind: AgentgatewayBackend
