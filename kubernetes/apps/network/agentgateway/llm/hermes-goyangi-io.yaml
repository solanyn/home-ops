---
# Hermes Agent — public ingress for the hermes gateway process on the Mac.
# Mirrors the bluebubbles-webhook pattern: Service + EndpointSlice + HTTPRoute.
# The hermes gateway is the multi-channel agent running on 192.168.10.30 (mac-mini);
# it terminates the webhook path on :8645 already exposed via bluebubbles.goyangi.io.
# This route exposes the same listener on a clean domain for general agent access
# (webhooks from other integrations, admin endpoints, health checks, future CLI).
apiVersion: v1
kind: Service
metadata:
  name: hermes-gateway
spec:
  ports:
    - name: http
      port: 8645
      targetPort: 8645
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: hermes-gateway-1
  labels:
    kubernetes.io/service-name: hermes-gateway
addressType: IPv4
ports:
  - name: http
    port: 8645
    protocol: TCP
endpoints:
  - addresses:
      - "192.168.10.30"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-goyangi-io
spec:
  hostnames:
    - "hermes.goyangi.io"
  parentRefs:
    - name: ai
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hermes-gateway
          port: 8645
