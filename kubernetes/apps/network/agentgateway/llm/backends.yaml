---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: claude-opus
spec:
  ai:
    groups:
      # Primary: Opus via kiro-gateway
      - providers:
          - name: kiro
            openai:
              model: claude-opus-4-7
            host: mac.internal
            port: 8001
            policies:
              auth:
                secretRef:
                  name: kiro-auth
      # Fallback: Gemma 4 local
      - providers:
          - name: mlx-gemma
            openai:
              model: gemma-4-e4b
            host: mac.internal
            port: 8080
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: claude-haiku
spec:
  ai:
    groups:
      - providers:
          - name: kiro
            openai:
              model: claude-haiku-4.5
            host: mac.internal
            port: 8001
            policies:
              auth:
                secretRef:
                  name: kiro-auth
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mlx-gemma
spec:
  ai:
    provider:
      openai:
        model: gemma-4-e4b
      host: mac.internal
      port: 8080
