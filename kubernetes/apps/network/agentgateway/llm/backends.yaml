---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: claude-opus
spec:
  ai:
    groups:
      - providers:
          - name: kiro
            openai:
              model: claude-opus-4.6
            host: mac.internal
            port: 8001
            policies:
              auth:
                secretRef:
                  name: kiro-auth
