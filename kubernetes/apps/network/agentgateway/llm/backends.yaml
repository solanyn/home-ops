---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: claude-opus
spec:
  ai:
    groups:
      - providers:
          - name: kiro
            openai:
              model: claude-opus-4.6
            host: mac.internal
            port: 8001
            policies:
              auth:
                secretRef:
                  name: kiro-auth
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: claude-haiku
spec:
  ai:
    groups:
      - providers:
          - name: kiro
            openai:
              model: claude-haiku-4.5
            host: mac.internal
            port: 8001
            policies:
              auth:
                secretRef:
                  name: kiro-auth
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mlx-gemma
spec:
  ai:
    provider:
      openai:
        model: mlx-community/gemma-4-12B-it-qat-4bit
      host: mac.internal
      port: 8080
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: minimax
spec:
  ai:
    groups:
      - providers:
          - name: minimax
            openai: {}
            host: api.minimaxi.chat
            port: 443
            policies:
              auth:
                secretRef:
                  name: minimax-auth
              tls: {}
