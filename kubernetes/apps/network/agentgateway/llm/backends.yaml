---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mlx-qwen
spec:
  ai:
    provider:
      openai:
        model: mlx-community/Qwen3.5-9B-4bit
      host: mac.internal
      port: 8080
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: minimax
spec:
  ai:
    groups:
      - providers:
          - name: minimax
            openai: {}
            host: api.minimaxi.chat
            port: 443
            policies:
              auth:
                secretRef:
                  name: minimax-auth
              tls: {}
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: deepseek
spec:
  ai:
    groups:
      - providers:
          - name: deepseek
            openai: {}
            host: api.deepseek.com
            port: 443
            policies:
              auth:
                secretRef:
                  name: deepseek-auth
              tls: {}
