---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: claude-opus
spec:
  ai:
    groups:
      # Primary: Opus via kiro-gateway
      - providers:
          - name: kiro
            openai:
              model: claude-opus-4.6
            host: mac.internal
            port: 8001
            policies:
              auth:
                secretRef:
                  name: kiro-auth
      # Fallback: Gemma 4 local
      - providers:
          - name: mlx-gemma
            openai:
              model: mlx-community/gemma-4-e4b-it-4bit
            host: mac.internal
            port: 8080
