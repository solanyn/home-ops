---
apiVersion: v1
kind: Service
metadata:
  name: mlx-audio
spec:
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: mlx-audio-1
  labels:
    kubernetes.io/service-name: mlx-audio
addressType: IPv4
ports:
  - name: http
    port: 8000
    protocol: TCP
endpoints:
  - addresses:
      - "192.168.10.30"
---
apiVersion: v1
kind: Service
metadata:
  name: scrib-audio
spec:
  ports:
    - name: http
      port: 8002
      targetPort: 8002
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: scrib-audio-1
  labels:
    kubernetes.io/service-name: scrib-audio
addressType: IPv4
ports:
  - name: http
    port: 8002
    protocol: TCP
endpoints:
  - addresses:
      - "192.168.10.30"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-tts
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/audio/speech
      backendRefs:
        - name: mlx-audio
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-stt
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/audio/transcriptions
      backendRefs:
        - name: mlx-audio
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-vad
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/audio/vad
      backendRefs:
        - name: mlx-audio
          port: 8000
