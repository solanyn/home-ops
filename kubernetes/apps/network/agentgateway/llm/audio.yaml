---
apiVersion: v1
kind: Service
metadata:
  name: mlx-audio
spec:
  type: ExternalName
  externalName: mac.internal
  ports:
    - name: http
      port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-tts
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/audio/speech
      backendRefs:
        - name: mlx-audio
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-stt
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/audio/transcriptions
      backendRefs:
        - name: mlx-audio
          port: 8000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-vad
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/audio/vad
      backendRefs:
        - name: mlx-audio
          port: 8000
