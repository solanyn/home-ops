# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: agentgateway-discovery
spec:
    chartRef:
        kind: OCIRepository
        name: agentgateway-discovery
    interval: 10m
    values:
        controllers:
            discovery:
                type: cronjob
                cronjob:
                    schedule: "*/15 * * * *"
                    concurrencyPolicy: Replace
                    successfulJobsHistory: 1
                    failedJobsHistory: 3
                    backoffLimit: 1
                containers:
                    app:
                        image:
                            repository: docker.io/alpine/k8s
                            tag: 1.35.0
                        command: ["/bin/sh", "/config/discovery.sh"]
                        envFrom:
                            - secretRef:
                                  name: minimax-auth
                            - secretRef:
                                  name: deepseek-auth
                        securityContext:
                            allowPrivilegeEscalation: false
                            readOnlyRootFilesystem: false
                            capabilities: { drop: ["ALL"] }
                        resources:
                            requests:
                                cpu: 10m
                                memory: 16Mi
                            limits:
                                memory: 64Mi
                pod:
                    restartPolicy: OnFailure
                serviceAccount:
                    name: agentgateway-models
        defaultPodOptions:
            securityContext:
                seccompProfile: { type: RuntimeDefault }
        persistence:
            config:
                type: configMap
                name: discovery-config
                globalMounts:
                    - path: /config
                      readOnly: true