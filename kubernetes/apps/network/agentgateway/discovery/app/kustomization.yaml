# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: network
resources:
    - ./ocirepository.yaml
    - ./helmrelease.yaml
configMapGenerator:
    - name: discovery-config
      files:
          - discovery.sh=./resources/discovery.sh
generatorOptions:
    disableNameSuffixHash: true