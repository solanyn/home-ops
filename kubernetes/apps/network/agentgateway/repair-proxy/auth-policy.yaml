---
# API key auth for the repair-proxy HTTPRoute on envoy-internal.
# Uses the same agentgateway-apikey secret as the ai Gateway so clients
# keep using the same Bearer token unchanged.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: repair-proxy-auth
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: repair-proxy
  traffic:
    apiKeyAuthentication:
      mode: Strict
      secretRef:
        name: agentgateway-apikey
