---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: repair-proxy
spec:
  hostnames:
    - gateway.goyangi.io
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: repair-grpc
          port: 8080
