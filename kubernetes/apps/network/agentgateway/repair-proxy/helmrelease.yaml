# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: repair-grpc
spec:
  chartRef:
    kind: OCIRepository
    name: repair-grpc
  interval: 10m
  values:
    controllers:
      repair-grpc:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/repair-grpc
              tag: 2026.06.31@sha256:da8b6c3a8c3ebf57ef82964c993c33efeb3f47d419a49b4a8f2b21031a2b9714
            env:
              LISTEN_ADDR: 0.0.0.0:4444
              METRICS_ADDR: 0.0.0.0:9090
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 20
                  timeoutSeconds: 6
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 10
                  timeoutSeconds: 6
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 10
                  timeoutSeconds: 6
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: repair-grpc
        ports:
          grpc:
            port: 4444
            protocol: TCP
            appProtocol: kubernetes.io/h2c
          metrics:
            port: 9090
    serviceMonitor:
      app:
        serviceName: "{{ .Release.Name }}"
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 30s
