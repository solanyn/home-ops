# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: repair-grpc
spec:
  chartRef:
    kind: OCIRepository
    name: repair-grpc
  interval: 10m
  values:
    controllers:
      repair-grpc:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/solanyn/repair-grpc
              tag: sha256-bd3179d3f3b3fc334ab40b5d8cf75fcf1456ee52a610c020b4b5de25790060be.sig
              pullPolicy: Always
            env:
              LOG_LEVEL: debug
              METRICS_ADDR: 0.0.0.0:9090
              MODE: proxy
              PROXY_ADDR: 0.0.0.0:8080
              UPSTREAM: https://agentgateway-proxy.network.svc:443
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 20
                  timeoutSeconds: 6
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 10
                  timeoutSeconds: 6
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  periodSeconds: 10
                  timeoutSeconds: 6
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: repair-grpc
        ports:
          webhook:
            port: 8080
          metrics:
            port: 9090
    serviceMonitor:
      app:
        serviceName: "{{ .Release.Name }}"
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 30s
