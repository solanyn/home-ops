---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: opentelemetry-ebpf
spec:
  targetNamespace: o11y
  dependsOn:
    - name: opentelemetry-collector
      namespace: o11y
  interval: 1h
  path: ./kubernetes/apps/o11y/opentelemetry-ebpf/app
  postBuild:
    substitute:
      APP: opentelemetry-ebpf
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
