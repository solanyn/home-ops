---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
spec:
  interval: 10m
  chart:
    spec:
      chart: goldilocks
      version: 10.3.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds
  values:
    vpa:
      enabled: false
    dashboard:
      enabled: true
      resources:
        requests:
          cpu: 15m
          memory: 32Mi
        limits:
          memory: 128Mi
    controller:
      resources:
        requests:
          cpu: 15m
          memory: 32Mi
        limits:
          memory: 128Mi
