apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubeflow
resources:
  # renovate: datasource=github-releases depName=kubeflow/kubeflow
  - https://raw.githubusercontent.com/kubeflow/kubeflow/v1.10.0/components/profile-controller/config/crd/bases/kubeflow.org_profiles.yaml
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./rbac.yaml
  - ./httproute.yaml
  # Istio AuthorizationPolicy CRD stub — profiles-manager watches this resource
  # but we use Envoy Gateway, not Istio. Installing the CRD alone stops the crash loop.
  # renovate: datasource=github-releases depName=istio/api
  - https://raw.githubusercontent.com/istio/api/1.24.3/kubernetes/customresourcedefinitions.gen.yaml
