---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spark-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: spark-operator
      version: 2.5.0
      sourceRef:
        kind: HelmRepository
        name: spark-operator
  values:
    sparkJobNamespace: ""
    webhook:
      enable: true
    nodeSelector:
      node.kubernetes.io/nodepool: "true"
    tolerations:
      - key: nodepool
        operator: Equal
        value: "true"
        effect: NoSchedule
