---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ml-pipeline
  namespace: kubeflow
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ml-pipeline-secret
    template:
      data:
        # MariaDB / MySQL
        DBCONFIG_USER: "{{ .KUBEFLOW_MARIADB_USER }}"
        DBCONFIG_PASSWORD: "{{ .KUBEFLOW_MARIADB_PASSWORD }}"
        # S3 (Garage)
        OBJECTSTORECONFIG_ACCESSKEY: "{{ .GARAGE_ROOT_USER }}"
        OBJECTSTORECONFIG_SECRETACCESSKEY: "{{ .GARAGE_ROOT_PASSWORD }}"
  dataFrom:
    - extract:
        key: kubeflow
    - extract:
        key: garage
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mlpipeline-minio-artifact
  namespace: kubeflow
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mlpipeline-minio-artifact
    template:
      data:
        accesskey: "{{ .GARAGE_ROOT_USER }}"
        secretkey: "{{ .GARAGE_ROOT_PASSWORD }}"
  dataFrom:
    - extract:
        key: garage
