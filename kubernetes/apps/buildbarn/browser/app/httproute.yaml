---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: buildbarn-browser
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  hostnames:
    - browser.buildbarn.goyangi.io
  rules:
    - backendRefs:
        - name: buildbarn-browser
          port: 7984
