---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: buildbarn-browser
spec:
  chartRef:
    kind: OCIRepository
    name: buildbarn-browser
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      enableServiceLinks: false
    controllers:
      app:
        containers:
          app:
            image:
              repository: ghcr.io/buildbarn/bb-browser
              tag: 20260319T101727Z-1731858
            args:
              - /config/browser.jsonnet
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: 7984
          metrics:
            port: 9980
    persistence:
      config:
        type: configMap
        name: buildbarn-config
        globalMounts:
          - path: /config
