---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: buildbarn-worker
spec:
  chartRef:
    kind: OCIRepository
    name: buildbarn-worker
  interval: 1h
  install:
    timeout: 15m
    remediation:
      retries: -1
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/nodepool: "true"
      tolerations:
        - key: nodepool
          operator: Equal
          value: "true"
          effect: NoSchedule
    controllers:
      app:
        replicas: 2
        initContainers:
          runner-installer:
            image:
              repository: ghcr.io/buildbarn/bb-runner-installer
              tag: 20260326T163248Z-e6ab874
          volume-init:
            image:
              repository: busybox
              tag: "1.37"
            command:
              - sh
              - -c
              - mkdir -p /worker/build /worker/cache /worker/tmp
        containers:
          app:
            image:
              repository: ghcr.io/buildbarn/bb-worker
              tag: 20260326T163248Z-e6ab874
            args:
              - /config/worker-ubuntu22-04.jsonnet
            env:
              NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
            resources:
              requests:
                cpu: "1"
                memory: 1Gi
              limits:
                memory: 2Gi
          runner:
            image:
              repository: ghcr.io/catthehacker/ubuntu
              tag: act-22.04@sha256:0b3481444ea4b9de96575448f1cf76e8d83e854bf18c69da146ee18152e20507
            command:
              - /bb/bb_runner
            args:
              - /config/runner-ubuntu22-04.jsonnet
            resources:
              requests:
                cpu: "1"
                memory: 1Gi
              limits:
                memory: 2Gi
    persistence:
      config:
        type: configMap
        name: buildbarn-config
        globalMounts:
          - path: /config
      runner-installer:
        type: emptyDir
        advancedMounts:
          app:
            runner-installer:
              - path: /bb
            runner:
              - path: /bb
      worker:
        type: emptyDir
        advancedMounts:
          app:
            volume-init:
              - path: /worker
            app:
              - path: /worker
            runner:
              - path: /worker
