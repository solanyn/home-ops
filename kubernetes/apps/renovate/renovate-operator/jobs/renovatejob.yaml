---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  schedule: "0 */4 * * *"
  provider:
    name: github
  secretRef: renovate-secret
  discoverTopics:
    - renovate
  discoveryFilters:
    - "solanyn/*"
  image: ghcr.io/renovatebot/renovate:latest
  parallelism: 3
  extraEnv:
    - name: LOG_LEVEL
      value: debug
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
