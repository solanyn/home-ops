---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: liqo
spec:
  chart:
    spec:
      chart: liqo
      version: "v1.1.2"
      sourceRef:
        kind: HelmRepository
        name: liqo
  interval: 1h
  values:
    apiServer:
      address: "https://10.43.0.1:443"
      trustedCA: true
    discovery:
      config:
        clusterID: master
    ipam:
      podCIDR: 10.42.0.0/16
      serviceCIDR: 10.43.0.0/16
      externalCIDR: 10.60.0.0/16
    metrics:
      enabled: true
      prometheusOperator:
        enabled: true
    authentication:
      tlsCompatibilityMode: true
    controllerManager:
      config:
        tlsCompatibilityMode: true
      metrics:
        serviceMonitor:
          enabled: true
    gateway:
      metrics:
        serviceMonitor:
          enabled: true
    webhook:
      replicas: 2
      pod:
        priorityClassName: system-cluster-critical
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/component: webhook
                      app.kubernetes.io/part-of: liqo
                  topologyKey: kubernetes.io/hostname
      metrics:
        serviceMonitor:
          enabled: true
    crdReplicator:
      metrics:
        podMonitor:
          enabled: true
    virtualKubelet:
      metrics:
        podMonitor:
          enabled: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: MutatingWebhookConfiguration
              name: liqo-webhook
            patch: |
              - op: replace
                path: /webhooks/0/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/1/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/2/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/3/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/4/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/5/timeoutSeconds
                value: 30
          - target:
              kind: ValidatingWebhookConfiguration
              name: liqo-webhook
            patch: |
              - op: replace
                path: /webhooks/0/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/1/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/2/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/3/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/4/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/5/timeoutSeconds
                value: 30
