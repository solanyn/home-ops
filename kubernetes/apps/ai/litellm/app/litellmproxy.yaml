---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
    name: main
spec:
    replicas: 2
    generalSettings:
        master_key: os.environ/LITELLM_MASTER_KEY
        database_url: os.environ/DATABASE_URL
    routerSettings:
        routing_strategy: simple-shuffle
    callbacks:
        success:
            - prometheus
    env:
        - name: PRESIDIO_ANALYZER_API_BASE
          value: http://presidio.ai.svc.cluster.local:3000
    envFrom:
        - secretRef:
              name: litellm-secret
    route:
        hostnames:
            - litellm.goyangi.io
        parentRefs:
            - name: envoy-external
              namespace: network
