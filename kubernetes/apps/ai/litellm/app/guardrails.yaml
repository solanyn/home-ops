---
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMGuardrail
metadata:
    name: presidio-pre
spec:
    guardrailName: presidio-pii-pre
    guardrail: presidio
    mode: pre_call
    defaultOn: true
    apiBase: http://presidio.ai.svc.cluster.local:3000
    params:
        output_parse_pii: true
        pii_entities_config:
            CREDIT_CARD: MASK
            IBAN_CODE: MASK
            AU_TFN: MASK
            AU_MEDICARE: MASK
            EMAIL_ADDRESS: MASK
            IP_ADDRESS: MASK
            AWS_ACCESS_KEY: MASK
            AWS_SECRET_KEY: MASK
            GITHUB_TOKEN: MASK
