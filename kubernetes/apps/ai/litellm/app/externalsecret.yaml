---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: litellm
spec:
    secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword-connect
    target:
        name: litellm-secret
        creationPolicy: Owner
        template:
            data:
                LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
                DATABASE_URL: "postgresql://{{ .LITELLM_POSTGRES_USER }}:{{ .LITELLM_POSTGRES_PASSWORD }}@postgres-rw.storage.svc.cluster.local/litellm"
                INIT_POSTGRES_HOST: &dbHost postgres-rw.storage.svc.cluster.local
                INIT_POSTGRES_DBNAME: &dbName litellm
                INIT_POSTGRES_USER: &dbUser "{{ .LITELLM_POSTGRES_USER }}"
                INIT_POSTGRES_PASS: &dbPass "{{ .LITELLM_POSTGRES_PASSWORD }}"
                INIT_POSTGRES_SUPER_USER: postgres
                INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
    dataFrom:
        - extract:
              key: litellm
        - extract:
              key: cloudnative-pg
---
apiVersion: external-secrets.io/v1
