# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: presidio
spec:
    chartRef:
        kind: OCIRepository
        name: presidio
    interval: 10m
    values:
        controllers:
            presidio:
                containers:
                    app:
                        image:
                            repository: ghcr.io/solanyn/presidio-analyzer-sm
                            tag: 2.2.362
                        probes:
                            startup:
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /health
                                        port: 3000
                                    periodSeconds: 10
                                    timeoutSeconds: 5
                                    failureThreshold: 30
                            readiness:
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /health
                                        port: 3000
                                    periodSeconds: 10
                                    timeoutSeconds: 5
                                    failureThreshold: 3
                        resources:
                            requests:
                                cpu: 500m
                                memory: 512Mi
                            limits:
                                memory: 1Gi
        service:
            app:
                controller: presidio
                ports:
                    http:
                        port: 3000
