---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: presidio
spec:
  chartRef:
    kind: OCIRepository
    name: presidio
  interval: 1h
  values:
    controllers:
      presidio:
        containers:
          analyzer:
            image:
              repository: ghcr.io/solanyn/presidio-analyzer-sm
              tag: 2.2.362
            ports:
              - name: http
                containerPort: 3000
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3000
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests: {cpu: 500m, memory: 512Mi}
              limits: {memory: 1Gi}
          anonymizer:
            image:
              repository: mcr.microsoft.com/presidio-anonymizer
              tag: 2.2.362@sha256:652493f687c1b7e58655e1dee7ee355494ef2fba5d17c2506bf28db77cb10b67
            env:
              - name: PORT
                value: "3001"
            ports:
              - name: http
                containerPort: 3001
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3001
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests: {cpu: 500m, memory: 512Mi}
              limits: {memory: 1Gi}
    service:
      presidio:
        controller: presidio
        ports:
          analyzer: {port: 3000}
          anonymizer: {port: 3001}
