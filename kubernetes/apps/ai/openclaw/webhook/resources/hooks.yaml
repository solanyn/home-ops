---
- id: github
  execute-command: /config/github.sh
  command-working-directory: /tmp
  pass-body-to-command: true
  pass-environment-to-command:
    - envname: OPENCLAW_HOOKS_TOKEN
      source: string
      name: '{{ getenv "OPENCLAW_HOOKS_TOKEN" }}'
  pass-arguments-to-command:
    - source: header
      name: X-GitHub-Event
  trigger-rule:
    match:
      type: payload-hmac-sha256
      secret: '{{ getenv "GITHUB_WEBHOOK_SECRET" }}'
      parameter:
        source: header
        name: X-Hub-Signature-256
- id: forgejo
  execute-command: /config/forgejo.sh
  command-working-directory: /tmp
  pass-body-to-command: true
  pass-environment-to-command:
    - envname: PUSHOVER_USER_KEY
      source: string
      name: '{{ getenv "PUSHOVER_USER_KEY" }}'
    - envname: FORGEJO_PUSHOVER_TOKEN
      source: string
      name: '{{ getenv "FORGEJO_PUSHOVER_TOKEN" }}'
  pass-arguments-to-command:
    - source: header
      name: X-Forgejo-Event
  trigger-rule:
    match:
      type: payload-hmac-sha256
      secret: '{{ getenv "FORGEJO_WEBHOOK_SECRET" }}'
      parameter:
        source: header
        name: X-Forgejo-Signature
- id: 'opencode-{{ getenv "OPENCODE_WEBHOOK_TOKEN" }}'
  execute-command: /config/opencode.sh
  command-working-directory: /tmp
  pass-body-to-command: true
  pass-environment-to-command:
    - envname: OPENCLAW_HOOKS_TOKEN
      source: string
      name: '{{ getenv "OPENCLAW_HOOKS_TOKEN" }}'
