---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-webhook
spec:
  chartRef:
    kind: OCIRepository
    name: openclaw-webhook
  interval: 1h
  values:
    controllers:
      openclaw-webhook:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/webhook
              tag: 2.8.3@sha256:b5a6defe3462a7bba13342bb878b20504f3699644a442039dad21285edca0082
            env:
              WEBHOOK__PORT: &port 80
              TZ: Australia/Sydney
            envFrom:
              - secretRef:
                  name: openclaw-webhook-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames: ["webhook.goyangi.io"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /hooks/
            backendRefs:
              - name: openclaw-webhook
                port: 80
    persistence:
      config:
        type: configMap
        name: openclaw-webhook-config
        defaultMode: 0775
        globalMounts:
          - readOnly: true
