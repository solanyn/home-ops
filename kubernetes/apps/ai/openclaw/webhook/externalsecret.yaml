---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-webhook
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-webhook-secret
    template:
      data:
        OPENCLAW_HOOKS_TOKEN: "{{ .OPENCLAW_HOOKS_TOKEN }}"
        GITHUB_WEBHOOK_SECRET: "{{ .GITHUB_WEBHOOK_SECRET }}"
        OPENCODE_WEBHOOK_TOKEN: "{{ .OPENCODE_WEBHOOK_TOKEN }}"
        FORGEJO_WEBHOOK_SECRET: "{{ .FORGEJO_WEBHOOK_SECRET }}"
        PUSHOVER_USER_KEY: "{{ .PUSHOVER_USER_KEY }}"
        FORGEJO_PUSHOVER_TOKEN: "{{ .FORGEJO_PUSHOVER_TOKEN }}"
  dataFrom:
    - extract:
        key: openclaw-webhook
    - extract:
        key: forgejo
    - extract:
        key: pushover
