---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
  - ./ocirepository.yaml
configMapGenerator:
  - name: openclaw-webhook-config
    files:
      - hooks.yaml=./resources/hooks.yaml
      - github-ci.sh=./resources/github-ci.sh
      - github-pr.sh=./resources/github-pr.sh
      - flux-alert.sh=./resources/flux-alert.sh
      - grafana-alert.sh=./resources/grafana-alert.sh
      - alertmanager-alert.sh=./resources/alertmanager-alert.sh
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
