---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: openclaw-sandbox
spec:
  replicas: 1
  podTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-sandbox
    spec:
      serviceAccountName: openclaw
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: sandbox
          image: ghcr.io/solanyn/openclaw-sandbox:2.0.0@sha256:1eff16b07a7f23bd47005738b8ec4a9bdf1117bc4d2b69c47e65cd521f134c68
          command: ["/usr/sbin/sshd", "-D", "-e", "-p", "2222"]
          ports:
            - containerPort: 2222
              name: ssh
              protocol: TCP
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "10.43.0.1"
            - name: KUBERNETES_SERVICE_PORT
              value: "443"
          envFrom:
            - secretRef:
                name: openclaw-sandbox-secret
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: authorized-keys
              mountPath: /etc/ssh/authorized_keys/node
              subPath: authorized_keys
              readOnly: true
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: authorized-keys
          configMap:
            name: openclaw-sandbox-authorized-keys
            items:
              - key: authorized_keys
                path: authorized_keys
            defaultMode: 0644
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-sandbox
