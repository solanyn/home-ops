---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: openclaw-sandbox
spec:
  replicas: 1
  podTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-sandbox
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: sandbox
          image: ghcr.io/solanyn/openclaw-sandbox:2.0.0@sha256:29a5ed2ff83d31baa6fc21e1ea1866f64c542c609abfa78118aee44fb009cb95
          ports:
            - containerPort: 2222
              name: ssh
              protocol: TCP
          env:
            - name: KUBECONFIG
              value: /workspace/.kube/config
            - name: KUBERNETES_SERVICE_HOST
              value: "10.43.0.1"
            - name: KUBERNETES_SERVICE_PORT
              value: "443"
            - name: SSH_PORT
              value: "2222"
          envFrom:
            - secretRef:
                name: openclaw-sandbox-secret
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: authorized-keys
              mountPath: /home/node/.ssh/authorized_keys
              subPath: authorized_keys
              readOnly: true
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: authorized-keys
          secret:
            secretName: openclaw-sandbox-secret
            items:
              - key: authorized_keys
                path: authorized_keys
                mode: 0600
            defaultMode: 0600
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-sandbox
