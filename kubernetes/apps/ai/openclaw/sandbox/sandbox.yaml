---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: openclaw-sandbox
spec:
  replicas: 1
  podTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-sandbox
    spec:
      serviceAccountName: openclaw
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      # NOTE: Divergence from onedr0p/home-ops — co-locate with openclaw to share RWO PVC
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: openclaw
              topologyKey: kubernetes.io/hostname
      containers:
        - name: sandbox
          image: ghcr.io/solanyn/openclaw-sandbox:4.0.0@sha256:0b890bf3088e0b9fd3dddd48b24678d696ae348052242670829227c1ab232d92
          command:
            - /bin/sh
            - -c
            - |
              echo "export OP_SERVICE_ACCOUNT_TOKEN='${OP_SERVICE_ACCOUNT_TOKEN}'" > /etc/profile.d/op.sh
              exec /usr/sbin/sshd -D -e -p 2222
          ports:
            - containerPort: 2222
              name: ssh
              protocol: TCP
          env:
            - name: KUBERNETES_SERVICE_HOST
              value: "10.43.0.1"
            - name: KUBERNETES_SERVICE_PORT
              value: "443"
          envFrom:
            - secretRef:
                name: openclaw-sandbox-secret
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: authorized-keys
              mountPath: /etc/ssh/authorized_keys/node
              subPath: authorized_keys
              readOnly: true
            # NOTE: Shares openclaw PVC workspace instead of separate sandbox PVC
            - name: workspace
              mountPath: /workspace
              subPath: .openclaw/workspace
      volumes:
        - name: authorized-keys
          configMap:
            name: openclaw-sandbox-authorized-keys
            items:
              - key: authorized_keys
                path: authorized_keys
            defaultMode: 0644
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw
