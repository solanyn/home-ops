---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: openclaw
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          daemon:
            image:
              repository: docker
              tag: 29.3.1-dind
            restartPolicy: Always
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            env:
              - name: DOCKER_TLS_CERTDIR
                value: /certs
            probes:
              startup:
                enabled: true
                custom: true
                spec: &probeSpec
                  exec:
                    command: ["docker", "info"]
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  <<: *probeSpec
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  <<: *probeSpec
                  periodSeconds: 20
                  timeoutSeconds: 3
                  failureThreshold: 3
          install-tools:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.4.1@sha256:66c1f2a17e151cbf513bbed55d2c3e9059c738bb5848db76e0af582802975d23
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /home/node/.local/bin /home/node/.openclaw /home/node/.ssh /home/node/.config/fj

                # Copy config from secret mount (writable copy on PVC)
                cp /tmp/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json
                chmod 600 /home/node/.openclaw/openclaw.json

                # Write exec-approvals with full security (skip approval prompts)
                printf '{"version":1,"defaults":{"security":"full"}}\n' > /home/node/.openclaw/exec-approvals.json
                chmod 600 /home/node/.openclaw/exec-approvals.json

                # Setup SSH
                cp /tmp/ssh-secrets/ssh_private_key /home/node/.ssh/id_ed25519
                cp /tmp/ssh-secrets/ssh_config /home/node/.ssh/config
                chmod 700 /home/node/.ssh
                chmod 600 /home/node/.ssh/id_ed25519 /home/node/.ssh/config

                # Copy SSH key to workspace for sandbox access
                mkdir -p /home/node/.openclaw/workspace/.ssh
                cp /home/node/.ssh/id_ed25519 /home/node/.openclaw/workspace/.ssh/id_ed25519
                cp /home/node/.ssh/config /home/node/.openclaw/workspace/.ssh/config
                chmod 700 /home/node/.openclaw/workspace/.ssh
                chmod 600 /home/node/.openclaw/workspace/.ssh/id_ed25519 /home/node/.openclaw/workspace/.ssh/config

                # Setup fj CLI config
                cp /tmp/ssh-secrets/fj_config /home/node/.config/fj/config.toml
                chmod 600 /home/node/.config/fj/config.toml

                # Install fj CLI if not present
                if [ ! -f /home/node/.local/bin/fj ]; then
                  echo "Installing fj CLI..."
                  curl -sL https://codeberg.org/forgejo/fj/releases/latest/download/fj-linux-amd64 -o /home/node/.local/bin/fj
                  chmod +x /home/node/.local/bin/fj
                fi

                # Install uv if not present on PVC
                if [ ! -f /home/node/.local/bin/uv ]; then
                  echo "Installing uv..."
                  cd /tmp
                  curl -fsSL https://astral.sh/uv/install.sh | INSTALLER_NO_MODIFY_PATH=1 UV_INSTALL_DIR=/home/node/.local/bin sh
                fi

                # Install docker CLI if not present
                if [ ! -f /home/node/.local/bin/docker ]; then
                  echo "Installing docker CLI..."
                  # renovate: datasource=github-releases depName=moby/moby
                  curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz | tar xz -C /tmp
                  mv /tmp/docker/docker /home/node/.local/bin/docker
                  chmod +x /home/node/.local/bin/docker
                  rm -rf /tmp/docker
                fi

                echo "Init container completed successfully"
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.4.1@sha256:66c1f2a17e151cbf513bbed55d2c3e9059c738bb5848db76e0af582802975d23
            command:
              - /bin/sh
              - -c
              - |
                # Set up openclawbot CLI symlink
                ln -sf /app/openclawbot.mjs /home/node/.local/bin/openclawbot

                # Copy SA token to workspace for sandbox bind mount
                mkdir -p /home/node/.openclaw/workspace/.kube/sa
                cp /var/run/secrets/kubernetes.io/serviceaccount/* /home/node/.openclaw/workspace/.kube/sa/

                # Write kubeconfig for sandbox kubectl access
                mkdir -p /home/node/.openclaw/workspace/.kube /home/node/.openclaw/workspace-coding/.kube
                for dir in /home/node/.openclaw/workspace/.kube /home/node/.openclaw/workspace-coding/.kube; do
                  printf 'apiVersion: v1\nkind: Config\nclusters:\n- cluster:\n    server: https://10.43.0.1:443\n    certificate-authority: /home/node/.openclaw/workspace/.kube/sa/ca.crt\n  name: cluster\ncontexts:\n- context:\n    cluster: cluster\n    user: sa\n  name: default\ncurrent-context: default\nusers:\n- name: sa\n  user:\n    tokenFile: /home/node/.openclaw/workspace/.kube/sa/token\n' > "$dir/config"
                done

                # Pre-pull sandbox image
                docker pull ghcr.io/solanyn/openclaw-sandbox:1.0.0 &

                # Start gateway
                exec node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured
            env:
              HOME: &homepath /home/node
              TERM: xterm-256color
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              TZ: Australia/Sydney
              DOCKER_HOST: tcp://localhost:2376
              DOCKER_CERT_PATH: /certs/client
              DOCKER_TLS_VERIFY: "1"
            envFrom:
              - secretRef:
                  name: openclaw
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 18789
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 18789
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 18789
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 64Mi

    defaultPodOptions:
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 18789
    route:
      app:
        hostnames:
          - openclaw.goyangi.io
        parentRefs:
          - name: envoy-internal
            namespace: network
    rbac:
      roles:
        openclaw-read-all:
          type: ClusterRole
          rules:
            # CRDs
            - apiGroups: ["apiextensions.k8s.io"]
              resources: ["customresourcedefinitions"]
              verbs: ["get", "list", "watch"]
            # Core resources
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources: ["deployments/scale"]
              verbs: ["get", "patch", "update"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            # Flux CRDs
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch", "patch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch", "patch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["gitrepositories", "ocirepositories", "helmrepositories", "helmcharts"]
              verbs: ["get", "list", "watch"]
            # Grafana operator CRDs
            - apiGroups: ["grafana.integreatly.org"]
              resources: ["grafanadashboards", "grafanadatasources", "grafanas", "grafanafolders"]
              verbs: ["get", "list", "watch"]
            # External Secrets CRDs
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets", "clustersecretstores", "secretstores"]
              verbs: ["get", "list", "watch"]
            # Crossplane / GCP provider CRDs
            - apiGroups: ["container.gcp.upbound.io"]
              resources: ["clusters", "nodepools"]
              verbs: ["get", "list", "watch"]
            # Prometheus operator CRDs
            - apiGroups: ["monitoring.coreos.com"]
              resources: ["prometheusrules", "servicemonitors", "podmonitors", "alertmanagerconfigs"]
              verbs: ["get", "list", "watch"]
            # Gateway API CRDs
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["gateways", "httproutes", "grpcroutes"]
              verbs: ["get", "list", "watch"]
            # Liqo CRDs
            - apiGroups: ["discovery.liqo.io", "net.liqo.io", "offloading.liqo.io", "sharing.liqo.io"]
              resources: ["*"]
              verbs: ["get", "list", "watch"]
        openclaw-write-restricted:
          type: Role
          rules:
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
            - apiGroups: [""]
              resources: ["services", "configmaps"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["httproutes"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
        openclaw-pod-manage:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
      bindings:
        openclaw-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-read-all
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: openclaw-write-restricted
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-pod-manage:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-pod-manage
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
    serviceAccount:
      openclaw: {}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: *homepath
      hawow:
        type: nfs
        server: nas.internal
        path: /mnt/world/hawow
        globalMounts:
          - path: /home/node/hawow
      certs:
        type: emptyDir
      openclaw-config:
        type: secret
        name: openclaw-config
        advancedMounts:
          openclaw:
            install-tools:
              - path: /tmp/openclaw-config
                readOnly: true
      ssh-secrets:
        type: secret
        name: openclaw
        items:
          - key: ssh_private_key
            path: ssh_private_key
          - key: ssh_config
            path: ssh_config
          - key: fj_config
            path: fj_config
        advancedMounts:
          openclaw:
            install-tools:
              - path: /tmp/ssh-secrets
                readOnly: true
