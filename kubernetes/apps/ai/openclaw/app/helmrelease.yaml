---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: openclaw
  interval: 1h
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          daemon:
            image:
              repository: docker
              tag: 29.4.0-dind
            restartPolicy: Always
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            command:
              - /bin/sh
              - -c
              - |
                mkdir -p /etc/docker
                cat > /etc/docker/daemon.json <<EOF
                {
                  "registry-mirrors": ["http://$${NODE_IP}:29999"]
                }
                EOF
                exec dockerd-entrypoint.sh
            env:
              - name: DOCKER_TLS_CERTDIR
                value: /certs
              - name: NODE_IP
                valueFrom:
                  fieldRef:
                    fieldPath: status.hostIP
            probes:
              startup:
                enabled: true
                custom: true
                spec: &dindProbe
                  exec:
                    command: ["docker", "info"]
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  <<: *dindProbe
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  <<: *dindProbe
                  periodSeconds: 20
                  timeoutSeconds: 3
                  failureThreshold: 3
          install-tools:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.4.14@sha256:7ea070b04d1e70811fe8ba15feaad5890b1646021b24e00f4795bd4587a594ed
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /home/node/.local/bin /home/node/.openclaw /home/node/.ssh /home/node/.config/fj

                # Copy config from secret mount (writable copy on PVC)
                cp /tmp/openclaw-config/openclaw.json /home/node/.openclaw/openclaw.json
                chmod 600 /home/node/.openclaw/openclaw.json

                # Write exec-approvals with full security (skip approval prompts)
                printf '{"version":1,"defaults":{"security":"full"}}\n' > /home/node/.openclaw/exec-approvals.json
                chmod 600 /home/node/.openclaw/exec-approvals.json

                # Setup SSH
                cp /tmp/ssh-secrets/ssh_private_key /home/node/.ssh/id_ed25519
                cp /tmp/ssh-secrets/ssh_config /home/node/.ssh/config
                cp /tmp/ssh-secrets/ssh_private_key /home/node/.ssh/sandbox_id
                chmod 700 /home/node/.ssh
                chmod 600 /home/node/.ssh/id_ed25519 /home/node/.ssh/config /home/node/.ssh/sandbox_id

                # Copy SSH key to workspace for sandbox access
                mkdir -p /home/node/.openclaw/workspace/.ssh
                cp /home/node/.ssh/id_ed25519 /home/node/.openclaw/workspace/.ssh/id_ed25519
                cp /home/node/.ssh/config /home/node/.openclaw/workspace/.ssh/config
                chmod 700 /home/node/.openclaw/workspace/.ssh
                chmod 600 /home/node/.openclaw/workspace/.ssh/id_ed25519 /home/node/.openclaw/workspace/.ssh/config

                # Setup fj CLI config
                cp /tmp/ssh-secrets/fj_config /home/node/.config/fj/config.toml
                chmod 600 /home/node/.config/fj/config.toml

                # Install fj CLI if not present
                if [ ! -f /home/node/.local/bin/fj ]; then
                  echo "Installing fj CLI..."
                  curl -sL https://codeberg.org/forgejo/fj/releases/latest/download/fj-linux-amd64 -o /home/node/.local/bin/fj
                  chmod +x /home/node/.local/bin/fj
                fi

                # Install uv if not present on PVC
                if [ ! -f /home/node/.local/bin/uv ]; then
                  echo "Installing uv..."
                  cd /tmp
                  curl -fsSL https://astral.sh/uv/install.sh | INSTALLER_NO_MODIFY_PATH=1 UV_INSTALL_DIR=/home/node/.local/bin sh
                fi

                # Install hippo-memory CLI and OpenClaw plugin
                if ! command -v hippo >/dev/null 2>&1; then
                  echo "Installing hippo-memory..."
                  npm install -g hippo-memory --prefix /home/node/.local
                fi
                if [ ! -d /home/node/.openclaw/extensions/hippo-memory ]; then
                  echo "Installing hippo-memory OpenClaw plugin..."
                  HIPPO_PKG=$(npm root -g --prefix /home/node/.local)/hippo-memory
                  if [ -d "$HIPPO_PKG/extensions/openclaw-plugin" ]; then
                    cp -r "$HIPPO_PKG/extensions/openclaw-plugin" /home/node/.openclaw/extensions/hippo-memory
                    cd /home/node/.openclaw/extensions/hippo-memory && npm install
                  fi
                fi
                # Init hippo in workspace if not already
                if [ ! -d /home/node/.openclaw/workspace/.hippo ]; then
                  hippo init 2>/dev/null || true
                fi

                # Install gogcli if not present
                if [ ! -f /home/node/.local/bin/gog ]; then
                  echo "Installing gogcli..."
                  curl -fsSL https://github.com/steipete/gogcli/releases/download/v0.12.0/gogcli_0.12.0_linux_amd64.tar.gz | tar xz -C /tmp
                  mv /tmp/gog /home/node/.local/bin/gog
                  chmod +x /home/node/.local/bin/gog
                fi

                # Remove legacy Matrix plugin (now bundled in image)
                rm -rf /home/node/.openclaw/extensions/matrix

          archive:
            image:
              repository: alpine
              tag: 3.23
            restartPolicy: Always
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache rsync su-exec
                while true; do
                  su-exec 1000:1000 rsync -a /sessions/ /archive/
                  sleep 900
                done
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.4.14@sha256:7ea070b04d1e70811fe8ba15feaad5890b1646021b24e00f4795bd4587a594ed
            command:
              - /bin/sh
              - -c
              - |
                ln -sf /app/openclawbot.mjs /home/node/.local/bin/openclawbot

                mkdir -p /home/node/.openclaw/workspace/.kube/sa
                cp /var/run/secrets/kubernetes.io/serviceaccount/* /home/node/.openclaw/workspace/.kube/sa/

                mkdir -p /home/node/.openclaw/workspace/.kube /home/node/.openclaw/workspace-coding/.kube
                for dir in /home/node/.openclaw/workspace/.kube /home/node/.openclaw/workspace-coding/.kube; do
                  printf 'apiVersion: v1\nkind: Config\nclusters:\n- cluster:\n    server: https://10.43.0.1:443\n    certificate-authority: /home/node/.openclaw/workspace/.kube/sa/ca.crt\n  name: cluster\ncontexts:\n- context:\n    cluster: cluster\n    user: sa\n  name: default\ncurrent-context: default\nusers:\n- name: sa\n  user:\n    tokenFile: /home/node/.openclaw/workspace/.kube/sa/token\n' > "$dir/config"
                done

                exec node --max-old-space-size=2048 dist/index.js gateway --bind lan --port 18789 --allow-unconfigured
            env:
              HOME: &homepath /home/node
              TERM: xterm-256color
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              TZ: Australia/Sydney
              DOCKER_HOST: tcp://localhost:2376
              DOCKER_CERT_PATH: /certs/client
              DOCKER_TLS_VERIFY: "1"
            envFrom:
              - secretRef:
                  name: openclaw
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 18789
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 18789
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 18789
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 1500Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 18789
    route:
      app:
        hostnames:
          - openclaw.goyangi.io
        parentRefs:
          - name: envoy-internal
            namespace: network
    rbac:
      roles:
        openclaw-read-all:
          type: ClusterRole
          rules:
            # CRDs
            - apiGroups: ["apiextensions.k8s.io"]
              resources: ["customresourcedefinitions"]
              verbs: ["get", "list", "watch"]
            # Core resources
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources: ["deployments/scale"]
              verbs: ["get", "patch", "update"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            # Flux CRDs
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch", "patch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch", "patch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["gitrepositories", "ocirepositories", "helmrepositories", "helmcharts"]
              verbs: ["get", "list", "watch"]
            # Grafana operator CRDs
            - apiGroups: ["grafana.integreatly.org"]
              resources: ["grafanadashboards", "grafanadatasources", "grafanas", "grafanafolders"]
              verbs: ["get", "list", "watch"]
            # External Secrets CRDs
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets", "clustersecretstores", "secretstores"]
              verbs: ["get", "list", "watch"]
            # Crossplane / GCP provider CRDs
            - apiGroups: ["container.gcp.upbound.io"]
              resources: ["clusters", "nodepools"]
              verbs: ["get", "list", "watch"]
            # Prometheus operator CRDs
            - apiGroups: ["monitoring.coreos.com"]
              resources: ["prometheusrules", "servicemonitors", "podmonitors", "alertmanagerconfigs"]
              verbs: ["get", "list", "watch"]
            # Gateway API CRDs
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["gateways", "httproutes", "grpcroutes"]
              verbs: ["get", "list", "watch"]
        openclaw-write-restricted:
          type: Role
          rules:
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
            - apiGroups: [""]
              resources: ["services", "configmaps"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["httproutes"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
        openclaw-pod-manage:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
        openclaw-sandbox-manage:
          type: Role
          rules:
            - apiGroups: ["agents.x-k8s.io"]
              resources: ["sandboxes"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
      bindings:
        openclaw-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-read-all
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: openclaw-write-restricted
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-pod-manage:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-pod-manage
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-sandbox-manage:
          type: RoleBinding
          roleRef:
            identifier: openclaw-sandbox-manage
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
    serviceAccount:
      openclaw: {}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          openclaw:
            daemon:
              - path: *homepath
            install-tools:
              - path: *homepath
            app:
              - path: *homepath
            archive:
              - path: /sessions
                subPath: .openclaw/agents/main/sessions
      hawow:
        type: nfs
        server: nas.internal
        path: /mnt/world/hawow
        globalMounts:
          - path: /home/node/hawow
      openclaw-archive:
        type: nfs
        server: nas.internal
        path: /mnt/world/openclaw
        advancedMounts:
          openclaw:
            archive:
              - path: /archive
      certs:
        type: emptyDir
        globalMounts:
          - path: /certs
      docker-data:
        type: persistentVolumeClaim
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 10Gi
        advancedMounts:
          openclaw:
            daemon:
              - path: /var/lib/docker
      openclaw-config:
        type: secret
        name: openclaw-config
        advancedMounts:
          openclaw:
            install-tools:
              - path: /tmp/openclaw-config
                readOnly: true
      ssh-secrets:
        type: secret
        name: openclaw
        items:
          - key: ssh_private_key
            path: ssh_private_key
          - key: ssh_config
            path: ssh_config
          - key: fj_config
            path: fj_config
        advancedMounts:
          openclaw:
            install-tools:
              - path: /tmp/ssh-secrets
                readOnly: true
