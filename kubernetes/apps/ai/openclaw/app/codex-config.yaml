---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-codex-config
data:
  config.toml: |
    model = "opus"
    model_provider = "gateway"
    approval_policy = "never"
    sandbox_mode = "danger-full-access"

    [model_providers.gateway]
    name = "agentgateway"
    base_url = "https://gateway.goyangi.io/v1/opus"
    wire_api = "responses"
    env_key = "CODEX_API_KEY"
