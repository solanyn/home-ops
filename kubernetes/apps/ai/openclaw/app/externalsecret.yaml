---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw
    creationPolicy: Owner
    template:
      data:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .HAWOW_OP_SERVICE_ACCOUNT_TOKEN }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        FORGEJO_API_TOKEN: "{{ .OPENCLAW_FORGEJO_API_TOKEN }}"
        ssh_private_key: "{{ .OPENCLAW_SSH_PRIVATE_KEY }}"
        ssh_config: |
          Host forgejo.goyangi.io ssh.forgejo.goyangi.io
            HostName ssh.forgejo.goyangi.io
            User git
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host mac.internal
            User andrew
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host work.internal
            HostName chisel.network.svc.cluster.local
            User {{ .CHISEL_SSH_USER }}
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
        fj_config: |
          [logins]
            [[logins.list]]
            name = "forgejo"
            url = "https://forgejo.goyangi.io"
            token = "{{ .OPENCLAW_FORGEJO_API_TOKEN }}"
            default = true
            ssh_host = "ssh.forgejo.goyangi.io"
            user = "andrew"
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
    - extract:
        key: chisel
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-config
    creationPolicy: Owner
    template:
      data:
        openclaw.json: |
          {
            "agents": {
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "Assistant",
                  "workspace": "/home/node/.openclaw/workspace",
                  "groupChat": {
                    "historyLimit": 50,
                    "mentionPatterns": ["@?hawow", "shmawow", "hawow shmawow"]
                  }
                },
                {
                  "id": "coding",
                  "name": "Coder",
                  "workspace": "/home/node/.openclaw/workspace-coding",
                  "model": "gateway/auto-coding",
                  "tools": {
                    "allow": ["read", "write", "edit", "exec", "apply_patch", "browser"]
                  }
                }
              ],
              "defaults": {
                "model": {
                  "primary": "gateway/auto"
                },
                "elevatedDefault": "full",
                "sandbox": {
                  "mode": "all",
                  "scope": "agent",
                  "workspaceAccess": "rw",
                  "docker": {
                    "image": "ghcr.io/solanyn/openclaw-sandbox:1.0.0@sha256:5b46a9eaaf7fc82195bc70d9ca0c482338ab26d2885a7a6f9a18ef06df0c8e0e",
                    "network": "bridge",
                    "readOnlyRoot": false,
                    "user": "1000:1000",
                    "env": {
                      "KUBECONFIG": "/workspace/.kube/config",
                      "OP_SERVICE_ACCOUNT_TOKEN": "{{ .HAWOW_OP_SERVICE_ACCOUNT_TOKEN }}",
                      "KUBERNETES_SERVICE_HOST": "10.43.0.1",
                      "KUBERNETES_SERVICE_PORT": "443"
                    },
                    "binds": [],
                    "memory": "1g",
                    "cpus": 1
                  }
                },
                "contextPruning": {
                  "mode": "cache-ttl",
                  "ttl": "5m",
                  "keepLastAssistants": 3,
                  "hardClear": {
                    "enabled": true,
                    "placeholder": "[Old tool result content cleared]"
                  }
                }
              }
            },
            "models": {
              "mode": "merge",
              "providers": {
                "gateway": {
                  "baseUrl": "https://gateway.goyangi.io/v1/auto",
                  "apiKey": "{{ .AGENTGATEWAY_API_KEY }}",
                  "api": "openai-completions",
                  "models": [
                    { "id": "auto", "name": "Auto (failover)" },
                    { "id": "auto-coding", "name": "Auto Coding (failover)" },
                    { "id": "mlx-ministral", "name": "Ministral 8B (local)" }
                  ]
                }
              }
            },
            "gateway": {
              "mode": "local",
              "auth": {
                "mode": "token",
                "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
              },
              "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16", "192.168.1.0/24"],
              "controlUi": {
                "allowedOrigins": ["https://openclaw.goyangi.io"]
              }
            },
            "channels": {
              "bluebubbles": {
                "enabled": true,
                "serverUrl": "http://bluebubbles.internal:1234",
                "password": "{{ .BLUEBUBBLES_PASSWORD }}",
                "webhookPath": "/bluebubbles-webhook",
                "allowPrivateNetwork": true,
                "dmPolicy": "pairing",
                "groupPolicy": "allowlist",
                "groupAllowFrom": ["{{ .OPENCLAW_ALLOW_FROM_AC }}", "{{ .OPENCLAW_ALLOW_FROM_PH }}"],
                "groups": {
                  "{{ .BLUEBUBBLES_GROUP_ID }}": {
                    "requireMention": true
                  }
                },
                "sendReadReceipts": true,
                "actions": {
                  "reactions": true,
                  "edit": true,
                  "unsend": true,
                  "reply": true
                }
              },
              "telegram": {
                "enabled": true,
                "botToken": "{{ .OPENCLAW_TELEGRAM_TOKEN }}",
                "dmPolicy": "pairing",
                "groups": {
                  "*": { "requireMention": true }
                },
                "streaming": "partial",
                "execApprovals": {
                  "enabled": true
                },
                "actions": {
                  "reactions": true
                }
              },
              "matrix": {
                "enabled": true,
                "homeserver": "https://matrix.goyangi.io",
                "userId": "@hawow:goyangi.io",
                "accessToken": "{{ .MATRIX_BOT_ACCESS_TOKEN }}",
                "allowPrivateNetwork": true,
                "dm": { "policy": "pairing" },
                "groups": {
                  "*": { "requireMention": true }
                },
                "actions": {
                  "reactions": true
                }
              }
            },
            "plugins": {
              "entries": {
                "bluebubbles": { "enabled": true },
                "matrix": { "enabled": true },
                "device-pair": {
                  "enabled": true,
                  "config": {
                    "publicUrl": "https://openclaw.goyangi.io"
                  }
                }
              }
            },
            "approvals": {
              "exec": {
                "enabled": true,
                "mode": "targets",
                "targets": [
                  { "channel": "telegram", "to": "{{ .OPENCLAW_TELEGRAM_ALLOW_FROM }}" }
                ]
              }
            },
            "tools": {
              "web": {
                "search": {
                  "enabled": true,
                  "provider": "brave",
                  "apiKey": "{{ .BRAVE_API_KEY }}"
                }
              },
              "media": {
                "audio": {
                  "enabled": true,
                  "models": [
                    {
                      "provider": "openai",
                      "model": "mlx-community/parakeet-tdt-0.6b-v3",
                      "baseUrl": "https://gateway.goyangi.io/v1"
                    }
                  ]
                }
              }
            }
          }
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
    - extract:
        key: agentgateway
    - extract:
        key: bluebubbles
    - extract:
        key: brave
    - extract:
        key: matrix
