---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw
    creationPolicy: Owner
    template:
      data:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .HAWOW_OP_SERVICE_ACCOUNT_TOKEN }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        FORGEJO_API_TOKEN: "{{ .FORGEJO_TOKEN }}"
        ssh_private_key: "{{ .OPENCLAW_SSH_PRIVATE_KEY }}"
        ssh_config: |
          Host forgejo.goyangi.io ssh.forgejo.goyangi.io
            HostName ssh.forgejo.goyangi.io
            User git
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host mac.internal
            User andrew
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
        fj_config: |
          [logins]
            [[logins.list]]
            name = "forgejo"
            url = "https://forgejo.goyangi.io"
            token = "{{ .FORGEJO_TOKEN }}"
            default = true
            ssh_host = "ssh.forgejo.goyangi.io"
            user = "andrew"
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
    - extract:
        key: forgejo
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-config
    creationPolicy: Owner
    template:
      data:
        openclaw.json: |
          {
            "agents": {
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "Assistant",
                  "workspace": "/home/node/.openclaw/workspace",
                  "groupChat": {
                    "historyLimit": 50,
                    "mentionPatterns": ["@?hawow", "shmawow", "hawow shmawow"]
                  }
                }
              ],
              "defaults": {
                "model": {
                  "primary": "gateway/claude-opus-4-6"
                },
                "timeoutSeconds": 600,
                "elevatedDefault": "full",
                "maxConcurrent": 4,
                "subagents": {
                  "maxConcurrent": 8
                },
                "sandbox": {
                  "mode": "non-main",
                  "scope": "agent",
                  "workspaceAccess": "rw",
                  "backend": "docker",
                  "docker": {
                    "image": "ghcr.io/solanyn/openclaw-sandbox:5.0.1",
                    "network": "bridge",
                    "binds": [
                      "/home/node/.openclaw/workspace:/home/node/.openclaw/workspace:rw"
                    ],
                    "env": {
                      "OP_SERVICE_ACCOUNT_TOKEN": "{{ .OP_SERVICE_ACCOUNT_TOKEN }}"
                    }
                  }
                },
                "contextPruning": {
                  "mode": "cache-ttl",
                  "ttl": "5m",
                  "keepLastAssistants": 3,
                  "hardClear": {
                    "enabled": true,
                    "placeholder": "[Old tool result content cleared]"
                  }
                },
                "thinkingDefault": "adaptive",
                "compaction": {
                  "mode": "default",
                  "reserveTokensFloor": 24000,
                  "memoryFlush": {
                    "enabled": true,
                    "softThresholdTokens": 12000,
                    "prompt": "Extract key decisions, state changes, lessons, blockers to memory/YYYY-MM-DD.md. Format: ## [HH:MM] Topic. Skip routine work. NO_FLUSH if nothing important.",
                    "model": "gateway/claude-haiku-4.5"
                  }
                }
              }
            },
            "models": {
              "mode": "merge",
              "providers": {
                "gateway": {
                  "baseUrl": "https://gateway.goyangi.io/v1",
                  "apiKey": "{{ .AGENTGATEWAY_OPENCLAW_API_KEY }}",
                  "api": "openai-completions",
                  "request": { "allowPrivateNetwork": true },
                  "models": [
                    { "id": "claude-opus-4-6", "name": "Opus 4.6", "contextTokens": 1000000, "reasoning": true },
                    { "id": "claude-haiku-4.5", "name": "Haiku 4.5", "contextTokens": 200000 },
                    { "id": "claude-sonnet-4-6", "name": "Sonnet 4.6", "contextTokens": 200000, "reasoning": true },
                    { "id": "claude-opus-4-7", "name": "Opus 4.7", "contextTokens": 1000000, "reasoning": true },
                    { "id": "deepseek", "name": "DeepSeek 3.2", "contextTokens": 128000, "reasoning": true },
                    { "id": "gemma-4", "name": "Gemma 4 E4B (local)", "contextTokens": 128000, "reasoning": true },
                    { "id": "glm-5", "name": "GLM-5", "contextTokens": 128000 },
                    { "id": "minimax-m2.5", "name": "MiniMax M2.5", "contextTokens": 1000000 },
                    { "id": "qwen3-coder", "name": "Qwen3 Coder", "contextTokens": 256000, "reasoning": true }
                  ]
                }
              }
            },
            "gateway": {
              "mode": "local",
              "auth": {
                "mode": "token",
                "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
              },
              "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16", "192.168.1.0/24"],
              "controlUi": {
                "allowedOrigins": ["https://openclaw.goyangi.io"]
              }
            },
            "messages": {
              "ackReactionScope": "group-mentions"
            },
            "commands": {
              "native": "auto",
              "nativeSkills": "auto",
              "restart": true,
              "ownerDisplay": "raw"
            },
            "channels": {
              "bluebubbles": {
                "enabled": true,
                "serverUrl": "http://bluebubbles.internal:1234",
                "password": "{{ .BLUEBUBBLES_PASSWORD }}",
                "webhookPath": "/bluebubbles-webhook",
                "dmPolicy": "pairing",
                "allowFrom": ["{{ .OPENCLAW_ALLOW_FROM_AC }}", "{{ .OPENCLAW_ALLOW_FROM_PH }}"],
                "groupPolicy": "allowlist",
                "groupAllowFrom": ["{{ .OPENCLAW_ALLOW_FROM_AC }}", "{{ .OPENCLAW_ALLOW_FROM_PH }}"],
                "groups": {
                  "{{ .BLUEBUBBLES_GROUP_ID }}": {
                    "requireMention": true
                  }
                },
                "enrichGroupParticipantsFromContacts": true,
                "sendReadReceipts": true,
                "actions": {
                  "reactions": true,
                  "edit": true,
                  "unsend": true,
                  "reply": true,
                  "sendWithEffect": true,
                  "renameGroup": true,
                  "setGroupIcon": true,
                  "addParticipant": true,
                  "removeParticipant": true,
                  "leaveGroup": true,
                  "sendAttachment": true
                }
              },
              "telegram": {
                "enabled": false,
                "botToken": "{{ .OPENCLAW_TELEGRAM_TOKEN }}",
                "dmPolicy": "pairing",
                "groupPolicy": "allowlist",
                "groups": {
                  "*": { "requireMention": true }
                },
                "streaming": { "mode": "partial" },
                "replyToMode": "first",
                "execApprovals": {
                  "enabled": true,
                  "target": "dm"
                },
                "actions": {
                  "reactions": true,
                  "sendMessage": true
                }
              },
              "matrix": {
                "enabled": true,
                "homeserver": "https://matrix.goyangi.io",
                "userId": "@hawow:goyangi.io",
                "accessToken": "{{ .MATRIX_BOT_ACCESS_TOKEN }}",
                "network": { "dangerouslyAllowPrivateNetwork": true },
                "streaming": { "mode": "quiet" },
                "dm": {
                  "policy": "allowlist",
                  "allowFrom": ["@andrew:goyangi.io"],
                  "threadReplies": "inbound"
                },
                "groups": {
                  "*": { "requireMention": true }
                },
                "execApprovals": {
                  "enabled": true,
                  "target": "dm"
                },
                "actions": {
                  "messages": true,
                  "reactions": true,
                  "pins": true,
                  "memberInfo": true,
                  "verification": true
                }
              }
            },
            "plugins": {
              "entries": {
                "bonjour": { "enabled": false },
                "bluebubbles": { "enabled": true },
                "matrix": { "enabled": true },
                "telegram": {},
                "memory-core": {},
                "hippo-memory": {
                  "enabled": true,
                  "config": {
                    "budget": 2000,
                    "autoContext": true,
                    "autoLearn": true,
                    "autoSleep": true,
                    "framing": "observe"
                  }
                },
                "memory-wiki": {
                  "enabled": true,
                  "config": {
                    "vaultMode": "isolated",
                    "vault": {
                      "path": "/home/node/.openclaw/wiki/main",
                      "renderMode": "native"
                    },
                    "ingest": {
                      "autoCompile": true
                    },
                    "search": {
                      "backend": "shared",
                      "corpus": "wiki"
                    },
                    "render": {
                      "preserveHumanBlocks": true,
                      "createBacklinks": true,
                      "createDashboards": true
                    }
                  }
                },
                "brave": {
                  "enabled": true,
                  "config": {
                    "webSearch": {
                      "apiKey": "{{ .BRAVE_API_KEY }}"
                    }
                  }
                },
                "searxng": {
                  "enabled": true,
                  "config": {
                    "webSearch": {
                      "baseUrl": "http://searxng.default.svc.cluster.local:8080",
                      "categories": "general,it,science,news,games",
                      "language": "en"
                    }
                  }
                },
                "tavily": {
                  "enabled": true,
                  "config": {
                    "webSearch": {
                      "apiKey": "{{ .TAVILY_API_KEY }}"
                    }
                  }
                },
                "device-pair": {
                  "enabled": true,
                  "config": {
                    "publicUrl": "https://openclaw.goyangi.io"
                  }
                }
              }
            },
            "approvals": {
              "exec": {
                "enabled": false,
                "mode": "targets",
                "targets": [
                  { "channel": "telegram", "to": "{{ .OPENCLAW_TELEGRAM_ALLOW_FROM }}" }
                ]
              }
            },
            "tools": {
              "exec": { "host": "auto", "security": "full", "ask": "off" },
              "sandbox": {
                "tools": {
                  "allow": ["exec", "process", "read", "write", "edit", "apply_patch", "web_search", "web_fetch", "agents_list", "message", "tts", "subagents", "sessions_list", "sessions_history", "sessions_send", "sessions_spawn", "sessions_yield", "session_status"]
                }
              },
              "web": {
                "search": {
                  "enabled": true,
                  "provider": "brave"
                }
              },
              "media": {
                "audio": {
                  "enabled": true,
                  "models": [
                    {
                      "provider": "openai",
                      "model": "mlx-community/parakeet-tdt-0.6b-v3",
                      "baseUrl": "https://gateway.goyangi.io/v1"
                    }
                  ]
                }
              }
            },
            "session": {
              "maintenance": {
                "mode": "enforce",
                "pruneAfter": "7d",
                "maxDiskBytes": 200000000,
                "highWaterBytes": 160000000
              }
            },
            "hooks": {
              "enabled": true,
              "token": "{{ .OPENCLAW_HOOKS_TOKEN }}",
              "path": "/hooks"
            }
          }
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
    - extract:
        key: agentgateway
    - extract:
        key: bluebubbles
    - extract:
        key: brave
    - extract:
        key: tavily
    - extract:
        key: matrix
    - extract:
        key: openclaw-webhook
