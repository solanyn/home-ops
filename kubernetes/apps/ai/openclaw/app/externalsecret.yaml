---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw
    creationPolicy: Owner
    template:
      data:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .HAWOW_OP_SERVICE_ACCOUNT_TOKEN }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        FORGEJO_API_TOKEN: "{{ .OPENCLAW_FORGEJO_API_TOKEN }}"
        ssh_private_key: "{{ .OPENCLAW_SSH_PRIVATE_KEY }}"
        ssh_config: |
          Host forgejo.goyangi.io ssh.forgejo.goyangi.io
            HostName ssh.forgejo.goyangi.io
            User git
            IdentityFile ~/.ssh/forgejo_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
        fj_config: |
          [logins]
            [[logins.list]]
            name = "forgejo"
            url = "https://forgejo.goyangi.io"
            token = "{{ .OPENCLAW_FORGEJO_API_TOKEN }}"
            default = true
            ssh_host = "ssh.forgejo.goyangi.io"
            user = "andrew"
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-config
    creationPolicy: Owner
    template:
      data:
        openclaw.json: |
          {
            "agents": {
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "Assistant",
                  "workspace": "/home/node/.openclaw/workspace",
                  "groupChat": {
                    "historyLimit": 50,
                    "mentionPatterns": ["@?hawow", "shmawow", "hawow shmawow"]
                  }
                },
                {
                  "id": "coding",
                  "name": "Coder",
                  "workspace": "/home/node/.openclaw/workspace-coding",
                  "model": "gateway/auto-coding",
                  "tools": {
                    "allow": ["read", "write", "edit", "exec", "apply_patch", "browser"]
                  }
                }
              ],
              "defaults": {
                "model": {
                  "primary": "gateway/auto"
                },
                "sandbox": {
                  "mode": "all",
                  "scope": "agent",
                  "workspaceAccess": "rw",
                  "docker": {
                    "image": "debian:bookworm-slim",
                    "network": "bridge",
                    "readOnlyRoot": false,
                    "user": "1000:1000",
                    "setupCommand": "echo 'APT::Sandbox::User \"root\";' > /etc/apt/apt.conf.d/99sandbox && apt-get update && apt-get install -y --no-install-recommends git curl jq ca-certificates procps unzip && rm -rf /var/lib/apt/lists/* && curl -fsSL https://astral.sh/uv/install.sh | INSTALLER_NO_MODIFY_PATH=1 UV_INSTALL_DIR=/usr/local/bin sh && curl -fsSL https://bun.sh/install | BUN_INSTALL=/usr/local bash && curl -sL https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl -o /usr/local/bin/kubectl && chmod +x /usr/local/bin/kubectl && curl -sS https://cache.agilebits.com/dist/1P/op2/pkg/v2.30.3/op_linux_amd64_v2.30.3.zip -o /tmp/op.zip && unzip -o /tmp/op.zip -d /usr/local/bin op && chmod +x /usr/local/bin/op && rm /tmp/op.zip",
                    "env": {
                      "KUBECONFIG": "/workspace/.kube/config",
                      "OP_SERVICE_ACCOUNT_TOKEN": "{{ .HAWOW_OP_SERVICE_ACCOUNT_TOKEN }}",
                      "KUBERNETES_SERVICE_HOST": "10.43.0.1",
                      "KUBERNETES_SERVICE_PORT": "443"
                    },
                    "binds": ["/home/node/.openclaw/workspace/.kube/sa:/home/node/.openclaw/workspace/.kube/sa:ro"],
                    "memory": "1g",
                    "cpus": 1
                  }
                },
                "contextPruning": {
                  "mode": "cache-ttl",
                  "ttl": "5m",
                  "keepLastAssistants": 3,
                  "hardClear": {
                    "enabled": true,
                    "placeholder": "[Old tool result content cleared]"
                  }
                }
              }
            },
            "models": {
              "mode": "merge",
              "providers": {
                "gateway": {
                  "baseUrl": "https://gateway.goyangi.io/v1/auto",
                  "apiKey": "{{ .AGENTGATEWAY_API_KEY }}",
                  "api": "openai-completions",
                  "models": [
                    { "id": "auto", "name": "Auto (failover)" },
                    { "id": "auto-coding", "name": "Auto Coding (failover)" },
                    { "id": "mlx-ministral", "name": "Ministral 8B (local)" }
                  ]
                }
              }
            },
            "gateway": {
              "mode": "local",
              "auth": {
                "mode": "token",
                "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
              },
              "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16"],
              "controlUi": {
                "allowedOrigins": ["https://openclaw.goyangi.io"]
              }
            },
            "channels": {
              "telegram": {
                "enabled": true,
                "token": "{{ .OPENCLAW_TELEGRAM_TOKEN }}",
                "allowFrom": ["{{ .OPENCLAW_TELEGRAM_ALLOW_FROM }}"]
              },
              "bluebubbles": {
                "enabled": true,
                "serverUrl": "http://bluebubbles.internal:1234",
                "password": "{{ .BLUEBUBBLES_PASSWORD }}",
                "webhookPath": "/bluebubbles-webhook",
                "dmPolicy": "pairing",
                "groupPolicy": "allowlist",
                "groupAllowFrom": ["{{ .OPENCLAW_ALLOW_FROM_AC }}", "{{ .OPENCLAW_ALLOW_FROM_PH }}"],
                "groups": {
                  "{{ .BLUEBUBBLES_GROUP_ID }}": {
                    "requireMention": true
                  }
                },
                "sendReadReceipts": true,
                "actions": {
                  "reactions": true,
                  "edit": true,
                  "unsend": true,
                  "reply": true
                }
              },
              "telegram": {
                "enabled": true,
                "botToken": "{{ .OPENCLAW_TELEGRAM_TOKEN }}",
                "dmPolicy": "pairing",
                "groups": {
                  "*": { "requireMention": true }
                },
                "streaming": "partial",
                "actions": {
                  "reactions": true
                }
              }
            },
            "plugins": {
              "entries": {
                "bluebubbles": { "enabled": true },
                "device-pair": {
                  "enabled": true,
                  "config": {
                    "publicUrl": "https://openclaw.goyangi.io"
                  }
                }
              }
            },
            "tools": {
              "web": {
                "search": {
                  "enabled": true,
                  "provider": "brave",
                  "apiKey": "{{ .BRAVE_API_KEY }}"
                }
              },
              "media": {
                "audio": {
                  "enabled": true,
                  "models": [
                    {
                      "provider": "openai",
                      "model": "mlx-community/parakeet-tdt-0.6b-v3",
                      "baseUrl": "https://gateway.goyangi.io/v1"
                    }
                  ]
                }
              }
            }
          }
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
    - extract:
        key: kgateway
    - extract:
        key: bluebubbles
    - extract:
        key: brave
