---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw
    creationPolicy: Owner
    template:
      data:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .HAWOW_OP_SERVICE_ACCOUNT_TOKEN }}"
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        FORGEJO_API_TOKEN: "{{ .FORGEJO_TOKEN }}"
        CODEX_API_KEY: "{{ .AGENTGATEWAY_OPENCLAW_API_KEY }}"
        ssh_private_key: "{{ .OPENCLAW_SSH_PRIVATE_KEY }}"
        ssh_config: |
          Host forgejo.goyangi.io ssh.forgejo.goyangi.io
            HostName ssh.forgejo.goyangi.io
            User git
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host mac.internal
            User andrew
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host work.internal
            HostName chisel.network.svc.cluster.local
            User {{ .CHISEL_SSH_USER }}
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
        fj_config: |
          [logins]
            [[logins.list]]
            name = "forgejo"
            url = "https://forgejo.goyangi.io"
            token = "{{ .FORGEJO_TOKEN }}"
            default = true
            ssh_host = "ssh.forgejo.goyangi.io"
            user = "andrew"
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
    - extract:
        key: agentgateway
    - extract:
        key: chisel
    - extract:
        key: forgejo
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-config
    creationPolicy: Owner
    template:
      data:
        openclaw.json: |
          {
            "agents": {
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "Assistant",
                  "workspace": "/home/node/.openclaw/workspace",
                  "groupChat": {
                    "historyLimit": 50,
                    "mentionPatterns": ["@?hawow", "shmawow", "hawow shmawow"]
                  }
                }
              ],
              "defaults": {
                "model": {
                  "primary": "gateway/opus"
                },
                "agentRuntime": {
                  "id": "codex"
                },
                "timeoutSeconds": 600,
                "elevatedDefault": "full",
                "maxConcurrent": 4,
                "subagents": {
                  "maxConcurrent": 8
                },
                "sandbox": {
                  "mode": "non-main",
                  "scope": "agent",
                  "workspaceAccess": "rw",
                  "backend": "docker",
                  "docker": {
                    "image": "ghcr.io/solanyn/openclaw-sandbox:5.0.1",
                    "network": "bridge",
                    "binds": [
                      "/home/node/.openclaw/workspace:/home/node/.openclaw/workspace:rw"
                    ],
                    "env": {
                      "OP_SERVICE_ACCOUNT_TOKEN": "{{ .OP_SERVICE_ACCOUNT_TOKEN }}"
                    }
                  }
                },
                "contextPruning": {
                  "mode": "cache-ttl",
                  "ttl": "5m",
                  "keepLastAssistants": 3,
                  "hardClear": {
                    "enabled": true,
                    "placeholder": "[Old tool result content cleared]"
                  }
                }
              }
            },
            "models": {
              "mode": "merge",
              "providers": {
                "gateway": {
                  "baseUrl": "https://gateway.goyangi.io/v1/opus",
                  "apiKey": "{{ .AGENTGATEWAY_OPENCLAW_API_KEY }}",
                  "api": "openai-completions",
                  "models": [
                    { "id": "opus", "name": "Opus (Gemma 4 failover)", "contextTokens": 1000000, "reasoning": true }
                  ]
                },
                "local": {
                  "baseUrl": "http://mac.internal:8080/v1",
                  "apiKey": "dummy",
                  "api": "openai-completions",
                  "models": [
                    { "id": "gemma4", "name": "Gemma 4 E4B (direct)" }
                  ]
                },
                "haiku": {
                  "baseUrl": "https://gateway.goyangi.io/v1/haiku",
                  "apiKey": "{{ .AGENTGATEWAY_OPENCLAW_API_KEY }}",
                  "api": "openai-completions",
                  "models": [
                    { "id": "haiku", "name": "Haiku 4.5 (via agentgateway)" }
                  ]
                }
              }
            },
            "gateway": {
              "mode": "local",
              "auth": {
                "mode": "token",
                "token": "{{ .OPENCLAW_GATEWAY_TOKEN }}"
              },
              "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16", "192.168.1.0/24"],
              "controlUi": {
                "allowedOrigins": ["https://openclaw.goyangi.io"]
              }
            },
            "messages": {
              "ackReactionScope": "group-mentions"
            },
            "commands": {
              "native": "auto",
              "nativeSkills": "auto",
              "restart": true,
              "ownerDisplay": "raw"
            },
            "channels": {
              "bluebubbles": {
                "enabled": true,
                "serverUrl": "http://bluebubbles.internal:1234",
                "password": "{{ .BLUEBUBBLES_PASSWORD }}",
                "webhookPath": "/bluebubbles-webhook",
                "network": {"dangerouslyAllowPrivateNetwork": true},
                "dmPolicy": "pairing",
                "dmAllowFrom": ["{{ .OPENCLAW_ALLOW_FROM_AC }}", "{{ .OPENCLAW_ALLOW_FROM_PH }}"],
                "groupPolicy": "allowlist",
                "groupAllowFrom": ["{{ .OPENCLAW_ALLOW_FROM_AC }}", "{{ .OPENCLAW_ALLOW_FROM_PH }}"],
                "groups": {
                  "{{ .BLUEBUBBLES_GROUP_ID }}": {
                    "requireMention": true
                  }
                },
                "enrichGroupParticipantsFromContacts": true,
                "sendReadReceipts": true,
                "actions": {
                  "reactions": true,
                  "edit": true,
                  "unsend": true,
                  "reply": true,
                  "sendWithEffect": true,
                  "renameGroup": true,
                  "setGroupIcon": true,
                  "addParticipant": true,
                  "removeParticipant": true,
                  "leaveGroup": true,
                  "sendAttachment": true
                }
              },
              "telegram": {
                "enabled": false,
                "botToken": "{{ .OPENCLAW_TELEGRAM_TOKEN }}",
                "dmPolicy": "pairing",
                "groupPolicy": "allowlist",
                "groups": {
                  "*": { "requireMention": true }
                },
                "streaming": "partial",
                "replyToMode": "first",
                "execApprovals": {
                  "enabled": true,
                  "target": "dm"
                },
                "actions": {
                  "reactions": true,
                  "sendMessage": true
                }
              },
              "matrix": {
                "enabled": true,
                "homeserver": "https://matrix.goyangi.io",
                "userId": "@hawow:goyangi.io",
                "accessToken": "{{ .MATRIX_BOT_ACCESS_TOKEN }}",
                "network": {"dangerouslyAllowPrivateNetwork": true},
                "streaming": "partial",
                "dm": {
                  "policy": "pairing",
                  "allowFrom": ["@andrew:goyangi.io"],
                  "threadReplies": "inbound"
                },
                "groups": {
                  "*": { "requireMention": true }
                },
                "execApprovals": {
                  "enabled": true,
                  "target": "dm"
                },
                "actions": {
                  "messages": true,
                  "reactions": true,
                  "pins": true,
                  "memberInfo": true,
                  "verification": true
                }
              }
            },
            "plugins": {
              "entries": {
                "bonjour": { "enabled": false },
                "bluebubbles": { "enabled": true },
                "matrix": { "enabled": true },
                "telegram": {},
                "memory-core": {},
                "codex": {
                  "enabled": true,
                  "config": {
                    "appServer": {
                      "mode": "yolo"
                    }
                  }
                },
                "hippo-memory": {
                  "enabled": true,
                  "config": {
                    "budget": 2000,
                    "autoContext": true,
                    "autoLearn": true,
                    "autoSleep": true,
                    "framing": "observe"
                  }
                },
                "brave": {
                  "enabled": true,
                  "config": {
                    "webSearch": {
                      "apiKey": "{{ .BRAVE_API_KEY }}"
                    }
                  }
                },
                "device-pair": {
                  "enabled": true,
                  "config": {
                    "publicUrl": "https://openclaw.goyangi.io"
                  }
                }
              }
            },
            "approvals": {
              "exec": {
                "enabled": false,
                "mode": "targets",
                "targets": [
                  { "channel": "telegram", "to": "{{ .OPENCLAW_TELEGRAM_ALLOW_FROM }}" }
                ]
              }
            },
            "tools": {
              "exec": { "host": "auto", "security": "full", "ask": "off" },
              "web": {
                "search": {
                  "enabled": true,
                  "provider": "brave"
                }
              },
              "media": {
                "audio": {
                  "enabled": true,
                  "models": [
                    {
                      "provider": "openai",
                      "model": "mlx-community/parakeet-tdt-0.6b-v3",
                      "baseUrl": "https://gateway.goyangi.io/v1"
                    }
                  ]
                }
              }
            },
            "session": {
              "maintenance": {
                "mode": "enforce",
                "pruneAfter": "7d",
                "maxDiskBytes": 200000000,
                "highWaterBytes": 160000000
              }
            },
            "hooks": {
              "enabled": true,
              "token": "{{ .OPENCLAW_HOOKS_TOKEN }}",
              "path": "/hooks"
            }
          }
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: openclaw
    - extract:
        key: agentgateway
    - extract:
        key: bluebubbles
    - extract:
        key: brave
    - extract:
        key: matrix
    - extract:
        key: openclaw-webhook
