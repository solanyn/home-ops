# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: honcho
spec:
    chartRef:
        kind: OCIRepository
        name: app-template
        namespace: flux-system
    interval: 10m
    values:
        controllers:
            honcho: &ct
                annotations:
                    reloader.stakater.com/auto: "true"
                initContainers:
                    init-db:
                        image:
                            repository: ghcr.io/home-operations/postgres-init
                            tag: 18
                        envFrom: &envFrom
                            - secretRef:
                                  name: honcho-secret
                containers:
                    app: &app
                        image:
                            repository: ghcr.io/plastic-labs/honcho
                            tag: v3.0.11@sha256:423dc96fd3034408d66e5381c184c9ea824610acdb5581898dd00b0b1ab096d6
                        command:
                            - /bin/sh
                            - -c
                            - |
                                set -e
                                /app/.venv/bin/python scripts/provision_db.py
                                exec /app/.venv/bin/fastapi run --host "::" src/main.py
                        env:
                            DB_CONNECTION_URI: postgresql+psycopg://{{ .HONCHO_POSTGRES_USER }}:{{ .HONCHO_POSTGRES_PASSWORD }}@postgres-rw.storage.svc.cluster.local/honcho
                            CACHE_URL: redis://dragonfly.storage.svc.cluster.local:6379/0
                            CACHE_ENABLED: "true"
                        envFrom: *envFrom
                        probes:
                            liveness: &probes
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /health
                                        port: 8000
                                    initialDelaySeconds: 10
                                    periodSeconds: 10
                                    failureThreshold: 5
                            readiness:
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /health
                                        port: 8000
                                    initialDelaySeconds: 10
                                    periodSeconds: 30
                                    failureThreshold: 5
                        resources:
                            requests:
                                cpu: 25m
                                memory: 256Mi
                            limits:
                                memory: 512Mi
            deriver:
                <<: *ct
                containers:
                    app:
                        <<: *app
                        command: ["/app/.venv/bin/python", "-m", "src.deriver"]
                        probes:
                            liveness:
                                enabled: false
                            readiness:
                                enabled: false
                        resources:
                            requests:
                                cpu: 25m
                                memory: 256Mi
                            limits:
                                memory: 512Mi
        defaultPodOptions:
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                fsGroupChangePolicy: OnRootMismatch
                seccompProfile: {type: RuntimeDefault}
        service:
            app:
                controller: honcho
                ports:
                    http:
                        port: 80
                        targetPort: 8000
        route:
            app:
                hostnames:
                    - "{{ .Release.Name }}.goyangi.io"
                parentRefs:
                    - name: envoy-internal
                      namespace: network
        persistence:
            config:
                type: configMap
                name: honcho-configmap
                globalMounts:
                    - path: /app/config.toml
                      subPath: config.toml
            tmp:
                type: emptyDir
