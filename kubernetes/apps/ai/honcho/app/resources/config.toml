[app]
LOG_LEVEL = "INFO"
PERFORMANCE_LOG_FORMAT = "compact"
SESSION_OBSERVERS_LIMIT = 10
GET_CONTEXT_MAX_TOKENS = 100000
MAX_FILE_SIZE = 5242880
MAX_MESSAGE_SIZE = 25000
EMBED_MESSAGES = true
NAMESPACE = "honcho"

[db]
SCHEMA = "public"
POOL_CLASS = "default"
POOL_PRE_PING = true
POOL_SIZE = 10
MAX_OVERFLOW = 20
POOL_TIMEOUT = 5
POOL_RECYCLE = 300
POOL_USE_LIFO = true
SQL_DEBUG = false
TRACING = false
CONNECT_TIMEOUT_SECONDS = 2

[auth]
USE_AUTH = false

[sentry]
ENABLED = false

[llm]
DEFAULT_MAX_TOKENS = 2500
MAX_TOOL_OUTPUT_CHARS = 10000
MAX_MESSAGE_CONTENT_CHARS = 2000

[embedding]
VECTOR_DIMENSIONS = 1024
MAX_INPUT_TOKENS = 8192
MAX_TOKENS_PER_REQUEST = 300000

[embedding.model_config]
transport = "openai"
model = "qwen3-embedding"

[embedding.model_config.overrides]
base_url = "http://192.168.10.30:8081/v1"

[deriver]
ENABLED = true
WORKERS = 1
POLLING_SLEEP_INTERVAL_SECONDS = 1.0
POLLING_BACKOFF_ENABLED = true
POLLING_SLEEP_MAX_INTERVAL_SECONDS = 30.0
POLLING_BACKOFF_MULTIPLIER = 2.0
POLLING_STARTUP_JITTER_SECONDS = 30.0
POLLING_JITTER_RATIO = 0.5
STALE_SESSION_TIMEOUT_MINUTES = 5
STALE_WORK_UNIT_CLEANUP_INTERVAL_SECONDS = 60.0
DEDUPLICATE = true
LOG_OBSERVATIONS = false
MAX_INPUT_TOKENS = 25000
MAX_CUSTOM_INSTRUCTIONS_TOKENS = 2000
WORKING_REPRESENTATION_MAX_OBSERVATIONS = 100
REPRESENTATION_BATCH_MAX_TOKENS = 1024
REPRESENTATION_BATCH_MAX_AGE_SECONDS = 1800
FLUSH_ENABLED = false

[deriver.model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[deriver.model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[peer_card]
ENABLED = true

[dialectic]
MAX_OUTPUT_TOKENS = 8192
MAX_INPUT_TOKENS = 100000
HISTORY_TOKEN_LIMIT = 8192
SESSION_HISTORY_MAX_TOKENS = 4096

[dialectic.levels.minimal]
MAX_TOOL_ITERATIONS = 1
MAX_OUTPUT_TOKENS = 250
TOOL_CHOICE = "auto"

[dialectic.levels.minimal.model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[dialectic.levels.minimal.model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[dialectic.levels.low]
MAX_TOOL_ITERATIONS = 5
TOOL_CHOICE = "auto"

[dialectic.levels.low.model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[dialectic.levels.low.model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[dialectic.levels.medium]
MAX_TOOL_ITERATIONS = 2

[dialectic.levels.medium.model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[dialectic.levels.medium.model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[dialectic.levels.high]
MAX_TOOL_ITERATIONS = 4

[dialectic.levels.high.model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[dialectic.levels.high.model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[dialectic.levels.max]
MAX_TOOL_ITERATIONS = 10

[dialectic.levels.max.model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[dialectic.levels.max.model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[summary]
ENABLED = true
MESSAGES_PER_SHORT_SUMMARY = 20
MESSAGES_PER_LONG_SUMMARY = 60
MAX_TOKENS_SHORT = 1000
MAX_TOKENS_LONG = 4000

[summary.model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[summary.model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[dream]
ENABLED = true
DOCUMENT_THRESHOLD = 50
IDLE_TIMEOUT_MINUTES = 60
MIN_HOURS_BETWEEN_DREAMS = 8
ENABLED_TYPES = ["omni"]
MAX_TOOL_ITERATIONS = 20
HISTORY_TOKEN_LIMIT = 16384

[dream.deduction_model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[dream.deduction_model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[dream.induction_model_config]
transport = "anthropic"
model = "MiniMax-M2.7"

[dream.induction_model_config.overrides]
base_url = "https://api.minimax.io/anthropic"
api_key_env = "MINIMAX_API_KEY"

[dream.surprisal]
ENABLED = false

[webhook]
SECRET = ""
MAX_WORKSPACE_LIMIT = 10

[metrics]
ENABLED = false

[telemetry]
ENABLED = false

[cache]
ENABLED = true
URL = "redis://dragonfly.storage.svc.cluster.local:6379/0"
DEFAULT_TTL_SECONDS = 300
DEFAULT_LOCK_TTL_SECONDS = 5

[vector_store]
TYPE = "pgvector"
MIGRATED = false
NAMESPACE = "honcho"
RECONCILIATION_INTERVAL_SECONDS = 300
