---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
    - ./externalsecret.yaml
    - ./helmrelease.yaml
    - ./ocirepository.yaml
configMapGenerator:
    - name: honcho-configmap
      files:
          - config.toml=./resources/config.toml
generatorOptions:
    disableNameSuffixHash: true
