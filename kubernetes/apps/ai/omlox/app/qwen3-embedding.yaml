---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-embedding
  namespace: ai
  labels:
    app.kubernetes.io/name: qwen3-embedding
    app.kubernetes.io/managed-by: static
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8000
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: qwen3-embedding
  namespace: ai
  labels:
    kubernetes.io/service-name: qwen3-embedding
    app.kubernetes.io/managed-by: static
addressType: IPv4
endpoints:
  - addresses:
      - "${OCT1}.${OCT2}.${OCT3}.${OCT4}"
    conditions:
      ready: true
ports:
  - name: http
    port: 8000
    protocol: TCP
