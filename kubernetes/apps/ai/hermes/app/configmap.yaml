---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
data:
  config.yaml: |
    model: openai/gpt-4
    temperature: 0.7
    terminal:
      backend: local
      timeout: 180
    memory:
      enabled: true
    compression:
      enabled: true
      threshold: 0.7
    gateway:
      platforms:
        matrix:
          enabled: true
    cron:
      enabled: true
