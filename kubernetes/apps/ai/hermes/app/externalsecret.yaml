---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: hermes
spec:
    secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword-connect
    target:
        name: hermes
        creationPolicy: Owner
        template:
            data:
                OPENAI_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
                HONCHO_API_KEY: "{{ .HONCHO_API_KEY }}"
                HONCHO_WORKSPACE_ID: "hermes"
                BLUEBUBBLES_SERVER_URL: http://bluebubbles.internal:1234
                BLUEBUBBLES_PASSWORD: "{{ .BLUEBUBBLES_PASSWORD }}"
                BLUEBUBBLES_WEBHOOK_HOST: 0.0.0.0
                BLUEBUBBLES_WEBHOOK_PORT: "8645"
                BLUEBUBBLES_WEBHOOK_PATH: /bluebubbles-webhook
                BLUEBUBBLES_REQUIRE_MENTION: "true"
                MATRIX_HOMESERVER: https://matrix.goyangi.io
                MATRIX_USER_ID: "@hermes:goyangi.io"
                MATRIX_ACCESS_TOKEN: "{{ .MATRIX_BOT_ACCESS_TOKEN }}"
                MATRIX_ALLOWED_USERS: "@andrew:goyangi.io"
                OP_SERVICE_ACCOUNT_TOKEN: "{{ .OP_SERVICE_ACCOUNT_TOKEN }}"
    dataFrom:
        - extract:
              key: litellm
        - extract:
              key: bluebubbles
        - extract:
              key: matrix
        - extract:
              key: honcho
        - extract:
              key: 1password