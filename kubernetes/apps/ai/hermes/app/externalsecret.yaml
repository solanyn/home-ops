---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hermes
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-secret
    template:
      engineVersion: v2
      data:
        # LLM provider - route through agentgateway
        OPENAI_API_KEY: "{{ .AGENTGATEWAY_API_KEY }}"
        OPENAI_BASE_URL: "https://gateway.goyangi.io/v1/opus"
        # Matrix
        MATRIX_HOMESERVER: "https://matrix.goyangi.io"
        MATRIX_USER_ID: "@hermes:goyangi.io"
        MATRIX_ACCESS_TOKEN: "{{ .MATRIX_HERMES_ACCESS_TOKEN }}"
        MATRIX_ALLOWED_USERS: "@andrew:goyangi.io"
  data:
    - secretKey: AGENTGATEWAY_API_KEY
      remoteRef:
        key: agentgateway
        property: AGENTGATEWAY_API_KEY
    - secretKey: MATRIX_HERMES_ACCESS_TOKEN
      remoteRef:
        key: hermes
        property: HERMES_MATRIX_ACCESS_TOKEN
