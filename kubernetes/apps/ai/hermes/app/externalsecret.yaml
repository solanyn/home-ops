---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: hermes-secret
    creationPolicy: Owner
    template:
      data:
        OPENAI_API_KEY: "{{ .KIRO_API_KEY }}"
        OPENAI_BASE_URL: "http://mac.internal:8001/v1"
        MATRIX_HOMESERVER: "https://matrix.goyangi.io"
        MATRIX_USER_ID: "@hermes:goyangi.io"
        MATRIX_ACCESS_TOKEN: "{{ .HERMES_MATRIX_ACCESS_TOKEN }}"
        MATRIX_ALLOWED_USERS: "@andrew:goyangi.io"
  dataFrom:
    - extract:
        key: kiro
    - extract:
        key: hermes
