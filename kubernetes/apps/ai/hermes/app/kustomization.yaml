# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
    - ./externalsecret.yaml
    - ./helmrelease.yaml
    - ./httproute.yaml
    - ./ocirepository.yaml
    - ./oidc.yaml
configMapGenerator:
  - name: hermes-config
    files:
      - ./resources/config.yaml
      - ./resources/entrypoint.sh
      - ./resources/Brewfile
    options:
      disableNameSuffixHash: true
