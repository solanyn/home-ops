# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 10m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
          install-tools:
            image:
              repository: docker.io/library/debian
              tag: "13-slim"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                apt-get update -qq && apt-get install -y -qq curl ca-certificates git util-linux >/dev/null 2>&1

                TOOLS="/opt/data/homebrew/bin"
                mkdir -p "$TOOLS"

                # zerobrew refuses to run as root. Bootstrap it as UID 10000 (hermes user);
                # the agent then installs tools itself via the entrypoint.
                ZB_HOME="/tmp/zbuser-home"
                mkdir -p "$ZB_HOME"
                chown 10000:10000 "$ZB_HOME"

                setpriv --reuid=10000 --regid=10000 --clear-groups env \
                  HOME="$ZB_HOME" \
                  ZB_HOME="$ZB_HOME" \
                  ZEROBREW_DIR="$ZB_HOME/.zerobrew" \
                  ZEROBREW_BIN="$ZB_HOME/.local/bin" \
                  bash -c '
                    set -euo pipefail
                    curl -fsSL https://zerobrew.rs/install | bash >/dev/null 2>&1
                  '

                cp "$ZB_HOME/.local/bin/"zb "$TOOLS/" 2>/dev/null || true

                chown -R 10000:10000 /opt/data/homebrew
                chmod -R a+rx "$TOOLS"

                echo "Bootstrapped:"
                ls -la "$TOOLS"
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
            command: ["/tmp/hermes-entrypoint.sh"]
            args: ["gateway", "run"]
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              PATH: /opt/data/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              ZEROBREW_BIN: /opt/data/homebrew/bin
              ZEROBREW_DIR: /opt/data/homebrew/.zerobrew
              ZEROBREW_PREFIX: /opt/data/homebrew
              TZ: Australia/Sydney
            envFrom:
              - secretRef:
                  name: hermes
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          dashboard:
            image: *image
            env:
              GATEWAY_HEALTH_URL: http://localhost:8642
              TZ: Australia/Sydney
            command: ["/opt/hermes/bin/hermes"]
            args:
              - dashboard
              - --host
              - 0.0.0.0
              - --insecure
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              limits:
                memory: 512Mi
    service:
      app:
        controller: hermes
        ports:
          http:
            port: 8642
      dashboard:
        controller: hermes
        ports:
          http:
            port: 9119
      webhook:
        controller: hermes
        ports:
          http:
            port: 8645
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
          - path: /tmp/hermes-entrypoint.sh
            subPath: entrypoint.sh
