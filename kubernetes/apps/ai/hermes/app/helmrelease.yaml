---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 30m
  values:
    controllers:
      hermes:
        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                if [ ! -f /opt/data/config.yaml ]; then
                  cp /config/config.yaml /opt/data/config.yaml
                  echo "Copied initial config.yaml"
                fi
                mkdir -p /opt/data/memories /opt/data/skills /opt/data/sessions /opt/data/cron /opt/data/logs
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: latest
            args: ["gateway", "run"]
            envFrom:
              - secretRef:
                  name: hermes-secret
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    configMaps:
      config:
        data:
          config.yaml: |-
            model: openai/gpt-4
            temperature: 0.7
            terminal:
              backend: local
              timeout: 180
            memory:
              enabled: true
            compression:
              enabled: true
              threshold: 0.7
            gateway:
              platforms:
                matrix:
                  enabled: true
            cron:
              enabled: true
    persistence:
      data:
        existingClaim: hermes
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
            readOnly: true
