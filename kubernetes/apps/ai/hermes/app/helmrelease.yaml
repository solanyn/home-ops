# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 10m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
          install-tools:
            image:
              repository: docker.io/library/debian
              tag: "13-slim"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null 2>&1
                TOOLS="/opt/data/homebrew/bin"
                mkdir -p "$TOOLS"

                install_zb() {
                  echo "Installing zerobrew..."
                  mkdir -p /tmp/zb
                  curl -fsSL https://zerobrew.rs/install 2>/dev/null | ZB_HOME=/tmp/zb bash 2>&1 || return 1
                  echo "zb binary installed, running zb install..."
                  /tmp/zb/zb install kubectl --dir "$TOOLS" 2>&1 || true
                  /tmp/zb/zb install flux --dir "$TOOLS" 2>&1 || true
                  /tmp/zb/zb install bat --dir "$TOOLS" 2>&1 || true
                  /tmp/zb/zb install shellcheck --dir "$TOOLS" 2>&1 || true
                }

                install_zb || echo "WARNING: tool installation failed (non-fatal)"

                echo "Tools in $TOOLS:"
                ls -la "$TOOLS" 2>/dev/null || echo "(empty)"
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
            command: ["/opt/hermes/bin/hermes"]
            args: ["gateway", "run"]
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: Australia/Sydney
            envFrom:
              - secretRef:
                  name: hermes
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          dashboard:
            image: *image
            env:
              GATEWAY_HEALTH_URL: http://localhost:8642
              TZ: Australia/Sydney
            command: ["/opt/hermes/bin/hermes"]
            args:
              - dashboard
              - --host
              - 127.0.0.1
              - --insecure
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              limits:
                memory: 512Mi
    service:
      app:
        controller: hermes
        ports:
          http:
            port: 8642
      webhook:
        controller: hermes
        ports:
          http:
            port: 8645
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
