# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 10m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
          install-tools:
            image:
              repository: docker.io/library/debian
              tag: "13-slim"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                apt-get update -qq && apt-get install -y -qq curl ca-certificates git build-essential file unzip util-linux patch bzip2 >/dev/null 2>&1

                # linuxbrew refuses to run as root and needs a writable $HOME.
                # Install at /opt/data/homebrew/.linuxbrew (PVC-backed, persists across pod restarts)
                # and use /opt/data/homebrew/.homebrew-user as the non-root $HOME.
                BREW_PREFIX="/opt/data/homebrew/.linuxbrew"
                BREW_USER_HOME="/opt/data/homebrew/.homebrew-user"
                mkdir -p "$BREW_PREFIX" "$BREW_USER_HOME"
                chown -R 10000:10000 "$BREW_PREFIX" "$BREW_USER_HOME"

                # brew casks require a passwd entry for the running UID.
                # Inject a synthetic entry for UID 10000 so 'op' cask can install.
                if ! getent passwd 10000 >/dev/null; then
                  echo "brewuser:x:10000:10000:brewuser:${BREW_USER_HOME}:/bin/bash" >> /etc/passwd
                fi

                setpriv --reuid=10000 --regid=10000 --clear-groups env \
                  HOME="$BREW_USER_HOME" \
                  HOMEBREW_PREFIX="$BREW_PREFIX" \
                  HOMEBREW_NO_ANALYTICS=1 \
                  HOMEBREW_NO_AUTO_UPDATE=1 \
                  NONINTERACTIVE=1 \
                  PATH="/opt/data/homebrew/.linuxbrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
                  bash -c '
                    set -euo pipefail

                    # The upstream install.sh ignores HOMEBREW_PREFIX on Linux and
                    # always tries to write to /home/linuxbrew/.linuxbrew via sudo.
                    # Bootstrap manually from the official brew tarball instead.
                    if [[ ! -x "$HOMEBREW_PREFIX/Homebrew/bin/brew" ]]; then
                      echo "[install-tools] Bootstrapping linuxbrew at $HOMEBREW_PREFIX (cold)..."
                      cd "$HOMEBREW_PREFIX"
                      curl -fsSL https://github.com/Homebrew/brew/tarball/main -o brew.tgz
                      mkdir -p Homebrew
                      tar -xzf brew.tgz -C Homebrew --strip-components 1
                      rm brew.tgz
                      mkdir -p bin
                      ln -sf ../Homebrew/bin/brew bin/brew
                    else
                      echo "[install-tools] linuxbrew already installed (warm cache hit)"
                    fi

                    eval "$("$HOMEBREW_PREFIX/bin/brew" shellenv)"

                    brew install kubectl flux bat shellcheck
                    # 1password-cli is a cask; supported by linuxbrew 4.x+
                    brew install --cask 1password-cli || echo "[install-tools] WARN: 1password-cli cask install failed"
                  '

                chmod -R a+rx "$BREW_PREFIX/bin"

                echo "[install-tools] Available binaries:"
                ls -la "$BREW_PREFIX/bin"
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
            command: ["/tmp/hermes-entrypoint.sh"]
            args: ["gateway", "run"]
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              PATH: /opt/data/homebrew/.linuxbrew/bin:/opt/data/homebrew/.linuxbrew/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              HOMEBREW_PREFIX: /opt/data/homebrew/.linuxbrew
              HOMEBREW_CELLAR: /opt/data/homebrew/.linuxbrew/Cellar
              HOMEBREW_NO_ANALYTICS: "1"
              HOMEBREW_NO_AUTO_UPDATE: "1"
              TZ: Australia/Sydney
            envFrom:
              - secretRef:
                  name: hermes
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          dashboard:
            image: *image
            env:
              GATEWAY_HEALTH_URL: http://localhost:8642
              TZ: Australia/Sydney
            command: ["/opt/hermes/bin/hermes"]
            args:
              - dashboard
              - --host
              - 0.0.0.0
              - --insecure
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              limits:
                memory: 512Mi
    service:
      app:
        controller: hermes
        ports:
          http:
            port: 8642
      dashboard:
        controller: hermes
        ports:
          http:
            port: 9119
      webhook:
        controller: hermes
        ports:
          http:
            port: 8645
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
          - path: /tmp/hermes-entrypoint.sh
            subPath: entrypoint.sh
