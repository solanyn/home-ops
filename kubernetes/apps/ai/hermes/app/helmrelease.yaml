---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      hermes:
        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            command:
              - sh
              - -c
              - |
                # Copy config files to data dir if they don't exist yet (first boot)
                if [ ! -f /opt/data/config.yaml ]; then
                  cp /config/config.yaml /opt/data/config.yaml
                  echo "Copied initial config.yaml"
                fi
                if [ ! -f /opt/data/SOUL.md ]; then
                  cp /config/SOUL.md /opt/data/SOUL.md
                  echo "Copied initial SOUL.md"
                fi
                # Create directories
                mkdir -p /opt/data/memories /opt/data/skills /opt/data/sessions /opt/data/cron /opt/data/logs
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: latest
            args: ["gateway", "run"]
            envFrom:
              - secretRef:
                  name: hermes-secret
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    persistence:
      data:
        existingClaim: hermes
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: hermes-config
        globalMounts:
          - path: /config
            readOnly: true
