# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 10m
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.24"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                cp /tmp/config.yaml /opt/data/config.yaml
          install-tools:
            image:
              repository: docker.io/library/debian
              tag: "13-slim"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                apt-get update -qq && apt-get install -y -qq curl ca-certificates >/dev/null 2>&1
                TOOLS="/opt/data/homebrew/bin"
                mkdir -p "$TOOLS"
                export PATH="$TOOLS:$PATH"

                if [ ! -x "$TOOLS/kubectl" ]; then
                  echo "Installing kubectl..."
                  KUBE_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
                  curl -sLo "$TOOLS/kubectl" "https://dl.k8s.io/release/${KUBE_VERSION}/bin/linux/amd64/kubectl"
                  chmod +x "$TOOLS/kubectl"
                fi

                if [ ! -x "$TOOLS/flux" ]; then
                  echo "Installing flux..."
                  curl -sLo "$TOOLS/flux" "https://github.com/fluxcd/flux2/releases/latest/download/flux_linux_amd64"
                  chmod +x "$TOOLS/flux"
                fi

                if [ ! -x "$TOOLS/bat" ]; then
                  echo "Installing bat..."
                  curl -sLo /tmp/bat.tar.gz "https://github.com/sharkdp/bat/releases/latest/download/bat-v0.25.0-x86_64-unknown-linux-gnu.tar.gz"
                  tar -xzf /tmp/bat.tar.gz -C "$TOOLS" --strip-components=1 "bat-v0.25.0-x86_64-unknown-linux-gnu/bat"
                  rm /tmp/bat.tar.gz
                fi

                if [ ! -x "$TOOLS/shellcheck" ]; then
                  echo "Installing shellcheck..."
                  curl -sLo /tmp/shc.tar.xz "https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz"
                  tar -xJf /tmp/shc.tar.xz -C "$TOOLS" --strip-components=1 "shellcheck-v0.10.0/shellcheck"
                  rm /tmp/shc.tar.xz
                fi

                echo "Tools installed in $TOOLS:"
                ls -la "$TOOLS"
        containers:
          app:
            image: &image
              repository: nousresearch/hermes-agent
              tag: v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
            command: ["/opt/hermes/bin/hermes"]
            args: ["gateway", "run"]
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              TZ: Australia/Sydney
            envFrom:
              - secretRef:
                  name: hermes
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
          dashboard:
            image: *image
            env:
              GATEWAY_HEALTH_URL: http://localhost:8642
              TZ: Australia/Sydney
            command: ["/opt/hermes/bin/hermes"]
            args:
              - dashboard
              - --host
              - 127.0.0.1
              - --insecure
            securityContext:
              runAsUser: 10000
              runAsGroup: 10000
            resources:
              limits:
                memory: 512Mi
    service:
      app:
        controller: hermes
        ports:
          http:
            port: 8642
      webhook:
        controller: hermes
        ports:
          http:
            port: 8645
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      configmap:
        type: configMap
        name: "{{ .Release.Name }}-config"
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
