# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: hermes
spec:
    chartRef:
        kind: OCIRepository
        name: app-template
        namespace: flux-system
    interval: 10m
    values:
        defaultPodOptions:
            securityContext:
                fsGroup: 10000
                fsGroupChangePolicy: OnRootMismatch
                seccompProfile: {type: RuntimeDefault}
        controllers:
            hermes:
                annotations:
                    reloader.stakater.com/auto: "true"
                initContainers:
                    init:
                        image:
                            repository: docker.io/library/alpine
                            tag: "3.22"
                        command:
                            - sh
                            - -c
                            - |
                                set -euo pipefail
                                cp /tmp/config.yaml /opt/data/config.yaml
                                chown 10000:10000 /opt/data/config.yaml
                                MEMINI_PLUGIN_REF=c36842f6e2fa4a5e89f689d78d6d2daa2bf73219
                                PLUGIN_DIR=/opt/data/plugins/memini
                                if [ "$(cat "$PLUGIN_DIR/.ref" 2>/dev/null)" != "$MEMINI_PLUGIN_REF" ]; then
                                  BASE="https://raw.githubusercontent.com/eleboucher/memini-hermes/$MEMINI_PLUGIN_REF"
                                  if wget -qO /tmp/memini-init.py "$BASE/__init__.py" && wget -qO /tmp/memini-plugin.yaml "$BASE/plugin.yaml"; then
                                    rm -rf "$PLUGIN_DIR"
                                    mkdir -p "$PLUGIN_DIR"
                                    mv /tmp/memini-init.py "$PLUGIN_DIR/__init__.py"
                                    mv /tmp/memini-plugin.yaml "$PLUGIN_DIR/plugin.yaml"
                                    printf '%s' "$MEMINI_PLUGIN_REF" > "$PLUGIN_DIR/.ref"
                                    chown -R 10000:10000 "$PLUGIN_DIR"
                                  fi
                                fi
                containers:
                    app:
                        image: &image
                            repository: nousresearch/hermes-agent
                            tag: v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
                        args: ["gateway", "run"]
                        env:
                            MEMINI_URL: http://memini.ai.svc.cluster.local:8080
                            MEMINI_NAMESPACE: andrew
                            HERMES_HOME: /opt/data
                            HOME: /opt/data
                            TZ: Australia/Sydney
                        envFrom:
                            - secretRef:
                                  name: hermes
                        resources:
                            requests:
                                cpu: 500m
                                memory: 1Gi
                            limits:
                                memory: 2Gi
                    dashboard:
                        image: *image
                        env:
                            GATEWAY_HEALTH_URL: http://localhost:8642
                            TZ: Australia/Sydney
                        envFrom:
                            - secretRef:
                                  name: hermes-dashboard
                        args:
                            - dashboard
                            - --host
                            - "::"
                        resources:
                            requests:
                                cpu: 500m
                            limits:
                                memory: 1Gi
        service:
            app:
                controller: hermes
                ports:
                    http:
                        port: 8642
            dashboard:
                controller: hermes
                ports:
                    http:
                        port: 9119
        route:
            app:
                hostnames:
                    - "{{ .Release.Name }}.goyangi.io"
                parentRefs:
                    - name: envoy-internal
                      namespace: network
                rules:
                    - backendRefs:
                          - identifier: dashboard
                            port: http
        persistence:
            config:
                existingClaim: "{{ .Release.Name }}"
                globalMounts:
                    - path: /opt/data
            configmap:
                type: configMap
                name: "{{ .Release.Name }}-config"
                defaultMode: 0755
                globalMounts:
                    - path: /tmp/config.yaml
                      subPath: config.yaml
