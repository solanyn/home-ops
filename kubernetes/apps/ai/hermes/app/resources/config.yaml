_config_version: 27
model:
  default: minimax-m3
  provider: litellm
providers:
  litellm:
    base_url: http://litellm.ai.svc.cluster.local:4000/v1
    api_key: $${LITELLM_API_KEY}
toolsets:
  - hermes-cli
terminal:
  backend: local
  cwd: /opt/data/workspace
  timeout: 180
  persistent_shell: true
memory:
  provider: memini
  auto_migrate: true
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20
agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 2
  reasoning_effort: medium
streaming:
  enabled: true
security:
  redact_secrets: true
privacy:
  redact_pii: true
platform_toolsets:
  cli:
    - hermes-cli
auxiliary:
  vision:
    provider: litellm
    model: vision
  compression:
    provider: litellm
    model: minimax-m3
    timeout: 180
  web_extract:
    provider: litellm
    model: minimax-m3
    timeout: 120
  session_search:
    provider: litellm
    model: minimax-m3
    timeout: 120
