---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: hermes
spec:
    hostnames:
        - hermes.goyangi.io
    parentRefs:
        - name: envoy-internal
          namespace: network
    rules:
        - matches:
            - path:
                  type: PathPrefix
                  value: /bluebubbles-webhook
          backendRefs:
            - name: hermes-webhook
              port: 8645
        - backendRefs:
            - name: hermes-dashboard
              port: 9119
