# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: memini
spec:
    chartRef:
        kind: OCIRepository
        name: app-template
        namespace: flux-system
    interval: 10m
    values:
        controllers:
            memini:
                containers:
                    app:
                        image:
                            repository: git.erwanleboucher.dev/eleboucher/memini
                            tag: 0.4.17@sha256:f96c7059515851cea983d2537e7d9c1ff168f6bfc203d32ef03036964a2feee2
                        env:
                            MEMINI_HTTP_ADDR: ":8080"
                            MEMINI_LOG_FORMAT: json
                            MEMINI_BACKEND: sqlite
                            MEMINI_DEFAULT_NAMESPACE: andrew
                            MEMINI_EMBED_BASE_URL: http://192.168.10.30:8081/v1
                            MEMINI_EMBED_MODEL: qwen3-embedding
                            MEMINI_EMBED_DIMS: "1024"
                            MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
                            MEMINI_EMBED_MAX_CONCURRENCY: "2"
                            MEMINI_RECALL_EMBED_TIMEOUT: 5s
                            MEMINI_WRITE_DEDUP_SCORE: "0.80"
                            MEMINI_WRITE_DEDUP_ACTION: coalesce
                            MEMINI_DEDUP_TIERS: episodic
                            MEMINI_DEDUP_SIMILARITY: "0.80"
                            MEMINI_SHORT_TERM_CAP: "300"
                            MEMINI_LLM_BASE_URL: https://api.minimax.io/anthropic
                            MEMINI_LLM_API: anthropic
                            MEMINI_LLM_MODEL: MiniMax-M2.7
                            MEMINI_REEMBED_ON_MODEL_CHANGE: "true"
                        envFrom:
                            - secretRef:
                                  name: memini
                        probes:
                            liveness: &probes
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /healthz
                                        port: 8080
                                    initialDelaySeconds: 5
                                    periodSeconds: 10
                                    failureThreshold: 3
                            readiness:
                                enabled: true
                                custom: true
                                spec:
                                    httpGet:
                                        path: /readyz
                                        port: 8080
                                    initialDelaySeconds: 5
                                    periodSeconds: 10
                                    failureThreshold: 3
                        resources:
                            requests:
                                cpu: 25m
                                memory: 128Mi
                            limits:
                                memory: 512Mi
        defaultPodOptions:
            securityContext:
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                fsGroup: 65532
                fsGroupChangePolicy: OnRootMismatch
                seccompProfile: {type: RuntimeDefault}
        service:
            app:
                controller: memini
                ports:
                    http:
                        port: 8080
        persistence:
            data:
                existingClaim: memini
