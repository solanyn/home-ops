---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-notebook
spec:
  chartRef:
    kind: OCIRepository
    name: open-notebook
  interval: 10m
  values:
    controllers:
      open-notebook:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/lfnovo/open_notebook
              tag: v1-latest
            env:
              SURREAL_URL: ws://surrealdb.ai.svc.cluster.local:8000/rpc
              SURREAL_NAMESPACE: open_notebook
              SURREAL_DATABASE: open_notebook
            envFrom:
              - secretRef:
                  name: open-notebook-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8502
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: open-notebook
        ports:
          http:
            port: 8502
          api:
            port: 5055
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.goyangi.io"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          open-notebook:
            app:
              - path: /app/data
