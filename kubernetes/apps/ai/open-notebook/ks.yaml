---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-notebook-surrealdb
spec:
  targetNamespace: ai
  components:
    - ../../../../components/volsync
  interval: 1h
  path: ./kubernetes/apps/ai/open-notebook/surrealdb
  postBuild:
    substitute:
      APP: surrealdb
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: open-notebook
spec:
  targetNamespace: ai
  components:
    - ../../../../components/volsync
  dependsOn:
    - name: open-notebook-surrealdb
      namespace: ai
  interval: 1h
  path: ./kubernetes/apps/ai/open-notebook/app
  postBuild:
    substitute:
      APP: open-notebook
      VOLSYNC_CAPACITY: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
