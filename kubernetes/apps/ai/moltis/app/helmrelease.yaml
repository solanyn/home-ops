---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: moltis
spec:
  chartRef:
    kind: OCIRepository
    name: moltis
  interval: 10m
  values:
    controllers:
      moltis:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          daemon:
            image:
              repository: docker
              tag: 29.4.0-dind
            restartPolicy: Always
            securityContext:
              privileged: true
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
            env:
              DOCKER_TLS_CERTDIR: /certs
            probes:
              startup:
                enabled: true
                custom: true
                spec: &daemonProbe
                  exec:
                    command: ["docker", "info"]
                  periodSeconds: 2
                  timeoutSeconds: 3
                  failureThreshold: 60
              readiness:
                enabled: true
                custom: true
                spec:
                  <<: *daemonProbe
                  periodSeconds: 5
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  <<: *daemonProbe
                  periodSeconds: 20
                  failureThreshold: 3
          git-sync:
            image:
              repository: alpine/git
              tag: "2.47.2"
            restartPolicy: Always
            command:
              - /bin/sh
              - -c
              - |
                set -e
                REPO_DIR=/workspace-repo/repo
                REPO_URL="https://andrew:$${FORGEJO_TOKEN}@forgejo.goyangi.io/andrew/hawow.git"
                DIRS="skills scripts vault me memory"
                FILES="SOUL.md IDENTITY.md USER.md MEMORY.md TOOLS.md AGENTS.md HEARTBEAT.md"

                git config --global user.name "bot-goyangi[bot]"
                git config --global user.email "194625711+bot-goyangi[bot]@users.noreply.github.com"
                git config --global safe.directory "$REPO_DIR"

                # Initial clone
                if [ ! -d "$REPO_DIR/.git" ]; then
                  git clone "$REPO_URL" "$REPO_DIR"
                fi
                ln -sfn "$REPO_DIR" /workspace-repo/current

                echo "Workspace sync running (pull+push every 5m)..."
                while true; do
                  sleep 300

                  cd "$REPO_DIR" || continue

                  # Pull remote changes
                  git fetch origin master && git reset --hard origin/master

                  # Sync repo -> /data (picks up remote changes)
                  for dir in $DIRS; do
                    [ -d "$REPO_DIR/$dir" ] && cp -a "$REPO_DIR/$dir/." "/data/$dir/" 2>/dev/null
                  done
                  for f in $FILES; do
                    [ -f "$REPO_DIR/$f" ] && cp "$REPO_DIR/$f" "/data/$f"
                  done

                  # Sync /data -> repo (picks up moltis changes)
                  for dir in $DIRS; do
                    if [ -d "/data/$dir" ]; then
                      rm -rf "$REPO_DIR/$dir"
                      cp -a "/data/$dir" "$REPO_DIR/$dir"
                    fi
                  done
                  for f in $FILES; do
                    [ -f "/data/$f" ] && cp "/data/$f" "$REPO_DIR/$f"
                  done

                  # Commit and push if changed
                  git add -A
                  if ! git diff --cached --quiet; then
                    echo "$(date): pushing workspace changes..."
                    git commit -m "chore: sync workspace changes"
                    git push origin master || echo "push failed, will retry"
                  fi
                done
            env:
              HOME: /tmp
              FORGEJO_TOKEN:
                secretKeyRef:
                  name: moltis-secret
                  key: FORGEJO_API_TOKEN
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
          init-workspace:
            image:
              repository: ghcr.io/moltis-org/moltis
              tag: 20260409.01@sha256:0d263e279db8b413dd8355621d54315cd0ba7771411744bda931ac970e38265f
            command:
              - /bin/sh
              - -c
              - |
                # Copy config to writable location
                cp /tmp/moltis-config/moltis.toml /config/moltis.toml
                chmod 600 /config/moltis.toml

                # Copy SSH keys to sandbox shared home (/home/sandbox in container)
                mkdir -p /data/sandbox/home/shared/.ssh
                cp /tmp/ssh-secrets/ssh_private_key /data/sandbox/home/shared/.ssh/id_ed25519
                cp /tmp/ssh-secrets/ssh_config /data/sandbox/home/shared/.ssh/config
                chmod 700 /data/sandbox/home/shared/.ssh
                chmod 600 /data/sandbox/home/shared/.ssh/id_ed25519 /data/sandbox/home/shared/.ssh/config

                # Setup fj CLI config for sandbox
                mkdir -p /data/sandbox/home/shared/.config/fj
                cp /tmp/ssh-secrets/fj_config /data/sandbox/home/shared/.config/fj/config.toml
                chmod 600 /data/sandbox/home/shared/.config/fj/config.toml

                # Also keep copies for the moltis app container
                mkdir -p /home/moltis/.config/fj
                cp /tmp/ssh-secrets/fj_config /home/moltis/.config/fj/config.toml
                chmod 600 /home/moltis/.config/fj/config.toml

                # Wait for git-sync initial clone
                echo "Waiting for git-sync..."
                for i in $(seq 1 60); do
                  [ -d /workspace-repo/current ] && break
                  sleep 2
                done

                # Sync workspace dirs into /data
                if [ -d /workspace-repo/current ]; then
                  for dir in skills scripts vault me memory; do
                    if [ -d "/workspace-repo/current/$dir" ]; then
                      rm -rf "/data/$dir"
                      cp -a "/workspace-repo/current/$dir" "/data/$dir"
                    fi
                  done
                  for f in SOUL.md IDENTITY.md USER.md MEMORY.md TOOLS.md AGENTS.md HEARTBEAT.md; do
                    [ -f "/workspace-repo/current/$f" ] && cp "/workspace-repo/current/$f" "/data/$f"
                  done
                  echo "Workspace synced from git"
                else
                  echo "WARNING: git-sync not ready, skipping workspace sync"
                fi
        containers:
          app:
            image:
              repository: ghcr.io/moltis-org/moltis
              tag: 20260409.01@sha256:0d263e279db8b413dd8355621d54315cd0ba7771411744bda931ac970e38265f
            args:
              - --bind
              - "0.0.0.0"
              - --port
              - "13131"
              - --no-tls
            env:
              TZ: Australia/Sydney
              MOLTIS_BEHIND_PROXY: "true"
              MOLTIS_CONFIG_DIR: /config
              MOLTIS_DATA_DIR: /data
              MOLTIS_WEBAUTHN_RP_ID: moltis.goyangi.io
              MOLTIS_WEBAUTHN_ORIGIN: https://moltis.goyangi.io
              DOCKER_HOST: tcp://localhost:2376
              DOCKER_CERT_PATH: /certs/client
              DOCKER_TLS_VERIFY: "1"
            envFrom:
              - secretRef:
                  name: moltis-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 13131
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probe
            resources:
              requests:
                cpu: 10m
                memory: 64Mi

    defaultPodOptions:
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - moltis.goyangi.io
        parentRefs:
          - name: envoy-internal
            namespace: network

    rbac:
      roles:
        moltis-read-all:
          type: ClusterRole
          rules:
            - apiGroups: ["apiextensions.k8s.io"]
              resources: ["customresourcedefinitions"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources: ["deployments/scale"]
              verbs: ["get", "patch", "update"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch", "patch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch", "patch"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["gitrepositories", "ocirepositories", "helmrepositories", "helmcharts"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["grafana.integreatly.org"]
              resources: ["grafanadashboards", "grafanadatasources", "grafanas", "grafanafolders"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets", "clustersecretstores", "secretstores"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["container.gcp.upbound.io"]
              resources: ["clusters", "nodepools"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["monitoring.coreos.com"]
              resources: ["prometheusrules", "servicemonitors", "podmonitors", "alertmanagerconfigs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["gateways", "httproutes", "grpcroutes"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["discovery.liqo.io", "net.liqo.io", "offloading.liqo.io", "sharing.liqo.io"]
              resources: ["*"]
              verbs: ["get", "list", "watch"]
        moltis-write-restricted:
          type: Role
          rules:
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
            - apiGroups: [""]
              resources: ["services", "configmaps"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["httproutes"]
              verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
        moltis-pod-manage:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
      bindings:
        moltis-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: moltis-read-all
          subjects:
            - identifier: moltis
              serviceAccount: moltis
        moltis-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: moltis-write-restricted
          subjects:
            - identifier: moltis
              serviceAccount: moltis
        moltis-pod-manage:
          type: ClusterRoleBinding
          roleRef:
            identifier: moltis-pod-manage
          subjects:
            - identifier: moltis
              serviceAccount: moltis

    serviceAccount:
      moltis: {}

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config
            subPath: config
          - path: /data
            subPath: data
      hawow:
        type: nfs
        server: nas.internal
        path: /mnt/world/hawow
        globalMounts:
          - path: /home/moltis/hawow
      ssh-keys:
        type: secret
        name: moltis-secret
        defaultMode: 0600
        items:
          - key: ssh_private_key
            path: id_ed25519
          - key: ssh_config
            path: config
        globalMounts:
          - path: /home/moltis/.ssh
      ssh-secrets:
        type: secret
        name: moltis-secret
        items:
          - key: ssh_private_key
            path: ssh_private_key
          - key: ssh_config
            path: ssh_config
          - key: fj_config
            path: fj_config
        advancedMounts:
          moltis:
            init-workspace:
              - path: /tmp/ssh-secrets
                readOnly: true
      moltis-config:
        type: secret
        name: moltis-config
        defaultMode: 0600
        items:
          - key: moltis.toml
            path: moltis.toml
        advancedMounts:
          moltis:
            init-workspace:
              - path: /tmp/moltis-config
                readOnly: true
      workspace-repo:
        type: emptyDir
      docker-data:
        type: persistentVolumeClaim
        suffix: docker-data
        accessMode: ReadWriteOnce
        size: 15Gi
        storageClass: openebs-hostpath
        advancedMounts:
          moltis:
            daemon:
              - path: /var/lib/docker
      tmp:
        type: emptyDir
      certs:
        type: emptyDir
