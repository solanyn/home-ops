---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: moltis
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: moltis-secret
    creationPolicy: Owner
    template:
      data:
        MOLTIS_PASSWORD: "{{ .MOLTIS_PASSWORD }}"
        MOLTIS_API_KEY: "{{ .AGENTGATEWAY_API_KEY }}"
        FORGEJO_TOKEN: "{{ .FORGEJO_TOKEN }}"
        BRAVE_API_KEY: "{{ .BRAVE_API_KEY }}"
        FORGEJO_API_TOKEN: "{{ .FORGEJO_TOKEN }}"
        ssh_private_key: "{{ .MOLTIS_SSH_PRIVATE_KEY }}"
        ssh_config: |
          Host forgejo.goyangi.io ssh.forgejo.goyangi.io
            HostName ssh.forgejo.goyangi.io
            User git
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host mac.internal
            User andrew
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host work.internal
            HostName chisel.network.svc.cluster.local
            User {{ .CHISEL_SSH_USER }}
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
        fj_config: |
          [logins]
            [[logins.list]]
            name = "forgejo"
            url = "https://forgejo.goyangi.io"
            token = "{{ .FORGEJO_TOKEN }}"
            default = true
            ssh_host = "ssh.forgejo.goyangi.io"
            user = "andrew"
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: moltis
    - extract:
        key: chisel
    - extract:
        key: forgejo
    - extract:
        key: brave
    - extract:
        key: agentgateway
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: moltis-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: moltis-config
    creationPolicy: Owner
    template:
      data:
        moltis.toml: |
          [env]
          BRAVE_API_KEY = "{{ .BRAVE_API_KEY }}"
          FORGEJO_TOKEN = "{{ .FORGEJO_TOKEN }}"

          [channels]
          offered = ["discord", "slack", "matrix"]

          [providers.custom-gateway]
          enabled = true
          base_url = "https://gateway.goyangi.io/v1/opus"
          api_key = "{{ .AGENTGATEWAY_API_KEY }}"
          models = ["opus"]

          [providers.custom-local]
          enabled = true
          base_url = "http://mac.internal:8080/v1"
          api_key = "dummy"
          models = ["gemma4"]

          [chat]
          priority_models = ["opus"]

          [heartbeat]
          enabled = true
          every = "30m"
          model = "custom-gateway::opus"
          sandbox_enabled = true

          [heartbeat.active_hours]
          start = "08:00"
          end = "24:00"
          timezone = "Australia/Sydney"

          [voice.tts]
          enabled = true
          provider = "openai"

          [voice.tts.openai]
          base_url = "http://mac.internal:8000/v1"
          api_key = "dummy"
          model = "kokoro"
          voice = "af_heart"

          [voice.stt]
          enabled = true

          [voice.stt.whisper]
          base_url = "http://mac.internal:8000/v1"
          api_key = "dummy"
          model = "parakeet-tdt-0.6b-v2"

          [tools.exec.sandbox]
          network = "trusted"
          trusted_domains = [
            "forgejo.goyangi.io",
            "ssh.forgejo.goyangi.io",
            "github.com",
            "registry.npmjs.org",
            "pypi.org",
            "files.pythonhosted.org",
          ]

          [skills]
          enabled = true
          search_paths = ["/data/skills"]
          auto_load = []
  dataFrom:
    - extract:
        key: moltis
    - extract:
        key: agentgateway
    - extract:
        key: brave
    - extract:
        key: forgejo
