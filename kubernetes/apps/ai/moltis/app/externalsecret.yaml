---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: moltis
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: moltis-secret
    creationPolicy: Owner
    template:
      data:
        MOLTIS_PASSWORD: "{{ .MOLTIS_PASSWORD }}"
        MOLTIS_API_KEY: "{{ .AGENTGATEWAY_API_KEY }}"
        FORGEJO_API_TOKEN: "{{ .FORGEJO_TOKEN }}"
        ssh_private_key: "{{ .OPENCLAW_SSH_PRIVATE_KEY }}"
        ssh_config: |
          Host forgejo.goyangi.io ssh.forgejo.goyangi.io
            HostName ssh.forgejo.goyangi.io
            User git
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host mac.internal
            User andrew
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host work.internal
            HostName chisel.network.svc.cluster.local
            User {{ .CHISEL_SSH_USER }}
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
        fj_config: |
          [logins]
            [[logins.list]]
            name = "forgejo"
            url = "https://forgejo.goyangi.io"
            token = "{{ .FORGEJO_TOKEN }}"
            default = true
            ssh_host = "ssh.forgejo.goyangi.io"
            user = "andrew"
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: moltis
    - extract:
        key: openclaw
    - extract:
        key: chisel
    - extract:
        key: forgejo
    - extract:
        key: agentgateway
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: moltis-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: moltis-config
    creationPolicy: Owner
    template:
      data:
        moltis.toml: |
          [env]
          MOLTIS_PROVIDER = "openai-compatible"
          MOLTIS_API_KEY = "{{ .AGENTGATEWAY_API_KEY }}"
          MOLTIS_MODEL = "opus"
          BRAVE_API_KEY = "{{ .BRAVE_API_KEY }}"

          [memory]
          enabled = true
          auto_learn = true
          auto_context = true

          [sandbox]
          enabled = true

          [channels.telegram]
          enabled = false
          bot_token = "{{ .OPENCLAW_TELEGRAM_TOKEN }}"

          [channels.matrix]
          enabled = false
          homeserver = "https://matrix.goyangi.io"
          access_token = "{{ .MATRIX_BOT_ACCESS_TOKEN }}"
          ownership_mode = "moltis_owned"
          dm_policy = "allowlist"
          room_policy = "allowlist"
          mention_mode = "mention"
          auto_join = "allowlist"
          stream_mode = "edit_in_place"
          reply_to_message = true

          [providers.gateway]
          type = "openai-compatible"
          base_url = "https://gateway.goyangi.io/v1/opus"
          api_key = "{{ .AGENTGATEWAY_API_KEY }}"

          [[providers.gateway.models]]
          id = "opus"
          name = "Opus (Gemma 4 failover)"

          [providers.local]
          type = "openai-compatible"
          base_url = "http://mac.internal:8080/v1"
          api_key = "dummy"

          [[providers.local.models]]
          id = "gemma4"
          name = "Gemma 4 E4B (direct)"
  dataFrom:
    - extract:
        key: moltis
    - extract:
        key: openclaw
    - extract:
        key: agentgateway
    - extract:
        key: brave
    - extract:
        key: matrix
