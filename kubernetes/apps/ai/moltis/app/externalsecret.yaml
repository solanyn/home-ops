---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: moltis
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: moltis-secret
    creationPolicy: Owner
    template:
      data:
        MOLTIS_PASSWORD: "{{ .MOLTIS_PASSWORD }}"
        MOLTIS_API_KEY: "{{ .AGENTGATEWAY_API_KEY }}"
        FORGEJO_API_TOKEN: "{{ .FORGEJO_TOKEN }}"
        ssh_private_key: "{{ .OPENCLAW_SSH_PRIVATE_KEY }}"
        ssh_config: |
          Host forgejo.goyangi.io ssh.forgejo.goyangi.io
            HostName ssh.forgejo.goyangi.io
            User git
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host mac.internal
            User andrew
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
          Host work.internal
            HostName chisel.network.svc.cluster.local
            User {{ .CHISEL_SSH_USER }}
            Port 2222
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking no
        fj_config: |
          [logins]
            [[logins.list]]
            name = "forgejo"
            url = "https://forgejo.goyangi.io"
            token = "{{ .FORGEJO_TOKEN }}"
            default = true
            ssh_host = "ssh.forgejo.goyangi.io"
            user = "andrew"
  dataFrom:
    - extract:
        key: 1password
    - extract:
        key: moltis
    - extract:
        key: openclaw
    - extract:
        key: chisel
    - extract:
        key: forgejo
    - extract:
        key: agentgateway
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: moltis-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: moltis-config
    creationPolicy: Owner
    template:
      data:
        moltis.toml: |
          [env]
          MOLTIS_PROVIDER = "openai-compatible"
          MOLTIS_API_KEY = "{{ .AGENTGATEWAY_API_KEY }}"
          MOLTIS_MODEL = "opus"
          BRAVE_API_KEY = "{{ .BRAVE_API_KEY }}"

          [memory]
          enabled = true
          auto_learn = true
          auto_context = true

          [sandbox]
          enabled = true

          [channels.telegram]
          enabled = false
          bot_token = "{{ .OPENCLAW_TELEGRAM_TOKEN }}"

          [channels.matrix]
          enabled = false
          homeserver = "https://matrix.goyangi.io"
          access_token = "{{ .MATRIX_BOT_ACCESS_TOKEN }}"
          ownership_mode = "moltis_owned"
          dm_policy = "allowlist"
          room_policy = "allowlist"
          mention_mode = "mention"
          auto_join = "allowlist"
          stream_mode = "edit_in_place"
          reply_to_message = true

          [providers.gateway]
          type = "openai-compatible"
          base_url = "https://gateway.goyangi.io/v1/opus"
          api_key = "{{ .AGENTGATEWAY_API_KEY }}"

          [[providers.gateway.models]]
          id = "opus"
          name = "Opus (Gemma 4 failover)"

          [providers.local]
          type = "openai-compatible"
          base_url = "http://mac.internal:8080/v1"
          api_key = "dummy"

          [[providers.local.models]]
          id = "gemma4"
          name = "Gemma 4 E4B (direct)"

          [[cron]]
          name = "morning-check"
          schedule = "30 8 * * 1-5"
          timezone = "Australia/Sydney"
          task = "Morning health + calendar + email check. Review sleep data from InfluxDB, check work calendar, summarize important emails."

          [[cron]]
          name = "evening-check"
          schedule = "30 17 * * 1-5"
          timezone = "Australia/Sydney"
          task = "Tomorrow calendar preview, check for uncommitted work, flag urgent follow-ups."

          [[cron]]
          name = "weekly-review"
          schedule = "0 8 * * 1"
          timezone = "Australia/Sydney"
          task = "Week ahead summary, memory maintenance - review last week daily notes, run hippo sleep for consolidation."

          [[cron]]
          name = "rss-digest"
          schedule = "0 14 * * *"
          timezone = "Australia/Sydney"
          task = "Check Fusion RSS for interesting articles from last 24h. Focus: Latent.Space, Simon Willison, Chip Huyen, Interconnects AI. 3-5 items max."

          [[cron]]
          name = "ozbargain"
          schedule = "0 10,18 * * *"
          timezone = "Australia/Sydney"
          task = "Check OzBargain RSS feed for deals matching watchlist. Alert if keyword match with 10+ votes."

          [[cron]]
          name = "health-morning"
          schedule = "30 8 * * *"
          timezone = "Australia/Sydney"
          task = "Morning health coaching. Query InfluxDB for last night sleep, HRV, resting HR. Provide guidance based on recovery status."

          [[cron]]
          name = "health-evening"
          schedule = "0 17 * * *"
          timezone = "Australia/Sydney"
          task = "Evening health check. Review daily activity, sleep debt status, recovery recommendations."
  dataFrom:
    - extract:
        key: moltis
    - extract:
        key: openclaw
    - extract:
        key: agentgateway
    - extract:
        key: brave
    - extract:
        key: matrix
