---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: kelos
spec:
    secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword-connect
    target:
        name: kelos-secret
        creationPolicy: Owner
        template:
            data:
                LITELLM_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
                OPENCODE_API_KEY: "{{ .OPENCODE_API_KEY }}"
                ANTHROPIC_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
                GEMINI_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
                CURSOR_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
    dataFrom:
        - extract:
              key: litellm
        - extract:
              key: opencode
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
    name: workspace-auth
spec:
    secretStoreRef:
        kind: ClusterSecretStore
        name: onepassword-connect
    target:
        name: workspace-auth
        creationPolicy: Owner
        template:
            data:
                appID: "{{ .GITHUB_BOT_APP_ID }}"
                installationID: "{{ .GITHUB_BOT_INSTALLATION_ID }}"
                privateKey: "{{ .GITHUB_BOT_APP_PRIVATE_KEY }}"
    dataFrom:
        - extract:
              key: github-bot
