---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencode
spec:
  chartRef:
    kind: OCIRepository
    name: opencode
  interval: 10m
  values:
    controllers:
      opencode:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: latest
            command:
              - opencode
              - web
              - --hostname
              - 0.0.0.0
              - --port
              - "4096"
            env:
              TZ: Australia/Sydney
              OPENAI_BASE_URL: http://agentgateway.network.svc.cluster.local:8080/v1/opus
            envFrom:
              - secretRef:
                  name: opencode-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4096
                  periodSeconds: 2
                  failureThreshold: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4096
                  periodSeconds: 10
                  failureThreshold: 3
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4096
                  periodSeconds: 30
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
          git-sync:
            image:
              repository: alpine/git
              tag: v2.47.2
            command:
              - /bin/sh
              - /scripts/sync.sh
            envFrom:
              - secretRef:
                  name: opencode-secret
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        ports:
          http:
            port: 4096

    persistence:
      repos:
        existingClaim: opencode
        globalMounts:
          - path: /repos
      session-data:
        existingClaim: opencode
        globalMounts:
          - path: /home/node/.local/share/opencode
            subPath: session-data
      scripts:
        type: configMap
        name: opencode-git-sync
        defaultMode: 0755
        advancedMounts:
          opencode:
            git-sync:
              - path: /scripts
