---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencode-personal
spec:
  hostnames:
    - personal.opencode.goyangi.io
    - personal.oc.goyangi.io
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            remove:
              - Content-Security-Policy
      backendRefs:
        - name: opencode-personal
          port: 4096
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencode-work
spec:
  hostnames:
    - work.opencode.goyangi.io
    - work.oc.goyangi.io
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            remove:
              - Content-Security-Policy
      backendRefs:
        - name: opencode-work
          port: 4096
