---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencode
spec:
  hostnames:
    - opencode.goyangi.io
  parentRefs:
    - name: envoy-internal
      namespace: network
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            remove:
              - Content-Security-Policy
      backendRefs:
        - name: opencode
          port: 4096
