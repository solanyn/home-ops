---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-webhook
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: openclaw-webhook-secret
    template:
      data:
        OPENCLAW_HOOKS_TOKEN: "{{ .OPENCLAW_HOOKS_TOKEN }}"
        GITHUB_WEBHOOK_SECRET: "{{ .GITHUB_WEBHOOK_SECRET }}"
        FLUX_WEBHOOK_SECRET: "{{ .FLUX_WEBHOOK_SECRET }}"
        GRAFANA_WEBHOOK_TOKEN: "{{ .GRAFANA_WEBHOOK_TOKEN }}"
  dataFrom:
    - extract:
        key: openclaw-webhook
