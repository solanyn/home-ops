---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw-webhook
spec:
  hostnames:
    - webhook.goyangi.io
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /hooks/
      backendRefs:
        - name: openclaw-webhook
          port: 80
