---
- id: github-ci
  execute-command: /config/github-ci.sh
  command-working-directory: /tmp
  pass-environment-to-command:
    - envname: OPENCLAW_HOOKS_TOKEN
      source: string
      name: '{{ getenv "OPENCLAW_HOOKS_TOKEN" }}'
  pass-arguments-to-command:
    - source: payload
      name: action
    - source: payload
      name: workflow_run.conclusion
    - source: payload
      name: workflow_run.name
    - source: payload
      name: repository.full_name
    - source: payload
      name: workflow_run.head_branch
    - source: payload
      name: workflow_run.head_sha
  trigger-rule:
    match:
      type: payload-hmac-sha256
      secret: '{{ getenv "GITHUB_WEBHOOK_SECRET" }}'
      parameter:
        source: header
        name: X-Hub-Signature-256
