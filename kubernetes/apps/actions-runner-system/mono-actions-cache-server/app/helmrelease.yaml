---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mono-actions-cache-server
spec:
  chartRef:
    kind: OCIRepository
    name: mono-actions-cache-server
  interval: 1h
  values:
    defaultPodOptions:
      enableServiceLinks: false
      nodeSelector:
        node.kubernetes.io/nodepool: "true"
      tolerations:
        - key: nodepool
          operator: Equal
          value: "true"
          effect: NoSchedule
    controllers:
      app:
        replicas: 0
        containers:
          app:
            image:
              repository: ghcr.io/falcondev-oss/github-actions-cache-server
              tag: 9.6.1@sha256:3a6cf1937f13a9b4a3303db96794770d2ab7f97c038fcb92a7477d4e92607f4c
            env:
              API_BASE_URL: http://mono-actions-cache-server.actions-runner-system.svc.cluster.local:3000
              STORAGE_DRIVER: filesystem
              STORAGE_FILESYSTEM_PATH: /data/cache
              DB_DRIVER: sqlite
              DB_SQLITE_PATH: /data/cache-server.db
              CLEANUP_OLDER_THAN_DAYS: "7"
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: 3000
    persistence:
      data:
        type: emptyDir
        sizeLimit: 10Gi
        globalMounts:
          - path: /data
