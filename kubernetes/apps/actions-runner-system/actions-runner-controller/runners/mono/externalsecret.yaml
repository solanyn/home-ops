---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mono-runner
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mono-runner-secret
    template:
      data:
        github_app_id: "{{ .GITHUB_BOT_APP_ID }}"
        github_app_installation_id: "{{ .GITHUB_BOT_INSTALLATION_ID }}"
        github_app_private_key: "{{ .GITHUB_BOT_APP_PRIVATE_KEY }}"
  dataFrom:
    - extract:
        key: github-bot
