---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: forgejo-runner
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    knownLastVersion: true
    replicaCount: 1

    image:
      # Use chart defaults (code.forgejo.org/forgejo/runner:<appVersion>)
      pullPolicy: IfNotPresent

    runner:
      config:
        # Pre-registered against Forgejo as a system-scope runner via the
        # admin API. The .runner file lives in the forgejo-runner-config
        # Secret (managed out-of-band by the bootstrap one-shot).
        create: false
        existingSecret: forgejo-runner-config
        instance: https://forgejo.goyangi.io
        name: forgejo-runner
        file:
          log:
            level: info
            job_level: info
          runner:
            file: .runner
            capacity: 1
            insecure: false
            timeout: 3h

    securityContext:
      privileged: true

    dind:
      image:
        registry: docker.io
        repository: library/docker
        tag: 29-dind
        pullPolicy: IfNotPresent
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    nodeSelector:
      kubernetes.io/os: linux