---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 10m
  values:
    config:
      repo: github://solanyn/home-ops
      prComments: true
      statusChecks: true
      publicUrl: https://konflate.goyangi.io
      # Replace with the GitHub App client id after registering the konflate App.
      # Required permissions on the App: Checks (R/W), Pull requests (R/W).
      appClientId: REPLACE_ME_WITH_KONFLATE_APP_CLIENT_ID
    secret:
      existingSecret: konflate-webhook-token-secret
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - "{{ .Release.Name }}.goyangi.io"
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi
