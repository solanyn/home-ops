---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: tofu-controller
spec:
    targetNamespace: flux-system
    interval: 1h
    path: ./kubernetes/apps/flux-system/tofu-controller/app
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system