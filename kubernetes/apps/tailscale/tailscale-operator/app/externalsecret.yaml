---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tailscale-operator
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: tailscale-operator-oauth
    template:
      data:
        client_id: "{{ .TAILSCALE_CLIENT_ID }}"
        client_secret: "{{ .TAILSCALE_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: tailscale
