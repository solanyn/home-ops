---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kelos-dev/kelos/main/internal/manifests/charts/kelos/values.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: kelos
spec:
    chart:
        spec:
            chart: kelos
            version: 0.47.0
            sourceRef:
                kind: HelmRepository
                name: kelos
                namespace: flux-system
            interval: 1h
    interval: 10m
    values:
        crds:
            install: true
            keep: true
        sessionServer:
            enabled: true
            secretName: kelos-session-auth
            defaultNamespace: ai
