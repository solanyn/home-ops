---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: OpenCode Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - kubernetes/apps/ai/openclaw/**
      - kubernetes/apps/ai/hermes/**
      - kubernetes/apps/ai/temporal/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    name: OpenCode Review
    runs-on: home-ops-runner
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install opencode
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(gh api repos/anomalyco/opencode/releases/latest --jq .tag_name)
          mkdir -p "$HOME/.opencode/bin"
          gh release download "$VERSION" --repo anomalyco/opencode --pattern "opencode-linux-x64.tar.gz" --dir /tmp
          tar -xzf /tmp/opencode-linux-x64.tar.gz -C "$HOME/.opencode/bin"
          chmod +x "$HOME/.opencode/bin/opencode"
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode Review
        env:
          AGENTGATEWAY_API_KEY: ${{ secrets.AGENTGATEWAY_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          MODEL: agentgateway/opus
          USE_GITHUB_TOKEN: "true"
          PROMPT: |
            Review this pull request focusing on Kubernetes manifest correctness:
            - Validate HelmRelease values against the app-template chart schema
            - Check ExternalSecret templates for missing or mismatched keys
            - Verify kustomization.yaml resource lists match actual files
            - Check ks.yaml field ordering and dependency namespaces per AGENTS.md conventions
            - Flag any secrets, credentials, or tokens that should not be committed
            - Verify PVC storageClass matches expected usage (ceph-block for data, openebs-hostpath for ephemeral)
            - Check for common issues: missing YAML anchors, incorrect service references, broken volume mounts
            Only comment if you find actual issues. Do not comment on style or formatting.
        run: opencode github run
