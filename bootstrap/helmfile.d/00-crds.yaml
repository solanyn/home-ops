---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# This helmfile is for extracting and installing Custom Resource Definitions (CRDs) from Helm charts.
# It is not intended to be used with helmfile apply or helmfile sync.

helmDefaults:
  args:
    - --include-crds
    - --no-hooks

releases:
  - name: cloudflare-dns
    namespace: network
    chart: oci://ghcr.io/home-operations/charts-mirror/external-dns
    version: 1.20.0

  - name: envoy-gateway
    namespace: network
    chart: oci://mirror.gcr.io/envoyproxy/gateway-helm
    version: v1.7.2

  - name: grafana-operator
    namespace: o11y
    chart: oci://ghcr.io/grafana/helm-charts/grafana-operator
    version: 5.22.2

  - name: prometheus-operator-crds
    namespace: o11y
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    version: 28.0.1

  - name: liqo
    namespace: liqo-system
    chart: https://helm.liqo.io/liqo
    version: 0.10.3

  - name: opentelemetry-operator
    namespace: o11y
    chart: oci://ghcr.io/open-telemetry/opentelemetry-helm-charts/opentelemetry-operator
    version: 0.87.0

  - name: rook-ceph-operator
    namespace: rook-ceph
    chart: oci://ghcr.io/home-operations/charts-mirror/rook-ceph
    version: v1.17.4

  - name: victoria-metrics-operator
    namespace: o11y
    chart: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-operator
    version: 0.62.0
